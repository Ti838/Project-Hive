<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Body gradient: amber/gold -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <!-- Wing gradient: indigo/purple glassy -->
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:0.85" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0.6" />
    </linearGradient>
    <!-- Head gradient -->
    <linearGradient id="headGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0004"/>
    </filter>
    <filter id="wingShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#4f46e544"/>
    </filter>
  </defs>

  <!-- ── Left Wing ── -->
  <ellipse cx="28" cy="34" rx="16" ry="22"
    fill="url(#wingGrad)" filter="url(#wingShadow)"
    transform="rotate(-30 28 34)" />

  <!-- ── Right Wing ── -->
  <ellipse cx="72" cy="34" rx="16" ry="22"
    fill="url(#wingGrad)" filter="url(#wingShadow)"
    transform="rotate(30 72 34)" />

  <!-- ── Body (abdomen) ── -->
  <ellipse cx="50" cy="68" rx="18" ry="23"
    fill="url(#bodyGrad)" filter="url(#shadow)" />

  <!-- Body stripes -->
  <rect x="33" y="60" width="34" height="5.5" rx="2.5" fill="#1E1B4B" opacity="0.75"/>
  <rect x="33" y="71" width="34" height="5.5" rx="2.5" fill="#1E1B4B" opacity="0.75"/>
  <rect x="35" y="82" width="30" height="4"   rx="2"   fill="#1E1B4B" opacity="0.55"/>

  <!-- Body shine -->
  <ellipse cx="42" cy="55" rx="5" ry="3" fill="white" opacity="0.25" transform="rotate(-20 42 55)"/>

  <!-- ── Head ── -->
  <circle cx="50" cy="36" r="15" fill="url(#headGrad)" filter="url(#shadow)" />

  <!-- Head shine -->
  <ellipse cx="45" cy="30" rx="5" ry="3" fill="white" opacity="0.3" transform="rotate(-20 45 30)"/>

  <!-- ── Eyes ── -->
  <circle cx="44" cy="35" r="3.5" fill="#1E1B4B"/>
  <circle cx="56" cy="35" r="3.5" fill="#1E1B4B"/>
  <!-- Eye shine -->
  <circle cx="45.2" cy="33.8" r="1.2" fill="white" opacity="0.8"/>
  <circle cx="57.2" cy="33.8" r="1.2" fill="white" opacity="0.8"/>

  <!-- ── Smile ── -->
  <path d="M 44 41 Q 50 46 56 41" stroke="#1E1B4B" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- ── Antennae ── -->
  <!-- Left antenna stem -->
  <line x1="44" y1="22" x2="38" y2="10" stroke="#D97706" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Left antenna ball -->
  <circle cx="37" cy="8.5" r="3" fill="#F59E0B" stroke="#D97706" stroke-width="1"/>

  <!-- Right antenna stem -->
  <line x1="56" y1="22" x2="62" y2="10" stroke="#D97706" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Right antenna ball -->
  <circle cx="63" cy="8.5" r="3" fill="#F59E0B" stroke="#D97706" stroke-width="1"/>
</svg>
