<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Bee body (gradient circle) -->
  <defs>
    <linearGradient id="beeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Bee body circle -->
  <circle cx="50" cy="50" r="45" fill="url(#beeGradient)"/>
  
  <!-- Bee wings -->
  <ellipse cx="30" cy="30" rx="12" ry="18" fill="#818cf8" opacity="0.7" transform="rotate(-30 30 30)"/>
  <ellipse cx="70" cy="30" rx="12" ry="18" fill="#818cf8" opacity="0.7" transform="rotate(30 70 30)"/>
  
  <!-- Bee head -->
  <circle cx="50" cy="35" r="12" fill="white"/>
  
  <!-- Eyes -->
  <circle cx="45" cy="32" r="2" fill="#4f46e5"/>
  <circle cx="55" cy="32" r="2" fill="#4f46e5"/>
  
  <!-- Smile -->
  <path d="M 45 35 Q 50 37 55 35" stroke="#4f46e5" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- Body stripes -->
  <rect x="42" y="48" width="16" height="3" fill="white" opacity="0.9"/>
  <rect x="42" y="58" width="16" height="3" fill="white" opacity="0.9"/>
</svg>
