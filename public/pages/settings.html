        <main class="max-w-4xl mx-auto px-6 py-8">

                    <label class="flex items-center">

                    </label>
                    <label class="flex items-center">
                        <input type="checkbox" checked class="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500">
                        <span class="ml-3 text-slate-700">Email notifications for project likes</span>

                        <input type="checkbox" class="w-4 h-4 text-indigo-600 rounded focus:ring-indigo-500">

                            <option value="public">Public (anyone can see)</option>
                            <option value="private">Private (team members only)</option>
                            <option value="university">University only</option>
                        </select>
                    </div>

                    <div class="border-t border-slate-200 pt-4">
                        <h3 class="font-semibold text-slate-900 mb-2">Data Management</h3>
                        <div class="space-y-2">
                            <button class="block w-full text-left px-4 py-2 bg-slate-50 hover:bg-slate-100 rounded-lg transition text-slate-700">
                                📥 Download My Data
                            </button>
                            <button class="block w-full text-left px-4 py-2 bg-slate-50 hover:bg-slate-100 rounded-lg transition text-slate-700">
                                🗑️ Delete My Account
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Danger Zone -->
            <div class="bg-red-50 border border-red-200 rounded-lg p-6">
                <h2 class="text-2xl font-bold text-red-900 mb-4">Danger Zone</h2>
                
                <button onclick="handleLogout()" class="w-full px-4 py-2 bg-red-600 text-white font-semibold rounded-lg hover:bg-red-700 transition">
                    🚪 Logout
                </button>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/core/api.js"></script>
    <script src="../assets/js/core/auth.js"></script>

    <script>
        Auth.requireAuth();

        async function loadSettings() {
            try {
                const response = await API.users.getCurrentUser();
                if (response.ok && response.user) {
                    document.getElementById('display-email').textContent = response.user.email;
                }
            } catch (error) {
                console.error('[v0] Error loading settings:', error);
            }
        }

        function showPasswordChange() {
            showToast('Password change feature coming soon!');
        }

        function saveNotifications() {
            showToast('Notification preferences saved!');
        }

        function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                Auth.logout();
            }
        }

        document.addEventListener('DOMContentLoaded', loadSettings);
    </script>

    
    <!-- Global Modal -->
    <div id="global-modal-backdrop" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[90] flex items-center justify-center p-4 transition-all duration-300 opacity-0">
        <div class="bg-white dark:bg-slate-800 text-slate-900 dark:text-white shadow-2xl p-8 rounded-3xl max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-90 transition-all duration-300" id="global-toast">
            <img src="../assets/svg/logo.svg" alt="ProjectHive Logo" class="w-16 h-16 mx-auto mb-5 animate-pulse">
            <p id="global-toast-msg" class="text-lg font-semibold mb-8 text-slate-700 dark:text-slate-200 leading-relaxed"></p>
            <button onclick="hideModal()" class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl transition-all font-semibold shadow-lg shadow-indigo-200 dark:shadow-none hover:scale-[1.02] active:scale-95">Got it, thanks!</button>
        </div>
    </div>
    <script>
        function showToast(message) {
            const backdrop = document.getElementById('global-modal-backdrop');
            const msgEl = document.getElementById('global-toast-msg');
            const modal = document.getElementById('global-toast');
            if (backdrop && msgEl) {
                msgEl.innerHTML = message;
                backdrop.classList.remove('hidden');
                // Force reflow
                void backdrop.offsetWidth;
                backdrop.classList.remove('opacity-0');
                modal.classList.remove('scale-90');
                modal.classList.add('scale-100');
            }
        }
        function hideModal() {
            const backdrop = document.getElementById('global-modal-backdrop');
            const modal = document.getElementById('global-toast');
            if (backdrop) {
                backdrop.classList.add('opacity-0');
                modal.classList.remove('scale-100');
                modal.classList.add('scale-90');
                setTimeout(() => backdrop.classList.add('hidden'), 300);
            }
        }
    </script>
