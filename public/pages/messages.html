<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Team Messaging - ProjectHive">
    <title>Messages - ProjectHive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/custom.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'></text></svg>">
    <!-- Socket.IO Client CDN -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        .team-btn.active { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); color: white; }
        .team-btn.active .team-members { color: rgba(255,255,255,0.8); }
        .msg-bubble { animation: msgIn 0.25s ease-out; }
        @keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .typing-dot { animation: blink 1.4s infinite both; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
        #messages-scroll { scroll-behavior: smooth; }
        .connection-badge { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 h-screen overflow-hidden">
    <div class="h-screen flex">
        <!-- Sidebar: Team List -->
        <aside id="sidebar" class="w-72 bg-white border-r border-slate-200 flex flex-col h-full">
            <div class="p-5 border-b border-slate-100">
                <div class="flex items-center justify-between mb-1">
                    <h2 class="text-lg font-bold text-slate-900">💬 Messages</h2>
                    <a href="../pages/dashboard.html" class="text-xs text-slate-500 hover:text-indigo-600 transition">← Back</a>
                </div>
                <div id="connection-status" class="connection-badge flex items-center gap-1.5 text-xs text-slate-400 mt-2">
                    <span id="status-dot" class="w-2 h-2 rounded-full bg-slate-300"></span>
                    <span id="status-text">Connecting...</span>
                </div>
            </div>
            <div id="teams-list" class="flex-1 overflow-y-auto p-3 space-y-1">
                <div class="text-center py-10 text-slate-400 text-sm">
                    <div class="spinner mx-auto mb-3"></div>
                    Loading teams...
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="flex-1 flex flex-col h-full bg-slate-50">
            <!-- Chat Header -->
            <header id="chat-header" class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between">
                <div>
                    <h2 id="chat-title" class="text-xl font-bold text-slate-900">Select a Team</h2>
                    <p id="chat-subtitle" class="text-sm text-slate-500">Choose a team chat from the sidebar</p>
                </div>
                <div id="online-indicator" class="hidden items-center gap-2">
                    <span class="w-2.5 h-2.5 rounded-full bg-emerald-400 animate-pulse"></span>
                    <span id="online-count" class="text-sm text-slate-500">0 online</span>
                </div>
            </header>

            <!-- Messages Container -->
            <div id="messages-scroll" class="flex-1 overflow-y-auto px-6 py-4">
                <div id="messages-container">
                    <div class="flex flex-col items-center justify-center h-full text-slate-400 py-20">
                        <div class="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center text-3xl mb-4">💬</div>
                        <p class="font-medium text-slate-600">No conversation selected</p>
                        <p class="text-sm mt-1">Pick a team from the left to start chatting</p>
                    </div>
                </div>
            </div>

            <!-- Typing Indicator -->
            <div id="typing-indicator" class="hidden px-6 pb-1">
                <div class="flex items-center gap-2 text-sm text-slate-400">
                    <div class="flex gap-0.5">
                        <span class="typing-dot w-1.5 h-1.5 bg-slate-400 rounded-full"></span>
                        <span class="typing-dot w-1.5 h-1.5 bg-slate-400 rounded-full"></span>
                        <span class="typing-dot w-1.5 h-1.5 bg-slate-400 rounded-full"></span>
                    </div>
                    <span id="typing-user">Someone is typing...</span>
                </div>
            </div>

            <!-- Message Input -->
            <div id="message-input-area" class="hidden bg-white border-t border-slate-200 p-4">
                <form id="message-form" class="flex gap-3 items-end">
                    <div class="flex-1 relative">
                        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off"
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition text-sm">
                    </div>
                    <button type="submit" id="send-btn" disabled
                        class="px-5 py-3 bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-semibold rounded-xl hover:shadow-lg hover:shadow-indigo-200 transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed text-sm">
                        Send ➤
                    </button>
                </form>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/core/api.js"></script>
    <script src="../assets/js/core/auth.js"></script>
    <script src="../assets/js/core/socket.js"></script>

    <script>
        // ── State ──
        let currentTeamId = null;
        let currentUserId = null;
        let typingUsers = new Map();

        // ── Auth guard ──
        Auth.requireAuth();
        const currentUser = Auth.getCurrentUser();
        if (currentUser) currentUserId = currentUser.id;

        // ── DOM refs ──
        const $teamsList      = document.getElementById('teams-list');
        const $chatTitle       = document.getElementById('chat-title');
        const $chatSubtitle    = document.getElementById('chat-subtitle');
        const $messagesContainer = document.getElementById('messages-container');
        const $messagesScroll  = document.getElementById('messages-scroll');
        const $inputArea       = document.getElementById('message-input-area');
        const $input           = document.getElementById('message-input');
        const $sendBtn         = document.getElementById('send-btn');
        const $form            = document.getElementById('message-form');
        const $typingIndicator = document.getElementById('typing-indicator');
        const $typingUser      = document.getElementById('typing-user');
        const $statusDot       = document.getElementById('status-dot');
        const $statusText      = document.getElementById('status-text');
        const $onlineIndicator = document.getElementById('online-indicator');
        const $onlineCount     = document.getElementById('online-count');

        // ── Helpers ──
        function getInitials(first, last) {
            return ((first?.[0] || '') + (last?.[0] || '')).toUpperCase() || '?';
        }
        function getAvatarColor(name) {
            const colors = ['bg-indigo-500','bg-violet-500','bg-pink-500','bg-emerald-500','bg-amber-500','bg-cyan-500','bg-rose-500','bg-teal-500'];
            let hash = 0;
            for (let i = 0; i < (name||'').length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }
        function formatTime(dateStr) {
            const d = new Date(dateStr);
            const now = new Date();
            const isToday = d.toDateString() === now.toDateString();
            if (isToday) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        function scrollToBottom() {
            requestAnimationFrame(() => { $messagesScroll.scrollTop = $messagesScroll.scrollHeight; });
        }
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ── Connection status ──
        function setConnectionStatus(status) {
            if (status === 'connected') {
                $statusDot.className = 'w-2 h-2 rounded-full bg-emerald-400';
                $statusText.textContent = 'Connected';
            } else if (status === 'connecting') {
                $statusDot.className = 'w-2 h-2 rounded-full bg-amber-400 animate-pulse';
                $statusText.textContent = 'Connecting...';
            } else {
                $statusDot.className = 'w-2 h-2 rounded-full bg-red-400';
                $statusText.textContent = 'Disconnected';
            }
        }

        // ── Load teams ──
        async function loadTeams() {
            try {
                const res = await API.teams.getMyTeams();
                let teams = [];
                if (res.ok && res.teams) {
                    teams = res.teams;
                } else {
                    // fallback: try listing all teams
                    const res2 = await API.teams.listTeams();
                    if (res2.ok && res2.teams) teams = res2.teams;
                }

                if (!teams.length) {
                    $teamsList.innerHTML = `
                        <div class="text-center py-10 text-slate-400 text-sm">
                            <p class="mb-2">No teams yet</p>
                            <a href="../pages/teams/" class="text-indigo-600 hover:underline text-sm font-medium">Join or create a team →</a>
                        </div>`;
                    return;
                }

                $teamsList.innerHTML = teams.map(t => `
                    <button onclick="selectTeam('${t._id}', '${escapeHtml(t.name)}', ${t.members?.length || 0})"
                        id="team-${t._id}"
                        class="team-btn w-full text-left px-4 py-3 rounded-xl hover:bg-indigo-50 transition-all duration-150 group">
                        <div class="font-semibold text-slate-800 group-hover:text-indigo-700 text-sm truncate">${escapeHtml(t.name)}</div>
                        <div class="team-members text-xs text-slate-400 mt-0.5">${t.members?.length || 0} members</div>
                    </button>
                `).join('');
            } catch (err) {
                console.error('[v0] Load teams error:', err);
                $teamsList.innerHTML = '<p class="text-red-400 text-sm text-center py-4">Failed to load teams</p>';
            }
        }

        // ── Select team ──
        async function selectTeam(teamId, teamName, memberCount) {
            if (currentTeamId === teamId) return;

            // Leave previous room
            if (currentTeamId) {
                SocketClient.leaveRoom();
                document.getElementById('team-' + currentTeamId)?.classList.remove('active');
            }

            currentTeamId = teamId;
            document.getElementById('team-' + teamId)?.classList.add('active');

            $chatTitle.textContent = teamName;
            $chatSubtitle.textContent = `${memberCount} members`;
            $inputArea.classList.remove('hidden');
            $input.focus();

            // Show loading
            $messagesContainer.innerHTML = '<div class="text-center py-12 text-slate-400"><div class="spinner mx-auto mb-3"></div>Loading messages...</div>';

            // Join Socket.IO room
            SocketClient.joinRoom(teamId);

            // Load history via REST
            try {
                const res = await API.messages.getTeamMessages(teamId);
                if (res.ok && res.messages) {
                    renderMessages(res.messages);
                } else {
                    renderMessages([]);
                }
            } catch (err) {
                console.error('[v0] Load messages error:', err);
                $messagesContainer.innerHTML = '<p class="text-red-400 text-center py-8 text-sm">Failed to load messages</p>';
            }
        }

        // ── Render messages ──
        function renderMessages(messages) {
            if (!messages.length) {
                $messagesContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-16 text-slate-400">
                        <div class="text-4xl mb-3">🎉</div>
                        <p class="font-medium text-slate-600">Start the conversation!</p>
                        <p class="text-sm mt-1">Be the first to say hello</p>
                    </div>`;
                return;
            }
            $messagesContainer.innerHTML = messages.map(m => renderSingleMessage(m)).join('');
            scrollToBottom();
        }

        function renderSingleMessage(msg) {
            const sender = msg.sender || {};
            const senderId = sender._id || sender.id || '';
            const firstName = sender.firstName || 'Unknown';
            const lastName = sender.lastName || '';
            const fullName = `${firstName} ${lastName}`.trim();
            const isMine = senderId === currentUserId;

            return `
                <div class="msg-bubble flex gap-3 mb-3 ${isMine ? 'flex-row-reverse' : ''}">
                    <div class="w-9 h-9 ${getAvatarColor(fullName)} rounded-full flex items-center justify-center text-xs font-bold text-white flex-shrink-0 shadow-sm">
                        ${getInitials(firstName, lastName)}
                    </div>
                    <div class="max-w-[70%] ${isMine ? 'text-right' : ''}">
                        <div class="flex items-center gap-2 mb-1 ${isMine ? 'justify-end' : ''}">
                            <span class="font-semibold text-slate-800 text-sm">${escapeHtml(fullName)}</span>
                            <span class="text-xs text-slate-400">${formatTime(msg.createdAt)}</span>
                        </div>
                        <div class="inline-block px-4 py-2.5 rounded-2xl text-sm leading-relaxed ${isMine
                            ? 'bg-gradient-to-r from-indigo-600 to-violet-600 text-white rounded-tr-md'
                            : 'bg-white border border-slate-200 text-slate-700 rounded-tl-md shadow-sm'}">
                            ${escapeHtml(msg.content)}
                        </div>
                    </div>
                </div>`;
        }

        function appendMessage(msg) {
            // Prevent duplicates
            const html = renderSingleMessage(msg);
            $messagesContainer.insertAdjacentHTML('beforeend', html);
            scrollToBottom();
        }

        // ── Send message ──
        $form.addEventListener('submit', (e) => {
            e.preventDefault();
            const content = $input.value.trim();
            if (!content || !currentTeamId) return;

            if (SocketClient.isConnected()) {
                SocketClient.sendMessage(currentTeamId, content);
            } else {
                // Fallback to REST API
                API.messages.sendMessage(currentTeamId, content).then(res => {
                    if (res.ok !== false) appendMessage(res);
                });
            }

            $input.value = '';
            $sendBtn.disabled = true;
            SocketClient.stopTyping(currentTeamId);
        });

        // Enable/disable send button
        $input.addEventListener('input', () => {
            $sendBtn.disabled = !$input.value.trim();
            if ($input.value.trim() && currentTeamId) {
                SocketClient.startTyping(currentTeamId);
            }
        });

        // ── Socket events ──
        SocketClient.on('connected', () => setConnectionStatus('connected'));
        SocketClient.on('disconnected', () => setConnectionStatus('disconnected'));
        SocketClient.on('reconnected', () => {
            setConnectionStatus('connected');
            if (currentTeamId) SocketClient.joinRoom(currentTeamId);
        });
        SocketClient.on('error', () => setConnectionStatus('disconnected'));

        SocketClient.on('messageReceived', (msg) => {
            if (msg.roomId === currentTeamId) {
                appendMessage(msg);
            }
        });

        SocketClient.on('userTyping', (data) => {
            typingUsers.set(data.userId, Date.now());
            updateTypingUI();
        });

        SocketClient.on('userStopTyping', (data) => {
            typingUsers.delete(data.userId);
            updateTypingUI();
        });

        function updateTypingUI() {
            const count = typingUsers.size;
            if (count === 0) {
                $typingIndicator.classList.add('hidden');
            } else {
                $typingIndicator.classList.remove('hidden');
                $typingUser.textContent = count === 1 ? 'Someone is typing...' : `${count} people typing...`;
            }
        }

        // ── Init ──
        document.addEventListener('DOMContentLoaded', () => {
            loadTeams();
            const token = API.getTokens().access;
            if (token) {
                setConnectionStatus('connecting');
                SocketClient.connect(token);
            } else {
                setConnectionStatus('disconnected');
            }
        });
    </script>

    
    <!-- Global Modal -->
    <div id="global-modal-backdrop" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[90] flex items-center justify-center p-4 transition-all duration-300 opacity-0">
        <div class="bg-white dark:bg-slate-800 text-slate-900 dark:text-white shadow-2xl p-8 rounded-3xl max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-90 transition-all duration-300" id="global-toast">
            <img src="../assets/svg/logo.svg" alt="ProjectHive Logo" class="w-16 h-16 mx-auto mb-5 animate-pulse">
            <p id="global-toast-msg" class="text-lg font-semibold mb-8 text-slate-700 dark:text-slate-200 leading-relaxed"></p>
            <button onclick="hideModal()" class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl transition-all font-semibold shadow-lg shadow-indigo-200 dark:shadow-none hover:scale-[1.02] active:scale-95">Got it, thanks!</button>
        </div>
    </div>
    <script>
        function showToast(message) {
            const backdrop = document.getElementById('global-modal-backdrop');
            const msgEl = document.getElementById('global-toast-msg');
            const modal = document.getElementById('global-toast');
            if (backdrop && msgEl) {
                msgEl.innerHTML = message;
                backdrop.classList.remove('hidden');
                // Force reflow
                void backdrop.offsetWidth;
                backdrop.classList.remove('opacity-0');
                modal.classList.remove('scale-90');
                modal.classList.add('scale-100');
            }
        }
        function hideModal() {
            const backdrop = document.getElementById('global-modal-backdrop');
            const modal = document.getElementById('global-toast');
            if (backdrop) {
                backdrop.classList.add('opacity-0');
                modal.classList.remove('scale-100');
                modal.classList.add('scale-90');
                setTimeout(() => backdrop.classList.add('hidden'), 300);
            }
        }
    </script>

</body>
</html>
