<script>
// Lazy-load Jitsi Meet API — only when user starts a call (saves ~100KB on page load)
window._jitsiLoaded = false;
function loadJitsiAPI() {
  return new Promise((resolve) => {
    if (window._jitsiLoaded || window.JitsiMeetExternalAPI) { resolve(); return; }
    const s = document.createElement('script');
    s.src = 'https://meet.jit.si/external_api.js';
    s.onload = () => { window._jitsiLoaded = true; resolve(); };
    s.onerror = () => resolve(); // fail silently
    document.head.appendChild(s);
  });
}
</script>
<style>
body{font-family:'Inter',sans-serif;overflow:hidden;}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;display:inline-block;vertical-align:middle;}
.dark body{background:#0f1117;color:#e4e1eb;}
.bubble-in{animation:bubbleIn .18s ease;}
@keyframes bubbleIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.conv-item:hover{background:rgba(99,102,241,.08);}
.conv-item.active{background:rgba(99,102,241,.15);}
.dark .conv-item.active{background:rgba(99,102,241,.2);}
/* Messenger-style activity dot */
.status-dot-online{background:#31A24C !important;box-shadow:0 0 0 2px var(--surface, #fff);}
.status-dot-online.pulse{animation:statusPulse 2s ease-in-out infinite;}
@keyframes statusPulse{0%,100%{box-shadow:0 0 0 2px var(--surface, #fff)}50%{box-shadow:0 0 0 2px var(--surface, #fff), 0 0 0 5px rgba(49,162,76,.25)}}
.activity-label{font-size:11px;line-height:1.2;white-space:nowrap;}

/* Mobile: show only conv list OR chat, not both */

  .msg-back-btn{display:flex !important;}

}

}

<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100" data-no-float-theme="1">
<div id="ph-sidebar"></div>

<!-- Full-height layout after sidebar -->
<div class="ml-[260px] h-screen flex flex-col max-md:ml-0">

  <!-- Top bar -->
  <header class="h-14 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 flex items-center px-5 gap-3 shrink-0 z-30">
    <div id="ph-hamburger-slot"></div>
    <button onclick="history.back()" class="w-8 h-8 rounded-full flex items-center justify-center hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors shrink-0 text-gray-700 dark:text-gray-300" title="Go Back">
      <span class="material-symbols-outlined text-[18px]">arrow_back</span>
    </button>
    <span class="material-symbols-outlined text-indigo-500 hidden md:block">chat</span>
    <h1 class="font-bold text-base">Messages</h1>
    <button onclick="openNewConv()" class="ml-auto flex items-center gap-1.5 bg-indigo-500 hover:bg-indigo-600 text-white text-sm font-semibold px-4 py-1.5 rounded-full transition-colors">
      <span class="material-symbols-outlined text-base">edit</span> New
    </button>
  </header>

  <!-- Chat layout -->
  <div class="msg-layout flex flex-1 overflow-hidden">

    <!-- Conversations panel -->
    <aside class="msg-conv-panel w-72 shrink-0 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 flex flex-col overflow-hidden">
      <div class="p-3">
        <input id="conv-search" type="text" placeholder="Search conversations…"
          oninput="filterConvs(this.value)"
          class="w-full bg-gray-100 dark:bg-gray-800 border-none rounded-full px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-400 transition-all">
      </div>
      <!-- Tabs: Chats | Teams | Requests -->
      <div class="flex border-b border-gray-200 dark:border-gray-800 px-2 gap-1 shrink-0">
        <button id="tab-chats" onclick="switchTab('chats')" class="flex-1 py-2 text-xs font-semibold text-indigo-500 border-b-2 border-indigo-500 transition-colors">Chats</button>
        <button id="tab-teams" onclick="switchTab('teams')" class="flex-1 py-2 text-xs font-semibold text-gray-400 border-b-2 border-transparent hover:text-gray-600 transition-colors flex items-center justify-center gap-1">
          Teams <span id="team-badge" class="hidden bg-purple-500 text-white rounded-full px-1.5 py-0.5 text-[9px] font-bold">0</span>
        </button>
        <button id="tab-requests" onclick="switchTab('requests')" class="flex-1 py-2 text-xs font-semibold text-gray-400 border-b-2 border-transparent hover:text-gray-600 transition-colors flex items-center justify-center gap-1">
          Requests <span id="req-badge" class="hidden bg-red-500 text-white rounded-full px-1.5 py-0.5 text-[9px] font-bold">0</span>
        </button>
      </div>
      <div id="conv-list" class="flex-1 overflow-y-auto px-2 pb-2">
        <div class="flex flex-col items-center justify-center h-32 text-gray-400 text-sm gap-2">
          <span class="material-symbols-outlined text-3xl">chat_bubble_outline</span>Loading…
        </div>
      </div>
    </aside>


    <!-- Chat area -->
    <main class="msg-chat-area flex-1 flex flex-col overflow-hidden bg-gray-50 dark:bg-gray-950">
      <!-- Chat header -->
      <div id="chat-hdr" class="h-14 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 px-5 flex items-center gap-3">
        <button class="msg-back-btn items-center gap-1 text-indigo-500 text-sm font-semibold" style="display:none;background:none;border:none;cursor:pointer;padding:4px 8px;" onclick="showConvPanel()">

        </button>
        <div class="text-sm text-gray-400 flex items-center gap-2">
          Select a conversation to start chatting
        </div>
      </div>

      <!-- Messages -->
      <div id="msgs" class="flex-1 overflow-y-auto p-5 flex flex-col gap-2">
        <div class="flex flex-col items-center justify-center h-full text-gray-400 text-sm gap-3">
          <span class="material-symbols-outlined text-5xl">waving_hand</span>
          <p>Pick a conversation or start a new one</p>

</div>

<!-- New Conversation Modal -->
<div id="nc-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center">

    <div id="webrtc-container" class="hidden flex-1 w-full bg-gray-950 relative flex items-center justify-center">

    <!-- Call controls bar -->
    <div class="absolute bottom-0 left-0 right-0 z-10 flex justify-center items-center gap-3 p-5 bg-gradient-to-t from-black/80 to-transparent">

<script>
(function(){
  /* Auth */
  const TK = localStorage.getItem('access_token');
  if(!TK){window.location.href='/login';return;}
  try{
    const p=JSON.parse(atob(TK.split('.')[1]));
    if(p.exp&&Date.now()>=p.exp*1000){localStorage.removeItem('access_token');window.location.href='/login';return;}
  }catch(e){window.location.href='/login';return;}

  PHSidebar.init('messages','../../');

  const H={Authorization:'Bearer '+TK,'Content-Type':'application/json'};
  const API_BASE=(location.hostname==='localhost'||location.hostname==='127.0.0.1')?'':'https://projecthive-backend.onrender.com';
  const COLS=['#6366f1','#7c3aed','#ec4899','#10b981','#f59e0b','#3b82f6'];
  function avC(s){let h=0;for(const c of s||'')h=c.charCodeAt(0)+((h<<5)-h);return COLS[Math.abs(h)%COLS.length];}
  function ini(f,l){return((f?.[0]||'')+(l?.[0]||'')).toUpperCase()||'?';}
  function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
  function showToast(msg, type='info') {
    if (typeof PHToast !== 'undefined') {
      if (type === 'error') PHToast.error(msg);
      else if (type === 'success') PHToast.success(msg);
      else PHToast.info ? PHToast.info(msg) : PHToast.success(msg);
    }
  }

  // ── Messenger-style time-ago for activity status ──
  function activityTimeAgo(dateStr) {
    if (!dateStr) return { text: 'Offline', isOnline: false, cssClass: 'away' };
    const now = Date.now();
    const then = new Date(dateStr).getTime();
    if (isNaN(then)) return { text: 'Offline', isOnline: false, cssClass: 'away' };
    const diffMs = now - then;
    const diffSec = Math.floor(diffMs / 1000);
    const diffMin = Math.floor(diffSec / 60);
    const diffHr = Math.floor(diffMin / 60);
    const diffDay = Math.floor(diffHr / 24);

    if (diffMin < 1) return { text: 'Active now', isOnline: true, cssClass: 'active' };
    if (diffMin < 60) return { text: `Active ${diffMin}m ago`, isOnline: false, cssClass: 'away' };
    if (diffHr < 24) return { text: `Active ${diffHr}h ago`, isOnline: false, cssClass: 'away' };
    if (diffDay === 1) return { text: 'Active yesterday', isOnline: false, cssClass: 'away' };
    if (diffDay < 7) return { text: `Active ${diffDay}d ago`, isOnline: false, cssClass: 'away' };
    return { text: 'Offline', isOnline: false, cssClass: 'away' };
  }

  function getActivityStatus(friend) {
    if (!friend) return { text: 'Offline', isOnline: false, cssClass: 'away' };
    if (friend.onlineStatus === 'online') return { text: 'Active now', isOnline: true, cssClass: 'active' };
    return activityTimeAgo(friend.lastSeen);
  }

  let ME={},convs=[],allMsgs=[],activeConv=null,allUsers=[],socket=null;
  let friendIds = new Set(); // Track friend IDs for call gating

  /* Load self */
  try {
    const cache = localStorage.getItem('ph-user-cache');
    if (cache) {
      const u = JSON.parse(cache);
      ME = { id: u._id || u.id || u.user?._id || u.user?.id };
    }
  } catch(e) {}

  fetch(API_BASE+'/api/users/me',{headers:H}).then(r=>r.ok?r.json():null).then(u=>{
    if(!u)return;
    ME={id:u._id||u.id};
    localStorage.setItem('ph-user-cache', JSON.stringify(u));
  }).catch(()=>{});

  /* Render conversations */
  function renderConvs(list){
    const el=document.getElementById('conv-list');
    if(!list.length){
      el.innerHTML=`<div class="flex flex-col items-center justify-center h-32 text-gray-400 text-sm gap-2 p-4">

  window.filterConvs=function(q){
    renderConvs(q?convs.filter(c=>{const n=`${c.friend?.firstName||''} ${c.friend?.lastName||''}`.toLowerCase();return n.includes(q.toLowerCase());}):convs);
  };

  /* Open conversation */
  window.openConv=function(conv){
    if (activeConv && socket) {
      socket.emit('leave:room');
    }

    activeConv=conv;
    conv.unreadCount = 0;
    renderConvs(convs);

    const f=conv.friend||{};
    const name=`${f.firstName||''} ${f.lastName||''}`.trim()||'User';
    const color=avC(name);
    
    const hdrStatus = getActivityStatus(f);
    document.getElementById('chat-hdr').innerHTML=`
      <button class="msg-back-btn items-center gap-1 text-indigo-500 text-sm font-semibold" style="display:none;background:none;border:none;cursor:pointer;padding:4px 8px;" onclick="showConvPanel()">
        <span class="material-symbols-outlined text-base">arrow_back</span>
      </button>
      <div class="flex items-center gap-3">
        <div class="relative">
          <div class="w-9 h-9 rounded-full flex items-center justify-center font-bold text-white text-sm shrink-0" style="background:${color}">${ini(f.firstName,f.lastName)}</div>
          <span class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 rounded-full border-2 border-white dark:border-gray-900 ${hdrStatus.isOnline ? 'status-dot-online pulse' : 'hidden'}" data-user-hdr-dot="${f._id||f.id}"></span>

            ${hdrStatus.text}
          </div>
        </div>
      </div>
      </div>
      <div class="ml-auto flex items-center gap-2">
        ${!friendIds.has(f._id||f.id) ? `

            <span class="material-symbols-outlined text-sm">person_add</span> Add Friend
          </button>
        ` : ''}
        <button id="voice-call-btn" onclick="startVoiceCall()" class="w-9 h-9 ${friendIds.has(f._id||f.id) ? 'text-green-500 hover:bg-gray-100 dark:hover:bg-gray-800' : 'text-gray-300 dark:text-gray-600 cursor-not-allowed'} rounded-full flex items-center justify-center transition-colors" title="${friendIds.has(f._id||f.id) ? 'Voice Call' : 'Add as friend first to call'}">

        <button id="video-call-btn" onclick="startCall()" class="w-9 h-9 ${friendIds.has(f._id||f.id) ? 'text-indigo-500 hover:bg-gray-100 dark:hover:bg-gray-800' : 'text-gray-300 dark:text-gray-600 cursor-not-allowed'} rounded-full flex items-center justify-center transition-colors" title="${friendIds.has(f._id||f.id) ? 'Video Call' : 'Add as friend first to call'}">
          <span class="material-symbols-outlined">video_call</span>
        </button>
      </div>`;

    
    const tipEl = document.getElementById('typing-indicator');
    if (tipEl) tipEl.classList.add('hidden');

    document.getElementById('msgs').innerHTML=`<div class="flex flex-col items-center justify-center h-32 text-gray-400 text-sm gap-2"><span class="material-symbols-outlined animate-spin">progress_activity</span>Loading…</div>`;

    const friendId=f._id||conv.friendId||conv._id;
    
    if (socket) {
      socket.emit('join:room', { roomId: conv._id });
    }

    // Call read API
    fetch(API_BASE+'/api/messages/read', {
      method: 'POST',
      headers: H,
      body: JSON.stringify({ friendId })
    }).catch(()=>{});

    fetch(API_BASE+`/api/friends/dm/${friendId}`,{headers:H})
      .then(r=>r.ok?r.json():[])
      .then(d=>{allMsgs=d.messages||d||[];renderMsgs();})
      .catch(()=>{
        fetch(API_BASE+`/api/messages/${friendId}`,{headers:H})
          .then(r=>r.ok?r.json():[])
          .then(d=>{allMsgs=d.messages||d||[];renderMsgs();})
          .catch(()=>{allMsgs=[];renderMsgs();});
      });

  /* Render messages */
  function renderMsgs(){
    if(!allMsgs.length){
      document.getElementById('msgs').innerHTML=`<div class="flex flex-col items-center justify-center h-32 text-gray-400 text-sm gap-2">
        <span class="material-symbols-outlined text-4xl">waving_hand</span><p>No messages yet. Say hello! <span class="ph-svg-icon" style="display:inline-flex;align-items:center;vertical-align:middle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12c1.33-4 4-6 9-6 5 0 7.67 2 9 6-1.33 4-4 6-9 6-5 0-7.67-2-9-6z"/></svg></span></p></div>`;
      return;
    }
    document.getElementById('msgs').innerHTML=allMsgs.map(m=>{
      const mine=m.sender===ME?.id||m.sender?._id===ME?.id||m._tmp;
      const ts=new Date(m.createdAt||Date.now()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      
      let ticksHtml = '';
      if (mine) {
        const friend = activeConv?.friend || {};
        const friendId = friend._id || friend.id || activeConv?.friendId;
        const isSeen = m.read_by?.includes(friendId) || m.readBy?.includes(friendId);
        if (isSeen) {
          const fn = friend.firstName || '';
          const ln = friend.lastName || '';
          const c = friend.avatarColor || avC(`${fn} ${ln}`);
          const photo = friend.avatar 
            ? `<img src="${friend.avatar}" class="w-full h-full object-cover rounded-full">`
            : `<span class="text-[7px] font-bold text-white">${((fn[0]||'') + (ln[0]||'')).toUpperCase()}</span>`;
          ticksHtml = `<div class="w-4 h-4 rounded-full flex items-center justify-center shrink-0 ml-1 border border-white dark:border-gray-900" style="background:${friend.avatar ? 'transparent' : c};" title="Seen">${photo}</div>`;
        } else {
          ticksHtml = `<span class="material-symbols-outlined text-[11px] text-indigo-300/80 ml-1" title="Sent">check_circle</span>`;
        }
      }

      return `<div class="flex ${mine?'justify-end':'justify-start'} bubble-in">
        <div class="max-w-[65%] px-4 py-2.5 rounded-2xl text-sm leading-relaxed
          ${mine?'bg-indigo-500 text-white rounded-br-sm':'bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 border border-gray-200 dark:border-gray-700 rounded-bl-sm'}">
          ${esc(m.content)}
          <div class="text-[10px] mt-1 opacity-60 text-right flex items-center justify-end gap-1">
            <span>${ts}</span>
            ${ticksHtml}
          </div>
        </div>
      </div>`;
    }).join('');
    const box=document.getElementById('msgs');box.scrollTop=box.scrollHeight;
  }

  /* Send message — works for both DM and Team chats */
  window.sendMsg=function(){
    const inp=document.getElementById('msg-inp');
    const content=inp.value.trim();
    if(!content||!activeConv)return;
    inp.value='';

    if (socket) {
      socket.emit('typing:stop', { roomId: activeConv._id });
    }

    // Optimistic UI — show message immediately
    allMsgs.push({
      content,
      sender: ME?.id,
      createdAt: new Date().toISOString(),
      _tmp: true,
      read_by: [ME?.id]
    });

    if (activeConv.type === 'team') {
      renderTeamMsgs();
      // Send via socket for real-time + save via API
      if (socket) {
        socket.emit('message:send', { roomId: activeConv._id, content });
      }
      fetch(API_BASE+'/api/messages', {
        method:'POST',
        headers:H,
        body:JSON.stringify({ roomId: activeConv._id, content })
      }).catch(()=>{});
    } else {
      renderMsgs();
      const friendId = activeConv.friend?._id || activeConv.friend?.id || activeConv.friendId;

      fetch(API_BASE+'/api/messages',{
        method:'POST',
        headers:H,
        body:JSON.stringify({ receiverId: friendId, content, roomId: activeConv._id })
      }).then(r => r.json()).then(newMsg => {
        loadConvs();
      }).catch(()=>{});
    }
  };

  /* New conv modal */
  window.openNewConv=function(){
    document.getElementById('nc-modal').classList.replace('hidden','flex');
    document.getElementById('nc-inp').value='';
    loadAllUsers();
  };
  window.closeModal=function(){document.getElementById('nc-modal').classList.replace('flex','hidden');};
  document.getElementById('nc-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

  async function loadAllUsers(){
    if(allUsers.length){renderUserList(allUsers);return;}
    document.getElementById('user-list').innerHTML=`<div class="text-center p-5 text-gray-400 text-sm">Loading…</div>`;
    try{
      const r=await fetch(API_BASE+'/api/users?limit=50',{headers:H});
      const d=await r.json();
      allUsers=(d.users||d||[]).filter(u=>u._id!==ME?.id);
      renderUserList(allUsers);
    }catch(e){document.getElementById('user-list').innerHTML=`<div class="text-center p-5 text-red-400 text-sm">Server offline</div>`;}
  }

  function renderUserList(users){
    document.getElementById('user-list').innerHTML=users.slice(0,30).map(u=>{
      const name=`${u.firstName||''} ${u.lastName||''}`.trim()||'User';
      return `<div class="flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
        onclick="startWith('${u._id}','${u.firstName||''}','${u.lastName||''}')">
        <div class="w-9 h-9 rounded-full flex items-center justify-center font-bold text-white text-xs shrink-0" style="background:${avC(name)}">${ini(u.firstName,u.lastName)}</div>
        <div>
          <div class="font-semibold text-sm">${esc(name)}</div>
          <div class="text-xs text-gray-400">${esc(u.university||u.email||'')}</div>
        </div>
      </div>`;
    }).join('');
  }

  window.searchUsers=function(q){
    const f=q?allUsers.filter(u=>`${u.firstName||''} ${u.lastName||''} ${u.email||''}`.toLowerCase().includes(q.toLowerCase())):allUsers;
    renderUserList(f);
  };

  window.startWith=function(uid,fn,ln){
    closeModal();
    const roomId = [ME.id, uid].sort().join('_');
    openConv({_id:roomId,friendId:uid,friend:{_id:uid,firstName:fn,lastName:ln},lastMessage:null,unreadCount:0});
  };

  // Add friend directly from chat header
  window.addFriendFromChat = async function(userId) {
    try {
      const r = await fetch(API_BASE + `/api/friends/request/${userId}`, { method: 'POST', headers: H });
      const d = await r.json();
      if (r.ok) {
        showToast('Friend request sent! They can accept to unlock calls.', 'success');
      } else {
        showToast(d.error || d.message || 'Could not send request', 'error');
      }
    } catch(e) {
      showToast('Failed to send friend request', 'error');
    }
  };

  /* Load conversations */
  async function loadConvs(){
    // Read cache
    try {
      const cache = localStorage.getItem('ph-convs-cache');
      if (cache) {
        convs = JSON.parse(cache);
        renderConvs(convs);
      }
    } catch(e) {}

    try{
      const r=await fetch(API_BASE+'/api/messages/conversations',{headers:H});
      const d=await r.json();
      convs=d.conversations||d||[];
      // Build friend set for call gating
      friendIds.clear();
      convs.forEach(c => {
        if (c.friend && (c.friend._id || c.friend.id)) {
          friendIds.add(c.friend._id || c.friend.id);
        }
      });
      // Also fetch actual friends list for accuracy
      try {
        const fr = await fetch(API_BASE+'/api/friends', { headers: H });
        if (fr.ok) {
          const fd = await fr.json();
          (fd.friends||[]).forEach(f => friendIds.add(f.id || f._id));
        }
      } catch(e) {}
      localStorage.setItem('ph-convs-cache', JSON.stringify(convs));
      renderConvs(convs);

      // Check URL query parameters for direct chat trigger
      const params = new URLSearchParams(window.location.search);
      const chatUserId = params.get('chat') || params.get('uid');
      if (chatUserId && ME) {
        // Find existing conversation first
        const existing = convs.find(c => c.friendId === chatUserId || (c.friend && c.friend.id === chatUserId));
        if (existing) {
          openConv(existing);
        } else {
          // Fetch user details and open conversation dynamically
          const ur = await fetch(API_BASE + `/api/users/${chatUserId}`, { headers: H });
          if (ur.ok) {
            const user = await ur.json();
            const roomId = [ME.id, user.id || user._id].sort().join('_');
            const fn = user.first_name || user.firstName || '';
            const ln = user.last_name || user.lastName || '';
            openConv({
              _id: roomId,
              friendId: user.id || user._id,
              friend: {
                _id: user.id || user._id,
                id: user.id || user._id,
                firstName: fn,
                lastName: ln,
                onlineStatus: user.online_status || user.onlineStatus || 'offline',
                avatar: user.avatar,
                avatarColor: user.avatar_color
              },
              lastMessage: null,
              unreadCount: 0
            });
          }
        }
      }
    }catch(e){
      if (!convs.length) {
        document.getElementById('conv-list').innerHTML=`<div class="flex flex-col items-center justify-center h-32 text-gray-400 text-sm gap-2 p-4">
           <span class="material-symbols-outlined text-3xl">cloud_off</span><p>Server offline</p></div>`;
      }
    }
  }

  let currentTab = 'chats';
  let pendingRequests = [];
  let teamConvs = [];

  // Switch between Chats, Teams, and Requests tabs
  window.switchTab = function(tab) {
    currentTab = tab;
    const chatsBtn  = document.getElementById('tab-chats');
    const teamsBtn  = document.getElementById('tab-teams');
    const reqBtn    = document.getElementById('tab-requests');
    const active    = 'text-indigo-500 border-b-2 border-indigo-500';
    const inactive  = 'text-gray-400 border-b-2 border-transparent';

    chatsBtn.className = `flex-1 py-2 text-xs font-semibold ${tab==='chats'?active:inactive} transition-colors`;
    teamsBtn.className = `flex-1 py-2 text-xs font-semibold ${tab==='teams'?active:inactive} hover:text-gray-600 transition-colors flex items-center justify-center gap-1`;
    reqBtn.className   = `flex-1 py-2 text-xs font-semibold ${tab==='requests'?active:inactive} hover:text-gray-600 transition-colors flex items-center justify-center gap-1`;

    if (tab === 'chats') {
      renderConvs(convs);
    } else if (tab === 'teams') {
      renderTeamConvs(teamConvs);
    } else {
      renderRequests(pendingRequests);
    }
  };

  // ── Team Conversations ──────────────────────────────────────────────────────
  async function loadTeamConvs() {
    try {
      const r = await fetch(API_BASE + '/api/messages/team-conversations', { headers: H });
      if (r.ok) {
        const d = await r.json();
        teamConvs = d.teams || [];
        // Show badge
        const badge = document.getElementById('team-badge');
        if (badge && teamConvs.length > 0) {
          badge.textContent = teamConvs.length;
          badge.classList.remove('hidden');
        }
      }
    } catch(e) {}
  }

  function renderTeamConvs(list) {
    const el = document.getElementById('conv-list');
    if (!list.length) {
      el.innerHTML = `<div class="flex flex-col items-center justify-center h-32 text-gray-400 text-sm gap-2 p-4">
        <span class="material-symbols-outlined text-3xl">groups</span>
        <p>No team chats yet</p>
        <a href="/teams" class="mt-1 text-indigo-500 text-xs font-semibold hover:underline">Join a team</a>
      </div>`;
      return;
    }
    const TEAM_COLORS = ['#7c3aed','#ec4899','#10b981','#f59e0b','#3b82f6','#6366f1'];
    el.innerHTML = list.map((t, i) => {
      const color = TEAM_COLORS[i % TEAM_COLORS.length];
      const last = t.lastMessage ? `${t.lastMessage.senderName}: ${t.lastMessage.content}` : 'No messages yet';
      const isActive = activeConv && activeConv._id === t._id;
      return `<div class="conv-item flex items-center gap-3 p-3 rounded-xl cursor-pointer transition-all mb-0.5${isActive?' active':''}"
        onclick='openTeamConv(${JSON.stringify(t).replace(/'/g,"&#39;")})'>
        <div class="w-10 h-10 rounded-xl flex items-center justify-center font-bold text-white text-xs shrink-0" style="background:${color}">
          <span class="material-symbols-outlined text-base">groups</span>
        </div>
        <div class="flex-1 min-w-0">
          <div class="font-semibold text-sm truncate">${esc(t.name)}</div>
          <div class="text-xs text-gray-400 truncate">${esc(last.substring(0,40))}</div>
        </div>
        <span class="text-[9px] text-gray-400 shrink-0">${t.memberCount} <span class="material-symbols-outlined text-[10px]">person</span></span>
      </div>`;
    }).join('');
  }

  // ── Open Team Conversation ──────────────────────────────────────────────────
  window.openTeamConv = function(team) {
    if (activeConv && socket) {
      socket.emit('leave:room');
    }

    // Mark as team conversation
    activeConv = { _id: team._id, type: 'team', name: team.name, memberCount: team.memberCount };
    renderTeamConvs(teamConvs);

    // Hide mobile conv panel
    if (typeof hideConvPanel === 'function') hideConvPanel();

    // Build team chat header with group call buttons
    document.getElementById('chat-hdr').innerHTML = `
      <button class="msg-back-btn items-center gap-1 text-indigo-500 text-sm font-semibold" style="display:none;background:none;border:none;cursor:pointer;padding:4px 8px;" onclick="showConvPanel()">
        <span class="material-symbols-outlined text-base">arrow_back</span>
      </button>
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-purple-500 flex items-center justify-center">
          <span class="material-symbols-outlined text-white text-base">groups</span>
        </div>
        <div>
          <div class="font-bold text-sm">${esc(team.name)}</div>
          <div class="text-xs text-gray-400">${team.memberCount} members</div>
        </div>
      </div>
      <div class="ml-auto flex items-center gap-2">
        <button onclick="startGroupVoiceCall()" class="w-9 h-9 text-green-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full flex items-center justify-center transition-colors" title="Group Voice Call">
          <span class="material-symbols-outlined">call</span>
        </button>
        <button onclick="startGroupVideoCall()" class="w-9 h-9 text-indigo-500 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full flex items-center justify-center transition-colors" title="Group Video Call">
          <span class="material-symbols-outlined">video_call</span>
        </button>
      </div>`;

    // Load team messages
    document.getElementById('msgs').innerHTML = `<div class="flex flex-col items-center justify-center h-32 text-gray-400 text-sm gap-2"><span class="material-symbols-outlined animate-spin">progress_activity</span>Loading…</div>`;

    if (socket) {
      socket.emit('join:room', { roomId: team._id });
    }

    fetch(API_BASE + `/api/messages/teams/${team._id}`, { headers: H })
      .then(r => r.ok ? r.json() : { messages: [] })
      .then(d => {
        allMsgs = (d.messages || []).map(m => ({
          content: m.content,
          sender: m.sender,
          createdAt: m.created_at || m.createdAt,
          read_by: m.read_by
        }));
        renderTeamMsgs();
      })
      .catch(() => { allMsgs = []; renderTeamMsgs(); });
  };

  // Render team messages (shows sender name for each message)
  function renderTeamMsgs() {
    if (!allMsgs.length) {
      document.getElementById('msgs').innerHTML = `<div class="flex flex-col items-center justify-center h-32 text-gray-400 text-sm gap-2">
        <span class="material-symbols-outlined text-4xl">groups</span><p>No messages yet. Start the conversation!</p></div>`;
      return;
    }
    document.getElementById('msgs').innerHTML = allMsgs.map(m => {
      const sender = m.sender || {};
      const sId = sender.id || sender._id || m.sender;
      const mine = sId === ME?.id;
      const senderName = mine ? '' : `${sender.first_name || sender.firstName || 'Unknown'}`;
      const ts = new Date(m.createdAt || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const color = avC(senderName || 'X');

      return `<div class="flex ${mine ? 'justify-end' : 'justify-start'} bubble-in">
        ${!mine ? `<div class="w-7 h-7 rounded-full flex items-center justify-center text-white text-[10px] font-bold shrink-0 mt-auto mr-1.5" style="background:${color}">${(senderName[0] || '?').toUpperCase()}</div>` : ''}
        <div class="max-w-[60%] px-4 py-2.5 rounded-2xl text-sm leading-relaxed
          ${mine ? 'bg-indigo-500 text-white rounded-br-sm' : 'bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 border border-gray-200 dark:border-gray-700 rounded-bl-sm'}">

  async function initiateWebRTCCall(targetUserId, voiceOnly = false) {
    isWebRTCCall = true;
    isMuted = false;
    isCameraOff = false;
    document.getElementById('call-modal').classList.replace('hidden', 'flex');
    document.getElementById('jitsi-container').classList.add('hidden');
    document.getElementById('webrtc-container').classList.remove('hidden');

    setCallConnectionStatus('calling');
    setupVoiceOnlyUI(voiceOnly);

    // Reset mute/camera buttons
    const muteBtn = document.getElementById('btn-mute'); if(muteBtn) muteBtn.style.background = '';
    const muteIcon = document.getElementById('mute-icon'); if(muteIcon) muteIcon.textContent = 'mic';
    const camIcon = document.getElementById('camera-icon'); if(camIcon) camIcon.textContent = 'videocam';
    const camBtn = document.getElementById('btn-camera'); if(camBtn) camBtn.style.background = '';

    try {
      localStream = await navigator.mediaDevices.getUserMedia({
        video: !voiceOnly,
        audio: true
      });
      document.getElementById('webrtc-local-video').srcObject = localStream;

      peerConnection = new RTCPeerConnection(rtcConfig);
      localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

      peerConnection.onicecandidate = event => {
        if (event.candidate && socket) {
          socket.emit('webrtc:signal', { targetId: targetUserId, signal: { candidate: event.candidate } });
        }
      };

      peerConnection.ontrack = event => {
        document.getElementById('webrtc-remote-video').srcObject = event.streams[0];
        setCallConnectionStatus('connected');
        startCallTimer();
      };

      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);

      if (socket) {
        socket.emit('webrtc:signal', { targetId: targetUserId, signal: { sdp: peerConnection.localDescription } });
      }
    } catch (err) {
      console.error('[WebRTC] Error initiating call:', err);
      showToast('Could not access camera/microphone', 'error');
      endCall();
    }
  }

  async function acceptWebRTCCall(targetUserId, voiceOnly = false) {
    isWebRTCCall = true;
    isMuted = false;
    isCameraOff = false;
    document.getElementById('call-modal').classList.replace('hidden', 'flex');
    document.getElementById('jitsi-container').classList.add('hidden');
    document.getElementById('webrtc-container').classList.remove('hidden');

    setCallConnectionStatus('connecting');
    setupVoiceOnlyUI(voiceOnly);

    // Reset buttons
    const muteBtn = document.getElementById('btn-mute'); if(muteBtn) muteBtn.style.background = '';
    const muteIcon = document.getElementById('mute-icon'); if(muteIcon) muteIcon.textContent = 'mic';
    const camIcon = document.getElementById('camera-icon'); if(camIcon) camIcon.textContent = 'videocam';
    const camBtn = document.getElementById('btn-camera'); if(camBtn) camBtn.style.background = '';

    try {
      localStream = await navigator.mediaDevices.getUserMedia({
        video: !voiceOnly,
        audio: true
      });
      document.getElementById('webrtc-local-video').srcObject = localStream;

      peerConnection = new RTCPeerConnection(rtcConfig);
      localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

      peerConnection.onicecandidate = event => {
        if (event.candidate && socket) {
          socket.emit('webrtc:signal', { targetId: targetUserId, signal: { candidate: event.candidate } });
        }
      };

      peerConnection.ontrack = event => {
        document.getElementById('webrtc-remote-video').srcObject = event.streams[0];
        setCallConnectionStatus('connected');
        startCallTimer();
      };

      if (pendingSdpOffer) {
        await peerConnection.setRemoteDescription(new RTCSessionDescription(pendingSdpOffer));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        socket.emit('webrtc:signal', { targetId: targetUserId, signal: { sdp: peerConnection.localDescription } });
        pendingSdpOffer = null;
      }
    } catch (err) {
      console.error('[WebRTC] Error accepting call:', err);
      showToast('Could not access camera/microphone', 'error');
      endCall();
    }
  }

  function handleWebRTCSignal(data) {
    const { signal } = data;
    if (!signal) return;

    if (signal.sdp) {
      if (peerConnection) {
        peerConnection.setRemoteDescription(new RTCSessionDescription(signal.sdp))
          .then(async () => {
            if (signal.sdp.type === 'offer') {
              const answer = await peerConnection.createAnswer();
              await peerConnection.setLocalDescription(answer);
              socket.emit('webrtc:signal', { targetId: data.senderId, signal: { sdp: peerConnection.localDescription } });
            }
          });
      } else {
        pendingSdpOffer = signal.sdp;
      }
    } else if (signal.candidate) {
      if (peerConnection) {
        peerConnection.addIceCandidate(new RTCIceCandidate(signal.candidate))
          .catch(e => console.error('[WebRTC] Error adding ICE candidate:', e));
      }
    }
  }

    document.getElementById('jitsi-container').classList.remove('hidden');
    document.getElementById('webrtc-container').classList.add('hidden');
    const container = document.getElementById('jitsi-container');
    container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#fff;font-size:14px;">Loading call...</div>';
    
    await loadJitsiAPI();
    if (!window.JitsiMeetExternalAPI) {
      container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#ff6b6b;font-size:14px;">Failed to load call service. Please refresh.</div>';
      return;
    }
    container.innerHTML = '';

    const domain = "meet.jit.si";
    const options = {
      roomName: roomId,
      width: "100%",
      height: "100%",
      parentNode: container,
      interfaceConfigOverwrite: {
        SHOW_JITSI_WATERMARK: false,
        SHOW_WATERMARK_FOR_GUESTS: false,
      },
      configOverwrite: {
        prejoinPageEnabled: false,
        startWithVideoMuted: voiceOnly,
        startWithAudioMuted: false,
      }
    };
    jitsiApiInstance = new JitsiMeetExternalAPI(domain, options);
    startCallTimer();
  }

  window.endCall = function() {
    if (window._callTimerInterval) { clearInterval(window._callTimerInterval); window._callTimerInterval = null; }
    const timerEl = document.getElementById('call-timer');
    if (timerEl) timerEl.textContent = '00:00';

    if (jitsiApiInstance) {
      jitsiApiInstance.dispose();
      jitsiApiInstance = null;
    }

    if (localStream) {
      localStream.getTracks().forEach(track => track.stop());
      localStream = null;
    }
    if (peerConnection) {
      peerConnection.close();
      peerConnection = null;
    }
    isWebRTCCall = false;
    pendingSdpOffer = null;
    currentVoiceOnly = false;

    // Reset voice-only UI
    const voiceDisplay = document.getElementById('voice-only-display');
    if (voiceDisplay) voiceDisplay.classList.add('hidden');
    const localBubble = document.getElementById('local-video-bubble');
    if (localBubble) localBubble.classList.remove('hidden');

    document.getElementById('webrtc-container').classList.add('hidden');
    document.getElementById('jitsi-container').classList.remove('hidden');

    const modal = document.getElementById('call-modal');
    if (modal) modal.classList.replace('flex', 'hidden');
    
    if (socket && activeCallRoom) {
      const friendId = activeConv?.friend?._id || activeConv?.friend?.id || activeConv?.friendId;
      socket.emit('call:hangup', { roomId: activeCallRoom, targetId: friendId });
    }
    activeCallRoom = null;
  };

  let ringtoneAudio = null;
  function startRingtone() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 440;
      gain.gain.value = 0.15;
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      let on = true;
      ringtoneAudio = {
        ctx, osc, gain,
        interval: setInterval(() => {
          on = !on;
          gain.gain.value = on ? 0.15 : 0;
        }, 600),
        stop() {
          clearInterval(this.interval);
          try { osc.stop(); ctx.close(); } catch(_){}
        }
      };
    } catch(_) {}
  }
  function stopRingtone() {
    if (ringtoneAudio) { ringtoneAudio.stop(); ringtoneAudio = null; }
  }

  window.acceptCall = async function() {
    stopRingtone();
    document.getElementById('incoming-call-modal').classList.replace('flex', 'hidden');
    if (activeCallRoom) {
      const friendId = activeConv?.friend?._id || activeConv?.friend?.id || activeConv?.friendId;
      if (socket) {
        socket.emit('call:accept', { roomId: activeCallRoom, targetId: friendId });
      }
      if (incomingCallIsWebRTC) {
        await acceptWebRTCCall(friendId, incomingCallIsVoiceOnly);
      } else {
        await openJitsiFrame(activeCallRoom, incomingCallIsVoiceOnly);
      }
    }
  };

  window.declineCall = function() {
    stopRingtone();
    document.getElementById('incoming-call-modal').classList.replace('flex', 'hidden');
    if (activeCallRoom) {
      const friendId = activeConv?.friend?._id || activeConv?.friend?.id || activeConv?.friendId;
      if (socket) {
        socket.emit('call:decline', { roomId: activeCallRoom, targetId: friendId });
      }
    }
    activeCallRoom = null;
  };
})();
</script>
<script>
// Mobile responsive: toggle between conversation list and chat
function showConvPanel() {
  document.querySelector('.msg-conv-panel')?.classList.remove('hidden-mobile');
}
function hideConvPanel() {
  document.querySelector('.msg-conv-panel')?.classList.add('hidden-mobile');
}
// When a conversation is clicked on mobile, hide the panel
const origConvList = document.getElementById('conv-list');
if (origConvList) {
  origConvList.addEventListener('click', function(e) {
    const convItem = e.target.closest('.conv-item');
    if (convItem && window.innerWidth <= 768) {
      hideConvPanel();
    }
  });
}
</script>
