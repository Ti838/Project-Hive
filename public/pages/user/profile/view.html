<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Profile â€” ProjectHive</title>
<script>(function(){const t=localStorage.getItem("theme");if(t==="dark"||(!t&&matchMedia("(prefers-color-scheme:dark)").matches)){document.documentElement.classList.add("dark");}})()</script>

<link rel="icon" href="/favicon.png?v=2">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/ph-design.css">
<link rel="stylesheet" href="/assets/css/ph-system.css?v=4">

  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        fontFamily: {
          sans: ['"Inter"', 'sans-serif'],
          heading: ['"Outfit"', 'sans-serif'],
        },
        colors: {

</head>
<body class="ph-page-bg" data-no-float-theme="1">
<div id="ph-sidebar"></div>
<div class="ph-page">
  <div class="ph-topbar">
    <a href="/feed" aria-label="Go Back" style="color:var(--sub);display:flex;align-items:center;text-decoration:none;transition:color .15s" onmouseover="this.style.color='var(--ac)'" onmouseout="this.style.color='var(--sub)'"><span class="material-symbols-outlined">arrow_back</span></a>
    <span class="material-symbols-outlined" style="color:var(--ac)">person</span>
    <h1 id="page-title" style="font-size:16px;font-weight:800;margin:0;flex:1;color:var(--tx)">Profile</h1>
  </div>

  <div class="pv-wrap">
    <!-- Top Card -->
    <div class="pv-top-card">
      <div class="pv-banner" id="pv-banner"></div>
      <div class="pv-header">
        <div class="pv-avatar-wrap">
          <div class="pv-avatar" id="pv-avatar"><span id="pv-initials">?</span></div>
          <div class="pv-actions" id="pv-actions"></div>
        </div>
        <h1 class="pv-name" id="pv-name"></h1>
        <p class="pv-headline" id="pv-headline"></p>
        <p class="pv-location" id="pv-location" style="display:none"><span class="material-symbols-outlined">location_on</span><span id="pv-uni-text"></span></p>
        <div class="pv-connections" id="pv-connections"></div>
      </div>
    </div>

    <!-- 2-Column Layout -->
    <div class="pv-2col">
      <!-- Left -->
      <div>
        <!-- Profile Strength Card (Own Profile only) -->
        <div class="pv-strength-card" id="pv-strength-card" style="display:none">
          <div class="pv-strength-hdr">
            <h3 class="pv-strength-title">Profile Strength: <span id="pv-strength-name">Beginner</span></h3>
            <span class="pv-strength-lbl" id="pv-strength-pct">0%</span>
          </div>
          <div class="pv-strength-bar-bg">
            <div class="pv-strength-bar-fill" id="pv-strength-bar-fill"></div>
          </div>
          <p class="pv-strength-desc" id="pv-strength-desc"></p>
        </div>

        <!-- About -->
        <div class="pv-section" id="sec-about">
          <div class="pv-section-hdr"><h2>About</h2></div>
          <div class="pv-section-body"><p class="pv-bio" id="pv-bio"></p></div>
        </div>

        <!-- Activity -->
        <div class="pv-section" id="sec-activity">
          <div class="pv-section-hdr"><h2>Activity</h2><a href="/feed"><span class="material-symbols-outlined" style="font-size:16px">arrow_forward</span>See all</a></div>
          <div class="pv-section-body" id="pv-activity">
            <!-- Professional Skeleton Loader -->
            <div class="pv-activity-item" style="border-bottom:none; padding-bottom:0">
              <div class="pv-activity-head">
                <div class="pv-skel" style="width:28px; height:28px; border-radius:50%"></div>
                <div class="pv-skel" style="width:140px; height:12px;"></div>
              </div>
              <div class="pv-skel" style="height:14px; width:90%; margin-top:10px;"></div>
              <div class="pv-skel" style="height:14px; width:60%; margin-top:6px;"></div>
            </div>
            <div class="pv-activity-item" style="border-bottom:none; padding-bottom:0; margin-top: 10px;">
              <div class="pv-activity-head">
                <div class="pv-skel" style="width:28px; height:28px; border-radius:50%"></div>
                <div class="pv-skel" style="width:120px; height:12px;"></div>
              </div>
              <div class="pv-skel" style="height:14px; width:80%; margin-top:10px;"></div>
              <div class="pv-skel" style="height:14px; width:40%; margin-top:6px;"></div>
            </div>
          </div>
        </div>

        <!-- Skills -->
        <div class="pv-section" id="sec-skills">
          <div class="pv-section-hdr"><h2>Skills</h2></div>
          <div class="pv-section-body"><div class="pv-skills-list" id="pv-skills"></div></div>
        </div>
      </div>

      <!-- Right -->
      <div>
        <!-- Education / Details -->
        <div class="pv-section" id="sec-details">
          <div class="pv-section-hdr"><h2>Education</h2></div>
          <div class="pv-section-body" id="pv-details"></div>
        </div>

        <!-- Links -->
        <div class="pv-section" id="sec-links" style="display:none">
          <div class="pv-section-hdr"><h2>Contact Info</h2></div>
          <div class="pv-section-body" id="pv-links"></div>
        </div>

        <!-- Teams Section -->
        <div class="pv-section" id="sec-teams" style="display:none">
          <div class="pv-section-hdr">
            <h2>Teams</h2>
            <a href="/teams"><span class="material-symbols-outlined" style="font-size:16px">arrow_forward</span>Browse</a>
          </div>
          <div class="pv-section-body" id="pv-teams">
            <div class="pv-empty"><span class="material-symbols-outlined">group</span><p>No teams yet</p></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Projects Section (full-width below 2-col) -->
    <div class="pv-section" id="sec-projects" style="display:none;margin-top:16px">
      <div class="pv-section-hdr">
        <h2>Projects</h2>
        <a href="/showcase"><span class="material-symbols-outlined" style="font-size:16px">arrow_forward</span>Showcase</a>
      </div>
      <div id="pv-projects" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;padding:4px 0">
        <div class="pv-empty" style="grid-column:1/-1"><span class="material-symbols-outlined">folder_open</span><p>No projects yet</p></div>
      </div>
    </div>

  </div>
</div>

<script src="/assets/js/core/info-modal.js"></script>
<script>
(function(){
  const TK = localStorage.getItem('access_token');
  if (!TK) { location.href='/login'; return; }
  try { const p=JSON.parse(atob(TK.split('.')[1])); if(p.exp&&Date.now()>=p.exp*1000){localStorage.removeItem('access_token');location.href='/login';return;} } catch(e){location.href='/login';return;}

  PHSidebar.init('profile','../../../');

  const H = { Authorization:'Bearer '+TK, 'Content-Type':'application/json' };
  const API = (location.hostname==='localhost'||location.hostname==='127.0.0.1')
    ? (location.port === '3000' ? 'http://localhost:5000' : '')
    : 'https://projecthive-backend.onrender.com';

  const params = new URLSearchParams(location.search);
  const viewId = params.get('id');
  const myData = JSON.parse(localStorage.getItem('user_data')||'{}');
  const isOwnProfile = !viewId || viewId === myData.id;
  const userId = viewId || myData.id;

  let friendCount = 0;
  let profileFriendCount = 0; // the viewed user's friend count

  async function loadProfile() {
    try {
      const endpoint = isOwnProfile ? '/api/users/me' : `/api/users/${userId}`;
      const r = await fetch(API + endpoint, { headers: H });
      if (!r.ok) throw new Error('Failed');
      const u = await r.json();
      renderProfile(u);

      // Use the friendCount from the API (now included for all profiles)
      profileFriendCount = u.friendCount || 0;
      if (isOwnProfile) {
        const fr = await fetch(API + '/api/friends', { headers: H });
        if (fr.ok) { const d = await fr.json(); profileFriendCount = (d.friends||[]).length; }
      }
      updateConnections();

      // Load user's own posts via dedicated endpoint
      const postR = await fetch(API + `/api/posts/user/${userId}?limit=4`, { headers: H });
      if (postR.ok) {
        const pd = await postR.json();
        renderActivity(pd.posts || [], u);
      } else {
        renderActivity([], u);
      }

      // Load user's projects
      const projR = await fetch(API + `/api/projects?author=${userId}&limit=6`, { headers: H }).catch(()=>null);
      if (projR && projR.ok) {
        const pd = await projR.json();
        renderProjects(pd.projects || pd || []);
      }

      // Load user's teams
      const teamsEndpoint = isOwnProfile ? '/api/teams/my-teams' : `/api/users/${userId}/teams`;
      const teamR = await fetch(API + teamsEndpoint, { headers: H }).catch(()=>null);
      if (teamR && teamR.ok) {
        const td = await teamR.json();
        renderTeams(td.teams || td || []);
      }

    } catch(e) { console.error(e); PHToast?.error('Could not load profile'); }
  }

  function updateConnections() {
    const cnt = profileFriendCount;
    document.getElementById('pv-connections').innerHTML = `<span class="pv-conn-link">${cnt} friend${cnt!==1?'s':''}</span>`;
  }

  function renderProfile(u) {
    const fn = u.firstName || u.first_name || '';
    const ln = u.lastName || u.last_name || '';
    const name = (fn + ' ' + ln).trim() || 'Unknown User';

    // Title
    document.getElementById('pv-name').textContent = name;
    document.getElementById('page-title').textContent = name;
    document.title = name + ' â€” ProjectHive';

    // Avatar
    const av = document.getElementById('pv-avatar');
    const ini = document.getElementById('pv-initials');
    if (u.avatar && u.avatar.startsWith('data:')) {
      const img = document.createElement('img'); img.src = u.avatar; img.alt = name;
      av.appendChild(img); ini.style.display = 'none';
    } else {
      ini.textContent = ((fn[0]||'')+(ln[0]||'')).toUpperCase() || '?';
      av.style.background = u.avatarColor || u.avatar_color || '#6366f1';
    }

    // Banner
    const bEl = document.getElementById('pv-banner');
    if (u.bannerImage || u.banner_image) {
      const bimg = document.createElement('img');
      bimg.src = u.bannerImage || u.banner_image;
      bEl.appendChild(bimg);
    }

    // Headline â€” major + university like LinkedIn
    const headline = u.major ? (u.major + (u.university ? ' at ' + u.university : '')) : (u.university || 'Student');
    document.getElementById('pv-headline').textContent = headline;

    // Location
    if (u.university) {
      document.getElementById('pv-location').style.display = 'flex';
      document.getElementById('pv-uni-text').textContent = u.university;
    }

    // Bio
    document.getElementById('pv-bio').textContent = u.bio || 'No information provided.';
    if (!u.bio) document.getElementById('sec-about').style.display = 'none';

    // Skills
    const skillsEl = document.getElementById('pv-skills');
    const skills = u.skills || [];
    if (skills.length) {
      skillsEl.innerHTML = skills.map(s => {
        const skillId = s.id || s._id;
        const count = s.endorsements || 0;
        if (!isOwnProfile && skillId) {
          return `<div class="pv-skill-tag" style="display:inline-flex;align-items:center;gap:6px;cursor:default">
            <span>${esc(s.name||s)}</span>
            <button id="endorse-${skillId}" onclick="endorseSkill('${userId}','${skillId}',this)" title="Endorse this skill"
              style="display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:700;border:1px solid rgba(99,102,241,.25);background:rgba(99,102,241,.07);color:#6366f1;cursor:pointer;transition:all .15s;font-family:inherit">
              <span class="material-symbols-outlined" style="font-size:12px">thumb_up</span>
              <span id="endorse-cnt-${skillId}">${count}</span>
            </button>
          </div>`;
        }
        return `<span class="pv-skill-tag">${esc(s.name||s)}${count>0?` <small style="opacity:.65;font-size:10px">(${count})</small>`:''}</span>`;
      }).join('');
    } else {
      document.getElementById('sec-skills').style.display = 'none';
    }

    // Details / Education
    const detailsHtml = [];
    if (u.university) {
      const yearText = u.yearOfStudy || u.year_of_study;
      const ys = ['','1st Year','2nd Year','3rd Year','4th Year','5th Year / Masters'];
      detailsHtml.push(`<div class="pv-detail-item">
        <div class="pv-detail-icon"><span class="material-symbols-outlined">school</span></div>
        <div class="pv-detail-text">
          <h4>${u.university}</h4>
          <p>${[u.major, yearText ? ys[yearText] || '' : ''].filter(Boolean).join(' Â· ')}</p>
          ${u.createdAt || u.created_at ? `<p style="font-size:12px;color:var(--sub);margin-top:2px">Member since ${new Date(u.createdAt||u.created_at).toLocaleDateString('en-US',{month:'long',year:'numeric'})}</p>` : ''}
        </div>
      </div>`);
    }
    document.getElementById('pv-details').innerHTML = detailsHtml.join('') || '<div class="pv-empty"><span class="material-symbols-outlined">school</span><p>No education info</p></div>';

    // Social Links
    const links = [];
    if (u.github) links.push({icon:'code', label:'GitHub', url:u.github, bg:'#24292e'});
    if (u.linkedin) links.push({icon:'work', label:'LinkedIn', url:u.linkedin, bg:'#0a66c2'});
    if (u.portfolio) links.push({icon:'language', label:'Website', url:u.portfolio, bg:'#6366f1'});
    if (u.email && isOwnProfile) links.push({icon:'email', label:'Email', url:'mailto:'+u.email, bg:'#ea4335', display:u.email});
    if (links.length) {
      document.getElementById('sec-links').style.display = 'block';
      document.getElementById('pv-links').innerHTML = links.map(l => `
        <div class="pv-link-item">
          <div class="pv-link-icon" style="background:${l.bg}15"><span class="material-symbols-outlined" style="color:${l.bg}">${l.icon}</span></div>
          <div class="pv-link-text">
            <div class="label">${l.label}</div>
            <a href="${l.url}" target="_blank">${l.display || l.url.replace(/^https?:\/\/(www\.)?/,'').replace(/\/$/,'')}</a>
          </div>
        </div>`).join('');
    }

    // Action Buttons
    const acts = document.getElementById('pv-actions');
    if (isOwnProfile) {
      acts.innerHTML = `
        <button class="pv-btn pv-btn-primary" onclick="location.href='/profile/edit'">
          <span class="material-symbols-outlined">edit</span>Edit profile
        </button>
        <button class="pv-btn pv-btn-ghost" onclick="location.href='/settings'">
          <span class="material-symbols-outlined">settings</span>
        </button>`;
    } else {
      const fs = u.friendshipStatus;
      const msgUrl = '/messages?chat=' + u.id;
      if (fs === 'friends') {
        acts.innerHTML = `
          <button class="pv-btn pv-btn-primary" onclick="location.href='${msgUrl}'">
            <span class="material-symbols-outlined">send</span>Message
          </button>
          <div class="relative" id="friends-btn-wrap">
            <button class="pv-btn pv-btn-ghost" onclick="toggleFriendsMenu()">
              <span class="material-symbols-outlined">check</span>Friends
              <span class="material-symbols-outlined text-sm ml-0.5">expand_more</span>
            </button>
            <div id="friends-menu" class="hidden absolute right-0 top-full mt-1 w-44 bg-white dark:bg-darkSurface-card border border-gray-200 dark:border-darkSurface-border rounded-xl shadow-xl py-1 z-50">
              <button onclick="unfriend('${u.id}')" class="w-full text-left px-4 py-2.5 text-sm text-rose-600 dark:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-950/30 flex items-center gap-2 transition-all">
                <span class="material-symbols-outlined text-base">person_remove</span>Unfriend
              </button>
            </div>
          </div>`;
      } else if (fs === 'sent') {
        acts.innerHTML = `
          <button class="pv-btn pv-btn-ghost" disabled>
            <span class="material-symbols-outlined">schedule</span>Request Sent
          </button>`;
      } else if (fs === 'received') {
        acts.innerHTML = `
          <button class="pv-btn pv-btn-primary" onclick="acceptReq('${u.pendingReqId}')">
            <span class="material-symbols-outlined">check</span>Accept
          </button>
          <button class="pv-btn pv-btn-ghost" onclick="rejectReq('${u.pendingReqId}')">
            <span class="material-symbols-outlined">close</span>Ignore
          </button>`;
      } else {
        acts.innerHTML = `
          <button class="pv-btn pv-btn-primary" onclick="sendReq('${u.id}')">
            <span class="material-symbols-outlined">person_add</span>Connect
          </button>
          <button class="pv-btn pv-btn-ghost" onclick="location.href='${msgUrl}'">
            <span class="material-symbols-outlined">send</span>Message
          </button>`;
      }
    }

    // Locked profile UI
    if (u.isLocked) {
      document.getElementById('sec-about').style.display = 'none';
      document.getElementById('sec-skills').style.display = 'none';
      document.getElementById('sec-activity').style.display = 'none';
      document.getElementById('sec-details').style.display = 'none';
      document.getElementById('sec-links').style.display = 'none';
      const lockDiv = document.createElement('div');
      lockDiv.style.cssText = 'text-align:center;padding:48px 24px;color:var(--sub);';
      lockDiv.innerHTML = '<span class="material-symbols-outlined" style="font-size:48px;color:var(--border);display:block;margin-bottom:12px">lock</span>' +
        '<p style="font-weight:700;font-size:15px;color:var(--tx);margin-bottom:6px">Private Profile</p>' +
        '<p style="font-size:13px;margin-bottom:16px">Connect with ' + name + ' to see their full profile.</p>';
      document.querySelector('.pv-2col').appendChild(lockDiv);
    }

    // Profile strength card (own profile only)
    if (isOwnProfile) {
      document.getElementById('pv-strength-card').style.display = 'block';
      const pct = u.profileCompletion || u.completionPercentage || u.completion_percentage || 0;
      document.getElementById('pv-strength-pct').textContent = pct + '%';
      document.getElementById('pv-strength-bar-fill').style.width = pct + '%';
      
      let lvl = 'Beginner';
      let desc = 'Add a profile photo, bio, skills, and links to reach Intermediate.';
      if (pct >= 85) {
        lvl = 'All-Star ðŸŒŸ';
        desc = 'Excellent! Your profile is complete and optimized for recruiters and teams.';
      } else if (pct >= 50) {
        lvl = 'Intermediate';
        desc = 'Great start! Add more social links or skills to become an All-Star.';
      }
      
      document.getElementById('pv-strength-name').textContent = lvl;
      document.getElementById('pv-strength-desc').textContent = desc;
    }

    updateConnections();
  }

  function renderActivity(posts, user) {
    const el = document.getElementById('pv-activity');
    if (!posts || !posts.length) {
      el.innerHTML = `<div class="pv-empty"><span class="material-symbols-outlined">article</span><p>No posts yet</p></div>`;
      return;
    }
    const fn = user.firstName || user.first_name || '';
    const ln = user.lastName || user.last_name || '';
    const name = (fn + ' ' + ln).trim();
    const avColor = user.avatarColor || user.avatar_color || '#6366f1';
    const initials = ((fn[0]||'')+(ln[0]||'')).toUpperCase();

    el.innerHTML = posts.map(p => {
      const date = new Date(p.createdAt || p.created_at);
      const ago = timeAgo(date);
      const content = (p.content||'').substring(0, 200) + ((p.content||'').length > 200 ? 'â€¦' : '');
      // reaction count
      const totalReactions = Object.values(p.reactions||{}).reduce((a,b)=>a+b,0);
      return `<div class="pv-activity-item">
        <div class="pv-activity-head">
          <div class="av" style="background:${avColor}">${user.avatar ? '' : initials}</div>
          <div class="meta"><strong>${name}</strong> posted Â· ${ago}</div>
        </div>
        <div class="pv-activity-content">${content}</div>
        <div class="pv-activity-stats">
          ${totalReactions ? `<span>ðŸ‘ ${totalReactions}</span>` : ''}
          ${p.commentsCount ? `<span>ðŸ’¬ ${p.commentsCount}</span>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function timeAgo(date) {
    const s = Math.floor((Date.now()-date.getTime())/1000);
    if(s<60)return 'just now';
    if(s<3600)return Math.floor(s/60)+'m';
    if(s<86400)return Math.floor(s/3600)+'h';
    if(s<604800)return Math.floor(s/86400)+'d';
    if(s<2592000)return Math.floor(s/604800)+'w';
    return date.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }

  const PCOLS=['#6366f1','#7c3aed','#ec4899','#10b981','#f59e0b','#3b82f6'];
  function avC2(s){let h=0;for(const c of s||'')h=c.charCodeAt(0)+((h<<5)-h);return PCOLS[Math.abs(h)%PCOLS.length];}

  function renderProjects(projects) {
    const sec = document.getElementById('sec-projects');
    const el = document.getElementById('pv-projects');
    if (!projects.length) return; // keep hidden with empty state
    sec.style.display = 'block';
    el.innerHTML = projects.map(p => {
      const col = avC2(p.title||'P');
      const pid = p._id||p.id;
      const tech = (p.techStack||p.tags||[]).slice(0,3);
      return `<div style="background:var(--sf);border:1.5px solid var(--bd);border-radius:16px;overflow:hidden;transition:transform .2s,box-shadow .2s;cursor:pointer"
        onmouseover="this.style.transform='translateY(-3px)';this.style.boxShadow='var(--shadow-lg)'"
        onmouseout="this.style.transform='';this.style.boxShadow=''"
        onclick="window.location.href='/showcase?pid=${pid}'">
        <div style="height:60px;background:linear-gradient(135deg,${col}22,${col}44);display:flex;align-items:center;justify-content:center;position:relative">
          <div style="width:38px;height:38px;border-radius:10px;background:${col};color:#fff;font-size:16px;font-weight:800;display:flex;align-items:center;justify-content:center">${(p.title||'P')[0].toUpperCase()}</div>
          ${p.featured?'<span style="position:absolute;top:6px;right:8px;background:#f59e0b;color:#fff;font-size:9px;font-weight:800;padding:1px 6px;border-radius:999px">â˜… Featured</span>':''}
        </div>
        <div style="padding:12px">
          <div style="font-size:13px;font-weight:800;color:var(--tx);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.title||'Untitled')}</div>
          <p style="font-size:11px;color:var(--sub);margin:0 0 8px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc(p.description||'')}</p>
          ${tech.length?`<div style="display:flex;flex-wrap:wrap;gap:4px">${tech.map(t=>`<span style="padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(99,102,241,.1);color:#6366f1">${esc(t)}</span>`).join('')}</div>`:''}
        </div>
      </div>`;
    }).join('');
  }

  function renderTeams(teams) {
    const sec = document.getElementById('sec-teams');
    const el = document.getElementById('pv-teams');
    if (!teams.length) return;
    sec.style.display = 'block';
    el.innerHTML = teams.map(t => {
      const col = avC2(t.name||'T');
      const ini = ((t.name||'T').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2))||'T';
      const members = t.members?.length||t.memberCount||0;
      const isOpen = t.isOpen !== false;
      return `<div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--sf2);border-radius:12px;border:1.5px solid var(--bd);cursor:pointer;transition:background .15s"
        onmouseover="this.style.background='var(--sf)';this.style.borderColor='var(--bd2)'"
        onmouseout="this.style.background='var(--sf2)';this.style.borderColor='var(--bd)'"
        onclick="window.location.href='/teams?tid=${t._id}'">
        <div style="width:40px;height:40px;border-radius:11px;background:${col};color:#fff;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0">${esc(ini)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.name)}</div>
          <div style="font-size:11px;color:var(--sub);margin-top:2px;display:flex;align-items:center;gap:6px">
            <span class="material-symbols-outlined" style="font-size:13px">group</span>${members} member${members!==1?'s':''}
            ${isOpen?'<span style="color:#10b981;font-weight:700">Â· Open</span>':'<span style="color:var(--sub)">Â· Closed</span>'}
          </div>
        </div>
      </div>`;
    }).join('');
  }



  window.sendReq = async function(id) {
    const btn = event.target.closest('button');
    if (btn) { btn.disabled = true; btn.innerHTML = '<span class="material-symbols-outlined">schedule</span>Sending...'; }
    try {
      const r = await fetch(API+'/api/friends/request/'+id, { method:'POST', headers:H });
      if (r.ok) { PHToast?.success('Friend request sent!'); loadProfile(); }
      else { const e = await r.json().catch(()=>({})); PHToast?.error(e.error||'Failed to send request'); if(btn){btn.disabled=false;btn.innerHTML='<span class="material-symbols-outlined">person_add</span>Connect';}}
    } catch(e) { PHToast?.error('Error sending request'); if(btn){btn.disabled=false;} }
  };
  window.acceptReq = async function(id) {
    try {
      const r = await fetch(API+'/api/friends/accept/'+id, { method:'POST', headers:H });
      r.ok ? (PHToast?.success('Connected! ðŸŽ‰'), loadProfile()) : PHToast?.error('Failed');
    } catch(e) { PHToast?.error('Error'); }
  };

  window.rejectReq = async function(id) {
    try {
      const r = await fetch(API+'/api/friends/reject/'+id, { method:'POST', headers:H });
      r.ok ? (PHToast?.success('Request ignored'), loadProfile()) : PHToast?.error('Failed');
    } catch(e) { PHToast?.error('Error'); }
  };

  window.toggleFriendsMenu = function() {
    const menu = document.getElementById('friends-menu');
    if (menu) menu.classList.toggle('hidden');
  };

  // Close friends dropdown on outside click
  document.addEventListener('click', function(e) {
    const wrap = document.getElementById('friends-btn-wrap');
    const menu = document.getElementById('friends-menu');
    if (wrap && menu && !wrap.contains(e.target)) menu.classList.add('hidden');
  });

  window.unfriend = async function(targetId) {
    if (!confirm('Remove this person from your friends list?')) return;
    try {
      const r = await fetch(API + '/api/friends/' + targetId, { method: 'DELETE', headers: H });
      if (r.ok) {
        PHToast?.success('Removed from friends');
        loadProfile(); // reload to update button state
      } else {
        const err = await r.json().catch(()=>({}));
        PHToast?.error(err.error || 'Failed to unfriend');
      }
    } catch(e) { PHToast?.error('Network error'); }
  };

  // Escape HTML helper for profile page
  function esc(s) { const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }

  // Endorse / un-endorse a skill (toggle)
  window.endorseSkill = async function(targetUserId, skillId, btn) {
    btn.disabled = true;
    const cntEl = document.getElementById('endorse-cnt-' + skillId);
    try {
      const r = await fetch(API + `/api/users/${targetUserId}/skills/${skillId}/endorse`, { method:'POST', headers:H });
      if (r.ok) {
        const d = await r.json();
        if (cntEl) cntEl.textContent = d.endorsements;
        if (d.endorsed) {
          btn.style.background='rgba(99,102,241,.18)';
          btn.style.borderColor='#6366f1';
          PHToast?.success('Skill endorsed!');
        } else {
          btn.style.background='rgba(99,102,241,.07)';
          btn.style.borderColor='rgba(99,102,241,.25)';
          PHToast?.info('Endorsement removed');
        }
      } else {
        const e=await r.json().catch(()=>({}));
        PHToast?.error(e.error||'Failed');
      }
    } catch(e) { PHToast?.error('Network error'); }
    btn.disabled = false;
  };

  loadProfile();
})();
</script>
</body></html>
