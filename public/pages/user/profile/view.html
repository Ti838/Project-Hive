<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Profile — ProjectHive</title>
<script>(function(){const t=localStorage.getItem("theme");if(t==="dark"||(!t&&matchMedia("(prefers-color-scheme:dark)").matches)){document.documentElement.classList.add("dark");}})()</script>

<link rel="icon" href="/favicon.png?v=2">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/ph-design.css">
<link rel="stylesheet" href="/assets/css/ph-system.css?v=4">
<script src="/assets/js/core/ph-toast.js"></script>
<script src="/assets/js/core/ph-sidebar.js?v=5"></script>
<script src="/assets/js/core/auth.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        fontFamily: {
          sans: ['"Inter"', 'sans-serif'],
          heading: ['"Outfit"', 'sans-serif'],
        },
        colors: {
          "surface": "#f7f9fb",
          "inverse-surface": "#0C0D14",
          "primary": "#6366f1"
        }
      }
    }
  }
</script>

</head>
<body class="ph-page-bg" data-no-float-theme="1">
<div id="ph-sidebar"></div>
<div class="ph-page">
  <div class="ph-topbar">
    <a href="/feed" aria-label="Go Back" style="color:var(--sub);display:flex;align-items:center;text-decoration:none;transition:color .15s" onmouseover="this.style.color='var(--ac)'" onmouseout="this.style.color='var(--sub)'"><span class="material-symbols-outlined">arrow_back</span></a>
    <span class="material-symbols-outlined" style="color:var(--ac)">person</span>
    <h1 id="page-title" style="font-size:16px;font-weight:800;margin:0;flex:1;color:var(--tx)">Profile</h1>
  </div>

  <div class="pv-wrap">
    <!-- Top Card -->
    <div class="pv-top-card">
      <div class="pv-banner" id="pv-banner"></div>
      <div class="pv-header">
        <div class="pv-avatar-wrap">
          <div class="pv-avatar" id="pv-avatar"><span id="pv-initials">?</span></div>
          <div class="pv-actions" id="pv-actions"></div>
        </div>
        <h1 class="pv-name" id="pv-name"></h1>
        <p class="pv-headline" id="pv-headline"></p>
        <p class="pv-location" id="pv-location" style="display:none"><span class="material-symbols-outlined">location_on</span><span id="pv-uni-text"></span></p>
        <div class="pv-connections" id="pv-connections" style="display:none"></div>
        <div class="pv-stats-grid flex flex-wrap gap-x-4 gap-y-2 mt-4 text-xs font-semibold border-t border-gray-100 dark:border-gray-800/80 pt-4" id="pv-stats-grid"></div>
      </div>
    </div>

    <!-- 2-Column Layout -->
    <div class="pv-2col">
      <!-- Left -->
      <div>
        <!-- Profile Strength Card (Own Profile only) -->
        <div class="pv-strength-card" id="pv-strength-card" style="display:none">
          <div class="pv-strength-hdr">
            <h3 class="pv-strength-title">Profile Strength: <span id="pv-strength-name">Beginner</span></h3>
            <span class="pv-strength-lbl" id="pv-strength-pct">0%</span>
          </div>
          <div class="pv-strength-bar-bg">
            <div class="pv-strength-bar-fill" id="pv-strength-bar-fill"></div>
          </div>
          <p class="pv-strength-desc" id="pv-strength-desc"></p>
        </div>

        <!-- About -->
        <div class="pv-section" id="sec-about">
          <div class="pv-section-hdr"><h2>About</h2></div>
          <div class="pv-section-body"><p class="pv-bio" id="pv-bio"></p></div>
        </div>

        <!-- Activity -->
        <div class="pv-section" id="sec-activity">
          <div class="pv-section-hdr"><h2>Activity</h2><a href="/feed"><span class="material-symbols-outlined" style="font-size:16px">arrow_forward</span>See all</a></div>
          <div class="pv-section-body" id="pv-activity">
            <!-- Professional Skeleton Loader -->
            <div class="pv-activity-item" style="border-bottom:none; padding-bottom:0">
              <div class="pv-activity-head">
                <div class="pv-skel" style="width:28px; height:28px; border-radius:50%"></div>
                <div class="pv-skel" style="width:140px; height:12px;"></div>
              </div>
              <div class="pv-skel" style="height:14px; width:90%; margin-top:10px;"></div>
              <div class="pv-skel" style="height:14px; width:60%; margin-top:6px;"></div>
            </div>
            <div class="pv-activity-item" style="border-bottom:none; padding-bottom:0; margin-top: 10px;">
              <div class="pv-activity-head">
                <div class="pv-skel" style="width:28px; height:28px; border-radius:50%"></div>
                <div class="pv-skel" style="width:120px; height:12px;"></div>
              </div>
              <div class="pv-skel" style="height:14px; width:80%; margin-top:10px;"></div>
              <div class="pv-skel" style="height:14px; width:40%; margin-top:6px;"></div>
            </div>
          </div>
        </div>

        <!-- Skills -->
        <div class="pv-section" id="sec-skills">
          <div class="pv-section-hdr"><h2>Skills</h2></div>
          <div class="pv-section-body"><div class="pv-skills-list" id="pv-skills"></div></div>
        </div>
      </div>

      <!-- Right -->
      <div>
        <!-- Education / Details -->
        <div class="pv-section" id="sec-details">
          <div class="pv-section-hdr"><h2>Education</h2></div>
          <div class="pv-section-body" id="pv-details"></div>
        </div>

        <!-- Links -->
        <div class="pv-section" id="sec-links" style="display:none">
          <div class="pv-section-hdr"><h2>Contact Info</h2></div>
          <div class="pv-section-body" id="pv-links"></div>
        </div>

        <!-- Teams Section -->
        <div class="pv-section" id="sec-teams" style="display:none">
          <div class="pv-section-hdr">
            <h2>Teams</h2>
            <a href="/teams"><span class="material-symbols-outlined" style="font-size:16px">arrow_forward</span>Browse</a>
          </div>
          <div class="pv-section-body" id="pv-teams">
            <div class="pv-empty"><span class="material-symbols-outlined">group</span><p>No teams yet</p></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Projects Section (full-width below 2-col) -->
    <div class="pv-section" id="sec-projects" style="display:none;margin-top:16px">
      <div class="pv-section-hdr">
        <h2>Projects</h2>
        <a href="/showcase"><span class="material-symbols-outlined" style="font-size:16px">arrow_forward</span>Showcase</a>
      </div>
      <div id="pv-projects" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;padding:4px 0">
        <div class="pv-empty" style="grid-column:1/-1"><span class="material-symbols-outlined">folder_open</span><p>No projects yet</p></div>
      </div>
    </div>

  </div>
</div>

<script src="/assets/js/core/info-modal.js"></script>
<script>
(function(){
  const TK = localStorage.getItem('access_token');
  if (!TK) { location.href='/login'; return; }
  try { const p=JSON.parse(atob(TK.split('.')[1])); if(p.exp&&Date.now()>=p.exp*1000){localStorage.removeItem('access_token');location.href='/login';return;} } catch(e){location.href='/login';return;}

  PHSidebar.init('profile','../../../');

  const H = { Authorization:'Bearer '+TK, 'Content-Type':'application/json' };
  const API = (location.hostname==='localhost'||location.hostname==='127.0.0.1')
    ? (location.port === '3000' ? 'http://localhost:5000' : '')
    : 'https://projecthive-backend.onrender.com';

  const params = new URLSearchParams(location.search);
  const viewId = params.get('id');
  const myData = JSON.parse(localStorage.getItem('user_data')||'{}');
  const isOwnProfile = !viewId || viewId === myData.id;
  const userId = viewId || myData.id;

  // Real-time Socket.IO Connection
  let socket;
  if (typeof io !== 'undefined') {
    socket = io(API, { auth: { token: TK }, transports: ['websocket'] });
    socket.on('connect', () => {
      socket.emit('join:user', myData.id || myData._id);
    });
    socket.on('social:relationship-update', (data) => {
      if (data.senderId === userId || data.receiverId === userId) {
        loadProfile();
      }
    });
  }

  async function loadProfile() {
    try {
      const endpoint = isOwnProfile ? '/api/users/me' : `/api/users/${userId}`;
      const r = await fetch(API + endpoint, { headers: H });
      if (!r.ok) throw new Error('Failed');
      const u = await r.json();
      renderProfile(u);

      // Load user's own posts via dedicated endpoint
      const postR = await fetch(API + `/api/posts/user/${userId}?limit=4`, { headers: H });
      if (postR.ok) {
        const pd = await postR.json();
        renderActivity(pd.posts || [], u);
      } else {
        renderActivity([], u);
      }

      // Load user's projects
      const projR = await fetch(API + `/api/projects?author=${userId}&limit=6`, { headers: H }).catch(()=>null);
      if (projR && projR.ok) {
        const pd = await projR.json();
        renderProjects(pd.projects || pd || []);
      }

      // Load user's teams
      const teamsEndpoint = isOwnProfile ? '/api/teams/my-teams' : `/api/users/${userId}/teams`;
      const teamR = await fetch(API + teamsEndpoint, { headers: H }).catch(()=>null);
      if (teamR && teamR.ok) {
        const td = await teamR.json();
        renderTeams(td.teams || td || []);
      }

    } catch(e) { console.error(e); PHToast?.error('Could not load profile'); }
  }

  window.scrollToSection = function(id) {
    const el = document.getElementById(id);
    if (el) {
      el.style.display = 'block';
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  };

  function renderProfile(u) {
    const fn = u.firstName || u.first_name || '';
    const ln = u.lastName || u.last_name || '';
    const name = (fn + ' ' + ln).trim() || 'Unknown User';

    // Title
    document.getElementById('pv-name').textContent = name;
    document.getElementById('page-title').textContent = name;
    document.title = name + ' — ProjectHive';

    // Avatar
    const av = document.getElementById('pv-avatar');
    av.innerHTML = '<span id="pv-initials">?</span>';
    const ini = document.getElementById('pv-initials');
    if (u.avatar && (u.avatar.startsWith('data:') || u.avatar.startsWith('http') || u.avatar.startsWith('/'))) {
      const img = document.createElement('img'); img.src = u.avatar; img.alt = name;
      av.appendChild(img); ini.style.display = 'none';
    } else {
      ini.textContent = ((fn[0]||'')+(ln[0]||'')).toUpperCase() || '?';
      av.style.background = u.avatarColor || u.avatar_color || '#6366f1';
    }

    // Banner
    const bEl = document.getElementById('pv-banner');
    bEl.innerHTML = '';
    if (u.bannerImage || u.banner_image) {
      const bimg = document.createElement('img');
      bimg.src = u.bannerImage || u.banner_image;
      bEl.appendChild(bimg);
    }

    // Headline — major + university like LinkedIn
    const headline = u.major ? (u.major + (u.university ? ' at ' + u.university : '')) : (u.university || 'Student');
    document.getElementById('pv-headline').textContent = headline;

    // Location
    if (u.university) {
      document.getElementById('pv-location').style.display = 'flex';
      document.getElementById('pv-uni-text').textContent = u.university;
    }

    // Render Stats Row
    const statsGrid = document.getElementById('pv-stats-grid');
    if (statsGrid) {
      const stats = [
        { count: u.friendCount || 0, label: 'Friends', action: `openStatsModal('friends')` },
        { count: u.followerCount || 0, label: 'Followers', action: `openStatsModal('followers')` },
        { count: u.followingCount || 0, label: 'Following', action: `openStatsModal('following')` },
        { count: u.projectCount || 0, label: 'Projects', action: `scrollToSection('sec-projects')` },
        { count: u.teamsCount || 0, label: 'Teams', action: `scrollToSection('sec-teams')` },
        { count: u.communitiesCount || 0, label: 'Communities', action: `scrollToSection('sec-teams')` },
        { count: u.postCount || 0, label: 'Posts', action: `scrollToSection('sec-activity')` }
      ];
      statsGrid.innerHTML = stats.map(s => `
        <button onclick="${s.action}" class="flex items-center gap-1 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors text-gray-700 dark:text-gray-300">
          <span class="font-bold text-gray-900 dark:text-white">${s.count}</span>
          <span class="text-gray-500 dark:text-gray-400">${s.label}</span>
        </button>
      `).join('<span class="text-gray-300 dark:text-gray-700 select-none">•</span>');
    }

    // Bio
    document.getElementById('pv-bio').textContent = u.bio || 'No information provided.';
    if (!u.bio) document.getElementById('sec-about').style.display = 'none';

    // Skills
    const skillsEl = document.getElementById('pv-skills');
    const skills = u.skills || [];
    if (skills.length) {
      skillsEl.innerHTML = skills.map(s => {
        const skillId = s.id || s._id;
        const count = s.endorsements || 0;
        if (!isOwnProfile && skillId) {
          return `<div class="pv-skill-tag" style="display:inline-flex;align-items:center;gap:6px;cursor:default">
            <span>${esc(s.name||s)}</span>
            <button id="endorse-${skillId}" onclick="endorseSkill('${userId}','${skillId}',this)" title="Endorse this skill"
              style="display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:700;border:1px solid rgba(99,102,241,.25);background:rgba(99,102,241,.07);color:#6366f1;cursor:pointer;transition:all .15s;font-family:inherit">
              <span class="material-symbols-outlined" style="font-size:12px">thumb_up</span>
              <span id="endorse-cnt-${skillId}">${count}</span>
            </button>
          </div>`;
        }
        return `<span class="pv-skill-tag">${esc(s.name||s)}${count>0?` <small style="opacity:.65;font-size:10px">(${count})</small>`:''}</span>`;
      }).join('');
    } else {
      document.getElementById('sec-skills').style.display = 'none';
    }

    // Details / Education
    const detailsHtml = [];
    if (u.university) {
      const yearText = u.yearOfStudy || u.year_of_study;
      const ys = ['','1st Year','2nd Year','3rd Year','4th Year','5th Year / Masters'];
      detailsHtml.push(`<div class="pv-detail-item">
        <div class="pv-detail-icon"><span class="material-symbols-outlined">school</span></div>
        <div class="pv-detail-text">
          <h4>${u.university}</h4>
          <p>${[u.major, yearText ? ys[yearText] || '' : ''].filter(Boolean).join(' • ')}</p>
          ${u.createdAt || u.created_at ? `<p style="font-size:12px;color:var(--sub);margin-top:2px">Member since ${new Date(u.createdAt||u.created_at).toLocaleDateString('en-US',{month:'long',year:'numeric'})}</p>` : ''}
        </div>
      </div>`);
    }
    document.getElementById('pv-details').innerHTML = detailsHtml.join('') || '<div class="pv-empty"><span class="material-symbols-outlined">school</span><p>No education info</p></div>';

    // Social Links
    const links = [];
    if (u.github) links.push({icon:'code', label:'GitHub', url:u.github, bg:'#24292e'});
    if (u.linkedin) links.push({icon:'work', label:'LinkedIn', url:u.linkedin, bg:'#0a66c2'});
    if (u.portfolio) links.push({icon:'language', label:'Website', url:u.portfolio, bg:'#6366f1'});
    if (u.email && isOwnProfile) links.push({icon:'email', label:'Email', url:'mailto:'+u.email, bg:'#ea4335', display:u.email});
    if (links.length) {
      document.getElementById('sec-links').style.display = 'block';
      document.getElementById('pv-links').innerHTML = links.map(l => `
        <div class="pv-link-item">
          <div class="pv-link-icon" style="background:${l.bg}15"><span class="material-symbols-outlined" style="color:${l.bg}">${l.icon}</span></div>
          <div class="pv-link-text">
            <div class="label">${l.label}</div>
            <a href="${l.url}" target="_blank">${l.display || l.url.replace(/^https?:\/\/(www\.)?/,'').replace(/\/$/,'')}</a>
          </div>
        </div>`).join('');
    }

    // Action Buttons
    const acts = document.getElementById('pv-actions');
    if (isOwnProfile) {
      acts.innerHTML = `
        <button class="pv-btn pv-btn-primary" onclick="location.href='/profile/edit'">
          <span class="material-symbols-outlined">edit</span>Edit profile
        </button>
        <button class="pv-btn pv-btn-ghost" onclick="location.href='/settings'">
          <span class="material-symbols-outlined">settings</span>
        </button>`;
    } else {
      const fs = u.friendshipStatus;
      const msgUrl = '/messages?chat=' + u.id;
      let buttonsHtml = '';

      if (fs === 'BLOCKED') {
        buttonsHtml = `
          <button class="pv-btn pv-btn-primary bg-rose-600 hover:bg-rose-700 text-white" onclick="unblockUser('${u.id}')">
            <span class="material-symbols-outlined">block</span>Unblock
          </button>`;
      } else if (fs === 'BLOCKED_BY_OTHER') {
        buttonsHtml = `
          <button class="pv-btn pv-btn-ghost" disabled>
            <span class="material-symbols-outlined">block</span>Unavailable
          </button>`;
      } else if (fs === 'FRIEND') {
        buttonsHtml = `
          <button class="pv-btn pv-btn-primary" onclick="location.href='${msgUrl}'">
            <span class="material-symbols-outlined">send</span>Message
          </button>
          <div class="relative inline-block text-left" id="profile-actions-wrap">
            <button class="pv-btn pv-btn-ghost" onclick="toggleProfileMenu()">
              <span class="material-symbols-outlined">check</span>Friends
              <span class="material-symbols-outlined text-sm ml-0.5">expand_more</span>
            </button>
            <div id="profile-actions-menu" class="hidden absolute right-0 top-full mt-1 w-44 bg-white dark:bg-darkSurface-card border border-gray-200 dark:border-darkSurface-border rounded-xl shadow-xl py-1 z-50">
              <button onclick="unfriend('${u.id}')" class="w-full text-left px-4 py-2 text-sm text-rose-600 dark:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-950/30 flex items-center gap-2 transition-all">
                <span class="material-symbols-outlined text-base">person_remove</span>Unfriend
              </button>
              <button onclick="blockUser('${u.id}')" class="w-full text-left px-4 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-950/30 flex items-center gap-2 transition-all">
                <span class="material-symbols-outlined text-base">block</span>Block
              </button>
            </div>
          </div>`;
      } else if (fs === 'REQUEST_SENT') {
        buttonsHtml = `
          <button class="pv-btn pv-btn-ghost" onclick="cancelReq('${u.id}')">
            <span class="material-symbols-outlined">close</span>Cancel Request
          </button>
          <button class="pv-btn pv-btn-primary" onclick="location.href='${msgUrl}'">
            <span class="material-symbols-outlined">send</span>Message
          </button>`;
      } else if (fs === 'REQUEST_RECEIVED') {
        buttonsHtml = `
          <button class="pv-btn pv-btn-primary" onclick="acceptReq('${u.id}')">
            <span class="material-symbols-outlined">check</span>Accept
          </button>
          <button class="pv-btn pv-btn-ghost" onclick="rejectReq('${u.id}')">
            <span class="material-symbols-outlined">close</span>Ignore
          </button>`;
      } else if (fs === 'FOLLOWING') {
        buttonsHtml = `
          <button class="pv-btn pv-btn-primary" onclick="sendReq('${u.id}')">
            <span class="material-symbols-outlined">person_add</span>Connect
          </button>
          <button class="pv-btn pv-btn-ghost" onclick="unfollowUser('${u.id}')">
            <span class="material-symbols-outlined">do_not_distribute</span>Unfollow
          </button>
          <div class="relative inline-block text-left" id="profile-actions-wrap">
            <button class="pv-btn pv-btn-ghost" onclick="toggleProfileMenu()">
              <span class="material-symbols-outlined">more_horiz</span>
            </button>
            <div id="profile-actions-menu" class="hidden absolute right-0 top-full mt-1 w-44 bg-white dark:bg-darkSurface-card border border-gray-200 dark:border-darkSurface-border rounded-xl shadow-xl py-1 z-50">
              <button onclick="blockUser('${u.id}')" class="w-full text-left px-4 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-950/30 flex items-center gap-2 transition-all">
                <span class="material-symbols-outlined text-base">block</span>Block
              </button>
            </div>
          </div>`;
      } else if (fs === 'FOLLOWER') {
        buttonsHtml = `
          <button class="pv-btn pv-btn-primary" onclick="sendReq('${u.id}')">
            <span class="material-symbols-outlined">person_add</span>Connect
          </button>
          <button class="pv-btn pv-btn-ghost" onclick="followUser('${u.id}')">
            <span class="material-symbols-outlined">add</span>Follow Back
          </button>
          <div class="relative inline-block text-left" id="profile-actions-wrap">
            <button class="pv-btn pv-btn-ghost" onclick="toggleProfileMenu()">
              <span class="material-symbols-outlined">more_horiz</span>
            </button>
            <div id="profile-actions-menu" class="hidden absolute right-0 top-full mt-1 w-44 bg-white dark:bg-darkSurface-card border border-gray-200 dark:border-darkSurface-border rounded-xl shadow-xl py-1 z-50">
              <button onclick="blockUser('${u.id}')" class="w-full text-left px-4 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-950/30 flex items-center gap-2 transition-all">
                <span class="material-symbols-outlined text-base">block</span>Block
              </button>
            </div>
          </div>`;
      } else {
        // NOT_FRIEND
        buttonsHtml = `
          <button class="pv-btn pv-btn-primary" onclick="sendReq('${u.id}')">
            <span class="material-symbols-outlined">person_add</span>Connect
          </button>
          <button class="pv-btn pv-btn-ghost" onclick="followUser('${u.id}')">
            <span class="material-symbols-outlined">add</span>Follow
          </button>
          <div class="relative inline-block text-left" id="profile-actions-wrap">
            <button class="pv-btn pv-btn-ghost" onclick="toggleProfileMenu()">
              <span class="material-symbols-outlined">more_horiz</span>
            </button>
            <div id="profile-actions-menu" class="hidden absolute right-0 top-full mt-1 w-44 bg-white dark:bg-darkSurface-card border border-gray-200 dark:border-darkSurface-border rounded-xl shadow-xl py-1 z-50">
              <button onclick="blockUser('${u.id}')" class="w-full text-left px-4 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-950/30 flex items-center gap-2 transition-all">
                <span class="material-symbols-outlined text-base">block</span>Block
              </button>
            </div>
          </div>`;
      }
      acts.innerHTML = buttonsHtml;
    }

    // Locked profile UI
    if (u.isLocked) {

  function renderActivity(posts, user) {
    const el = document.getElementById('pv-activity');
    if (!posts || !posts.length) {
      el.innerHTML = `<div class="pv-empty"><span class="material-symbols-outlined">article</span><p>No posts yet</p></div>`;
      return;
    }
    const fn = user.firstName || user.first_name || '';
    const ln = user.lastName || user.last_name || '';
    const name = (fn + ' ' + ln).trim();
    const avColor = user.avatarColor || user.avatar_color || '#6366f1';
    const initials = ((fn[0]||'')+(ln[0]||'')).toUpperCase();

    el.innerHTML = posts.map(p => {
      const date = new Date(p.createdAt || p.created_at);
      const ago = timeAgo(date);
      const content = (p.content||'').substring(0, 200) + ((p.content||'').length > 200 ? '…' : '');
      const totalReactions = Object.values(p.reactions||{}).reduce((a,b)=>a+b,0);
      return `<div class="pv-activity-item">
        <div class="pv-activity-head">
          <div class="av" style="background:${avColor}">${user.avatar ? '' : initials}</div>
          <div class="meta"><strong>${name}</strong> posted • ${ago}</div>
        </div>
        <div class="pv-activity-content">${content}</div>
        <div class="pv-activity-stats">
          ${totalReactions ? `<span>👍  ${totalReactions}</span>` : ''}
          ${p.commentsCount ? `<span>💡  ${p.commentsCount}</span>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function timeAgo(date) {
    const s = Math.floor((Date.now()-date.getTime())/1000);
    if(s<60)return 'just now';
    if(s<3600)return Math.floor(s/60)+'m';
    if(s<86400)return Math.floor(s/3600)+'h';
    if(s<604800)return Math.floor(s/86400)+'d';
    if(s<2592000)return Math.floor(s/604800)+'w';
    return date.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }

    const btnConfirm = modal.querySelector('#ph-confirm-ok');
    btnCancel.addEventListener('mouseenter', () => btnCancel.style.background = 'var(--bg-surface-variant, #f1f5f9)');
    btnCancel.addEventListener('mouseleave', () => btnCancel.style.background = 'none');
    btnConfirm.addEventListener('mouseenter', () => btnConfirm.style.background = confirmBtnHoverBg);
    btnConfirm.addEventListener('mouseleave', () => btnConfirm.style.background = 'none');

    const container = modal.querySelector('.lo-card');
    function hide() {
      modal.style.opacity = '0';
      modal.style.pointerEvents = 'none';
      container.style.transform = 'scale(0.9) translateY(10px)';
    }

    btnCancel.addEventListener('click', hide);
    btnConfirm.addEventListener('click', () => { hide(); if (typeof onConfirm === 'function') onConfirm(); });
    modal.addEventListener('click', (e) => { if (e.target === modal) hide(); });

    modal.style.pointerEvents = 'all';
    modal.style.opacity = '1';
    requestAnimationFrame(() => { container.style.transform = 'scale(1) translateY(0)'; });
  };

  loadProfile();
})();
</script>
</body></html>
