<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Project Showcase — ProjectHive</title>
<script>(function(){const t=localStorage.getItem('theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark');}})()</script>
<style>
  html { background-color: #F0F2F9 !important; }
  html.dark { background-color: #0C0D14 !important; }
  body { background-color: #F0F2F9 !important; }
  html.dark body { background-color: #0C0D14 !important; }
</style>
<link rel="icon" href="/favicon.png?v=2">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link rel="stylesheet" href="/assets/css/ph-system.css?v=4">
<link rel="stylesheet" href="/assets/css/ph-design.css">
<script src="/assets/js/core/ph-toast.js"></script>
<script src="/assets/js/core/ph-sidebar.js?v=5"></script>
<script src="/assets/js/core/auth.js"></script>
<style>
body{font-family:'Inter',sans-serif;}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;display:inline-block;vertical-align:middle;}
.project-card{transition:all .25s;}
.project-card:hover{transform:translateY(-3px);box-shadow:0 12px 36px rgba(99,102,241,.12);}
.tag{display:inline-flex;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600;background:rgba(99,102,241,.1);color:#6366f1;}
.dark .tag{background:rgba(99,102,241,.2);}
</style>
<script>tailwind.config={darkMode:"class",theme:{extend:{colors:{"accent":"#6366f1","accent-dark":"#818cf8"}}}}</script>
<style>
/* Mobile showcase responsive */
@media(max-width:768px){
  .ml-\[260px\]{margin-left:0!important;padding-bottom:80px!important;}
  header.sticky{padding:0 14px!important;height:56px!important;}
  main.p-8{padding:14px!important;}
  .grid-cols-1.md\:grid-cols-2.xl\:grid-cols-3{grid-template-columns:1fr!important;}
  #search-inp{width:120px!important;}
}
html.dark .bg-white{background:var(--sf,#13141E)!important;}
html.dark .dark\:bg-gray-900{background:var(--sf,#13141E)!important;}
html.dark .border-gray-200{border-color:var(--bd,#252636)!important;}
html.dark .dark\:border-gray-800{border-color:var(--bd,#252636)!important;}
</style></head>
<body class="bg-slate-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen" data-no-float-theme="1">
<div id="ph-sidebar"></div>

<div class="ml-[260px] min-h-screen max-md:ml-0">
  <header class="sticky top-0 z-40 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 px-8 h-16 flex items-center gap-4 max-md:px-4">
    <div id="ph-hamburger-slot"></div>
    <button onclick="history.back()" class="w-9 h-9 rounded-full flex items-center justify-center hover:bg-slate-100 dark:hover:bg-gray-800 transition-colors shrink-0 text-gray-700 dark:text-gray-300" title="Go Back" aria-label="Go Back">
      <span class="material-symbols-outlined text-[20px]">arrow_back</span>
    </button>
    <span class="material-symbols-outlined text-indigo-500 hidden md:block">star</span>
    <h1 class="font-bold text-lg">Project Showcase</h1>
    <div class="ml-auto flex gap-3">
      <div class="relative">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-base">search</span>
        <input id="search-inp" type="text" placeholder="Search projectsâ€¦" oninput="doSearch(this.value)"
          class="bg-slate-100 dark:bg-gray-800 border-none rounded-full pl-9 pr-4 py-2 text-sm w-52 outline-none focus:ring-2 focus:ring-indigo-400 transition-all max-md:w-36">
      </div>
      <button onclick="openSubmitModal()" class="flex items-center gap-1.5 bg-indigo-500 hover:bg-indigo-600 text-white text-sm font-semibold px-4 py-2 rounded-full transition-colors">
        <span class="material-symbols-outlined text-base">upload</span> Submit
      </button>
    </div>
  </header>

  <main class="p-8 max-md:p-4">
    <!-- Filter bar -->
    <div class="flex gap-2 mb-6 overflow-x-auto pb-1">
      <button class="filter-btn whitespace-nowrap px-4 py-2 rounded-full text-sm font-semibold bg-indigo-500 text-white transition-all" data-filter="all" onclick="setFilter('all',this)">All Projects</button>
      <button class="filter-btn whitespace-nowrap px-4 py-2 rounded-full text-sm font-semibold bg-slate-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-indigo-50 transition-all" data-filter="ai" onclick="setFilter('ai',this)">AI / ML</button>
      <button class="filter-btn whitespace-nowrap px-4 py-2 rounded-full text-sm font-semibold bg-slate-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-indigo-50 transition-all" data-filter="web" onclick="setFilter('web',this)">Web</button>
      <button class="filter-btn whitespace-nowrap px-4 py-2 rounded-full text-sm font-semibold bg-slate-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-indigo-50 transition-all" data-filter="mobile" onclick="setFilter('mobile',this)">Mobile</button>
      <button class="filter-btn whitespace-nowrap px-4 py-2 rounded-full text-sm font-semibold bg-slate-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-indigo-50 transition-all" data-filter="mine" onclick="setFilter('mine',this)">My Projects</button>
    </div>

    <!-- Grid -->
    <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
      <div class="col-span-full flex flex-col items-center justify-center py-16 text-gray-400 gap-3">
        <span class="material-symbols-outlined text-5xl animate-pulse">folder_open</span>
        <p class="text-sm">Loading projectsâ€¦</p>
      </div>
    </div>
  </main>
</div>

<!-- Submit Project Modal -->
<div id="submit-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
  <div class="bg-white dark:bg-gray-900 rounded-2xl w-full max-w-lg shadow-2xl max-h-[90vh] overflow-y-auto">
    <div class="p-5 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center sticky top-0 bg-white dark:bg-gray-900">
      <h3 class="font-bold">Submit Your Project</h3>
      <button onclick="closeModal()" aria-label="Close" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <form id="submit-form" class="p-5 flex flex-col gap-4">
      <div>
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5 block">Project Title *</label>
        <input id="f-title" type="text" required class="w-full bg-slate-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-indigo-400" placeholder="e.g. BioScan AI">
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5 block">Description *</label>
        <textarea id="f-desc" rows="3" required class="w-full bg-slate-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-indigo-400 resize-none" placeholder="What does your project do?"></textarea>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5 block">Category</label>
        <select id="f-cat" class="w-full bg-slate-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="web">Web</option>
          <option value="mobile">Mobile</option>
          <option value="ai">AI / ML</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5 block">Tech Stack (comma separated)</label>
        <input id="f-tech" type="text" class="w-full bg-slate-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-indigo-400" placeholder="React, Node.js, MongoDBâ€¦">
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5 block">GitHub URL</label>
        <input id="f-github" type="url" class="w-full bg-slate-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-indigo-400" placeholder="https://github.com/â€¦">
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5 block">Live Demo URL</label>
        <input id="f-demo" type="url" class="w-full bg-slate-50 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-indigo-400" placeholder="https://â€¦">
      </div>
      <div class="flex items-center gap-2 mt-2">
        <input id="f-hiring" type="checkbox" class="w-4 h-4 cursor-pointer accent-indigo-500 rounded border-gray-300">
        <label for="f-hiring" class="text-sm font-semibold text-gray-700 dark:text-gray-300">Looking for team members / Hiring</label>
      </div>
      <button type="submit" id="submit-btn" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 rounded-xl transition-colors flex items-center justify-center gap-2">
        <span class="material-symbols-outlined">upload</span> Submit Project
      </button>
    </form>
  </div>
</div>

<!-- Project Details Modal -->
<div id="detail-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
  <div class="bg-white dark:bg-gray-900 rounded-3xl w-full max-w-2xl shadow-2xl max-h-[92vh] overflow-y-auto border border-gray-200 dark:border-gray-800">
    <div class="p-6 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center sticky top-0 bg-white dark:bg-gray-900 z-10">
      <h3 class="font-extrabold text-xl text-gray-900 dark:text-gray-100" id="det-title">Project Details</h3>
      <button onclick="closeDetailModal()" class="w-8 h-8 rounded-full flex items-center justify-center text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 hover:bg-slate-100 dark:hover:bg-gray-850 transition-colors">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="p-6 md:p-8 flex flex-col gap-6" id="det-content">
      <!-- Dynamic loading state -->
      <div class="flex flex-col items-center justify-center py-12 text-gray-400 gap-3">
        <span class="material-symbols-outlined text-4xl animate-spin">progress_activity</span>
        <p class="text-sm">Fetching project detailsâ€¦</p>
      </div>
    </div>
  </div>
</div>


<script>
(function(){
  const TK=localStorage.getItem('access_token');
  if(!TK){window.location.href='/login';return;}
  try{
    const p=JSON.parse(atob(TK.split('.')[1]));
    if(p.exp&&Date.now()>=p.exp*1000){localStorage.removeItem('access_token');window.location.href='/login';return;}
  }catch(e){window.location.href='/login';return;}
  PHSidebar.init('showcase','../../../');

  window.PHConfirm = function({ title, message, confirmText = 'Confirm', cancelText = 'Cancel', danger = false, onConfirm }) {
    let modal = document.getElementById('ph-custom-confirm-modal');
    if (!modal) {
      modal = document.createElement('div');
      modal.id = 'ph-custom-confirm-modal';
      modal.style.cssText = `
        position: fixed;
        inset: 0;
        z-index: 999999;
        background: rgba(0,0,0,0.55);
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.22s ease;
        padding: 16px;
        font-family: 'Inter', sans-serif;
      `;
      document.body.appendChild(modal);
    }
    
    const iconColor = danger ? '#ef4444' : '#6366f1';
    const iconBg = danger ? 'rgba(239,68,68,0.08)' : 'rgba(99,102,241,0.08)';
    const iconBorder = danger ? 'rgba(239,68,68,0.15)' : 'rgba(99,102,241,0.15)';
    const confirmBtnColor = danger ? '#ef4444' : '#6366f1';
    const confirmBtnHoverBg = danger ? 'rgba(239,68,68,0.06)' : 'rgba(99,102,241,0.06)';
    
    const iconSvg = danger 
      ? `<svg viewBox="0 0 24 24" width="26" height="26" stroke="${iconColor}" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>`
      : `<svg viewBox="0 0 24 24" width="26" height="26" stroke="${iconColor}" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`;

    modal.innerHTML = `
      <div class="lo-card" style="
        background: var(--bg-surface-container-lowest, var(--ph-card, #fff));
        border: 1px solid var(--border-outline, var(--ph-border, #e2e8f0));
        border-radius: 24px;
        width: 100%;
        max-width: 360px;
        overflow: hidden;
        box-shadow: 0 24px 64px rgba(0,0,0,0.3);
        transform: scale(0.9) translateY(10px);
        transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      ">
        <div class="lo-header" style="padding: 28px 24px 20px; text-align: center;">
          <div class="lo-icon" style="
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: ${iconBg};
            border: 1.5px solid ${iconBorder};
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
          ">
            ${iconSvg}
          </div>
          <h3 class="lo-title" style="
            font-size: 17px;
            font-weight: 800;
            color: var(--text-on-surface, var(--ph-txt, #0f172a));
            margin: 0 0 8px;
          ">${title}</h3>
          <p class="lo-msg" style="
            font-size: 13px;
            color: var(--text-on-surface-variant, var(--ph-txt2, #475569));
            line-height: 1.5;
            margin: 0;
          ">${message}</p>
        </div>
        <div class="lo-actions" style="display: flex; border-top: 1px solid var(--border-outline, var(--ph-border, #e2e8f0));">
          <button class="lo-btn lo-btn-cancel" id="ph-confirm-cancel" style="
            flex: 1;
            padding: 15px 12px;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: background 0.15s;
            color: var(--text-on-surface-variant, var(--ph-txt2, #475569));
          ">${cancelText}</button>
          <button class="lo-btn lo-btn-confirm" id="ph-confirm-ok" style="
            flex: 1;
            padding: 15px 12px;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: background 0.15s;
            color: ${confirmBtnColor};
            border-left: 1px solid var(--border-outline, var(--ph-border, #e2e8f0));
          ">${confirmText}</button>
        </div>
      </div>
    `;

    const btnCancel = modal.querySelector('#ph-confirm-cancel');
    const btnConfirm = modal.querySelector('#ph-confirm-ok');
    
    btnCancel.addEventListener('mouseenter', () => btnCancel.style.background = 'var(--bg-surface-variant, #f1f5f9)');
    btnCancel.addEventListener('mouseleave', () => btnCancel.style.background = 'none');
    btnConfirm.addEventListener('mouseenter', () => btnConfirm.style.background = confirmBtnHoverBg);
    btnConfirm.addEventListener('mouseleave', () => btnConfirm.style.background = 'none');

    const container = modal.querySelector('.lo-card');
    
    function hide() {
      modal.style.opacity = '0';
      modal.style.pointerEvents = 'none';
      container.style.transform = 'scale(0.9) translateY(10px)';
    }

    btnCancel.addEventListener('click', hide);
    btnConfirm.addEventListener('click', () => {
      hide();
      if (typeof onConfirm === 'function') onConfirm();
    });
    
    modal.addEventListener('click', (e) => {
      if (e.target === modal) hide();
    });

    modal.style.pointerEvents = 'all';
    modal.style.opacity = '1';
    requestAnimationFrame(() => {
      container.style.transform = 'scale(1) translateY(0)';
    });
  };

  const H={Authorization:'Bearer '+TK,'Content-Type':'application/json'};
  const API_BASE=(location.hostname==='localhost'||location.hostname==='127.0.0.1')
    ? (location.port === '3000' ? 'http://localhost:5000' : '')
    : 'https://projecthive-backend.onrender.com';
  const COLS=['#6366f1','#7c3aed','#ec4899','#10b981','#f59e0b','#3b82f6'];
  function avC(s){let h=0;for(const c of s||'')h=c.charCodeAt(0)+((h<<5)-h);return COLS[Math.abs(h)%COLS.length];}

  let allProjects=[], myId='', activeFilter='all';

  fetch(API_BASE+'/api/users/me',{headers:H}).then(r=>r.ok?r.json():null).then(u=>{if(u)myId=u._id||u.id;}).catch(()=>{});

  let savedIds = new Set();

  // Load saved project IDs
  fetch(API_BASE+'/api/saved?type=project',{headers:H}).then(r=>r.ok?r.json():null).then(d=>{
    if(d){ (d.items||d||[]).forEach(s=>{ const id=s.project_id||s.projectId||(s.project?._id||s.project?.id); if(id) savedIds.add(id); }); }
  }).catch(()=>{});

  function render(list){
    const el=document.getElementById('projects-grid');
    if(!list.length){
      el.innerHTML=`<div class="col-span-full flex flex-col items-center justify-center py-16 text-gray-400 gap-3">
        <span class="material-symbols-outlined text-5xl">folder_open</span>
        <p class="text-sm">No projects found. <button onclick="openSubmitModal()" class="text-indigo-500 underline">Submit yours!</button></p>
      </div>`;
      return;
    }
    el.innerHTML=list.map(p=>{
      const col=avC(p.title||'P');
      const tech=(p.tech_stack||p.techStack||p.tags||[]).slice(0,4);
      const isMine=(p.owner?.id||p.owner_id||p.author?._id||p.author)===myId;
      const pid=p._id||p.id;
      const isSaved=savedIds.has(pid);
      const isLiked=p.isLiked || false; // Checked during render / load
      const likesCount=p.likes || 0;
      const lookingForMembers = p.looking_for_members || p.lookingForMembers || false;

      return `<div id="project-card-${pid}" class="project-card bg-white dark:bg-gray-900 rounded-2xl border border-gray-200 dark:border-gray-800 overflow-hidden flex flex-col justify-between">
        <div onclick="openDetailModal('${pid}')" class="cursor-pointer">
          <!-- Header banner -->
          <div class="h-20 flex items-center justify-center relative" style="background:linear-gradient(135deg,${col}22,${col}44)">
            <div class="w-12 h-12 rounded-xl flex items-center justify-center text-white font-bold text-lg" style="background:${col}">${(p.title||'P')[0].toUpperCase()}</div>
            ${isMine?'<span class="absolute top-2 right-2 bg-indigo-500 text-white text-xs font-bold px-2 py-0.5 rounded-full">Mine</span>':''}
            <div class="absolute top-2 left-2 flex gap-1">
              ${p.featured?'<span class="bg-amber-400 text-white text-[10px] font-bold px-2 py-0.5 rounded-full flex items-center gap-0.5"><span class="material-symbols-outlined text-[11px] fill-current">star</span>Featured</span>':''}
              ${p.category?`<span class="bg-black/30 text-white text-[10px] font-semibold px-2 py-0.5 rounded-full capitalize">${p.category}</span>`:''}
              ${lookingForMembers?`<span class="bg-emerald-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full flex items-center gap-0.5"><span class="material-symbols-outlined text-[11px]">group</span>Hiring</span>`:''}
            </div>
          </div>
          <div class="p-5 pb-2">
            <h3 class="font-bold text-base mb-1 truncate text-gray-900 dark:text-gray-100">${p.title||'Untitled'}</h3>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-3 line-clamp-2">${p.description||'No description.'}</p>
            ${tech.length?`<div class="flex flex-wrap gap-1.5 mb-3">${tech.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:''}
          </div>
        </div>
        <div class="p-5 pt-0">
          <div class="flex items-center justify-between pt-3 border-t border-gray-100 dark:border-gray-800">
            <div class="flex items-center gap-2 text-xs text-gray-400">
              <div class="w-5 h-5 rounded-full flex items-center justify-center text-white text-[9px] font-bold" style="background:${avC((p.owner?.first_name || p.author?.firstName||'?'))}">
                ${(p.owner?.first_name || p.author?.firstName||'?')[0]}
              </div>
              ${p.owner?.first_name || p.author?.firstName || 'Anonymous'}
            </div>
            <div class="flex gap-1 items-center">
              <button onclick="toggleLike('${pid}',this)" class="p-1.5 flex items-center gap-0.5 text-xs transition-colors ${isLiked?'text-pink-500':'text-gray-400 hover:text-pink-500'}" title="${isLiked?'Unlike':'Like project'}">
                <span class="material-symbols-outlined text-base" style="${isLiked?'font-variation-settings:\'FILL\' 1':''}">${isLiked?'favorite':'favorite_border'}</span>
                <span class="like-count">${likesCount}</span>
              </button>
              ${p.github_url||p.github?`<a href="${p.github_url||p.github}" target="_blank" class="p-1.5 text-gray-400 hover:text-indigo-500 transition-colors" title="GitHub"><span class="material-symbols-outlined text-base">code</span></a>`:''}
              ${p.demo_url||p.demoUrl||p.liveUrl?`<a href="${p.demo_url||p.demoUrl||p.liveUrl}" target="_blank" class="p-1.5 text-gray-400 hover:text-green-500 transition-colors" title="Live Demo"><span class="material-symbols-outlined text-base">open_in_new</span></a>`:''}
              <button onclick="toggleSave('${pid}',this)" class="p-1.5 transition-colors ${isSaved?'text-indigo-500':'text-gray-400 hover:text-indigo-500'}" title="${isSaved?'Unsave':'Save project'}">
                <span class="material-symbols-outlined text-base" style="${isSaved?'font-variation-settings:\'FILL\' 1':''}">${isSaved?'bookmark':'bookmark_border'}</span>
              </button>
              ${isMine?`
              <button onclick="deleteProject('${pid}',this)" class="p-1.5 text-gray-400 hover:text-rose-500 transition-colors" title="Delete">
                <span class="material-symbols-outlined text-base">delete</span>
              </button>`:''}
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
  }


  window.doSearch=function(q){
    const f=q?allProjects.filter(p=>(p.title||'').toLowerCase().includes(q.toLowerCase())||(p.description||'').toLowerCase().includes(q.toLowerCase())):allProjects;
    render(applyFilter(f));
  };

  function applyFilter(list){
    if(activeFilter==='all')return list;
    if(activeFilter==='mine')return list.filter(p=>(p.author?._id||p.author)===myId);
    return list.filter(p=>p.category===activeFilter);
  }

  window.setFilter=function(f,btn){
    activeFilter=f;
    document.querySelectorAll('.filter-btn').forEach(b=>{
      b.className='filter-btn whitespace-nowrap px-4 py-2 rounded-full text-sm font-semibold bg-slate-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-indigo-50 transition-all';
    });
    btn.className='filter-btn whitespace-nowrap px-4 py-2 rounded-full text-sm font-semibold bg-indigo-500 text-white transition-all';
    render(applyFilter(allProjects));
  };

  /* Submit modal */
  window.openSubmitModal=function(){document.getElementById('submit-modal').classList.replace('hidden','flex');};
  window.closeModal=function(){document.getElementById('submit-modal').classList.replace('flex','hidden');};
  document.getElementById('submit-modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

  document.getElementById('submit-form').onsubmit=async function(e){
    e.preventDefault();
    const btn=document.getElementById('submit-btn');
    btn.innerHTML='<span class="material-symbols-outlined animate-spin">progress_activity</span> Submittingâ€¦';btn.disabled=true;
    try{
      const r=await fetch(API_BASE+'/api/projects',{method:'POST',headers:H,body:JSON.stringify({
        title:document.getElementById('f-title').value.trim(),
        description:document.getElementById('f-desc').value.trim(),
        category:document.getElementById('f-cat').value,
        techStack:document.getElementById('f-tech').value.split(',').map(s=>s.trim()).filter(Boolean),
        githubURL:document.getElementById('f-github').value.trim(),
        demoURL:document.getElementById('f-demo').value.trim(),
        looking_for_members:document.getElementById('f-hiring').checked,
      })});
      if(r.ok){PHToast?.success('Project submitted!');closeModal();this.reset();load();}
      else{const d=await r.json();PHToast?.error(d.message||d.error||'Failed');}
    }catch(e){PHToast?.error('Server offline');}
    btn.innerHTML='<span class="material-symbols-outlined">upload</span> Submit Project';btn.disabled=false;
  };

  /* Upvote / Like toggle */
  window.toggleLike = async function(pid, btn) {
    btn.disabled = true;
    try {
      const res = await fetch(API_BASE + `/api/projects/${pid}/like`, { method: 'POST', headers: H });
      const data = await res.json();
      if (res.ok) {
        const isLiked = data.isLiked;
        const icon = btn.querySelector('.material-symbols-outlined');
        const countSpan = btn.querySelector('.like-count');
        let count = parseInt(countSpan.textContent) || 0;

        if (isLiked) {
          btn.className = 'p-1.5 flex items-center gap-0.5 text-xs transition-colors text-pink-500';
          icon.textContent = 'favorite';
          icon.style.fontVariationSettings = "'FILL' 1";
          countSpan.textContent = count + 1;
          PHToast?.success('Project upvoted!');
        } else {
          btn.className = 'p-1.5 flex items-center gap-0.5 text-xs transition-colors text-gray-400 hover:text-pink-500';
          icon.textContent = 'favorite_border';
          icon.style.fontVariationSettings = '';
          countSpan.textContent = Math.max(0, count - 1);
        }
        
        // Update local object count
        const local = allProjects.find(p => (p._id || p.id) === pid);
        if (local) {
          local.isLiked = isLiked;
          local.likes = isLiked ? (local.likes || 0) + 1 : Math.max(0, (local.likes || 0) - 1);
        }
      } else {
        PHToast?.error(data.error || 'Could not update vote');
      }
    } catch(e) {
      PHToast?.error('Server error');
    }
    btn.disabled = false;
  };

  /* Detail modal logic */
  window.openDetailModal = async function(pid) {
    const modal = document.getElementById('detail-modal');
    const content = document.getElementById('det-content');
    modal.classList.replace('hidden', 'flex');
    content.innerHTML = `
      <div class="flex flex-col items-center justify-center py-16 text-gray-400 gap-3">
        <span class="material-symbols-outlined text-4xl animate-spin">progress_activity</span>
        <p class="text-sm">Fetching project detailsâ€¦</p>
      </div>`;

    try {
      const res = await fetch(API_BASE + `/api/projects/${pid}`, { headers: H });
      if (!res.ok) throw new Error('Could not load details');
      const p = await res.json();

      document.getElementById('det-title').textContent = p.title || 'Project Details';
      const col = avC(p.title || 'P');
      const tech = p.tech_stack || p.techStack || p.tags || [];
      const lookingForMembers = p.looking_for_members || p.lookingForMembers || false;

      content.innerHTML = `
        <div class="flex items-center gap-4 p-5 rounded-2xl" style="background:linear-gradient(135deg, ${col}12, ${col}24)">
          <div class="w-16 h-16 rounded-2xl flex items-center justify-center text-white font-bold text-2xl" style="background:${col}">${(p.title||'P')[0].toUpperCase()}</div>
          <div>
            <h4 class="font-extrabold text-lg text-gray-900 dark:text-gray-100">${p.title}</h4>
            <div class="flex flex-wrap gap-2 mt-1.5">
              ${p.category ? `<span class="px-2.5 py-0.5 rounded-full text-xs font-semibold bg-indigo-50 dark:bg-indigo-950/40 text-indigo-600 dark:text-indigo-400 capitalize">${p.category}</span>` : ''}
              ${lookingForMembers ? `<span class="px-2.5 py-0.5 rounded-full text-xs font-semibold bg-emerald-50 dark:bg-emerald-950/40 text-emerald-600 dark:text-emerald-400 flex items-center gap-1"><span class="material-symbols-outlined text-xs">group</span>Looking for team members</span>` : ''}
            </div>
          </div>
        </div>

        <div class="flex flex-col gap-2">
          <h5 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Project Description</h5>
          <p class="text-gray-700 dark:text-gray-300 leading-relaxed text-[15px] whitespace-pre-wrap">${p.description || 'No description provided.'}</p>
        </div>

        ${tech.length ? `
        <div class="flex flex-col gap-2">
          <h5 class="text-xs font-bold text-gray-400 uppercase tracking-wider">Tech Stack</h5>
          <div class="flex flex-wrap gap-2">${tech.map(t => `<span class="tag px-3 py-1 text-xs">${t}</span>`).join('')}</div>
        </div>` : ''}

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-b border-gray-100 dark:border-gray-800 py-4 my-2">
          <div>
            <span class="text-xs text-gray-400 block mb-1">Created By</span>
            <a href="/profile?id=${p.owner?.id || p.owner_id}" class="flex items-center gap-2 text-sm font-semibold text-gray-800 dark:text-gray-200 hover:text-indigo-500 transition-colors">
              <div class="w-6 h-6 rounded-full flex items-center justify-center text-white text-[10px] font-bold" style="background:${avC(p.owner?.first_name || 'U')}">
                ${(p.owner?.first_name || 'U')[0]}
              </div>
              ${p.owner?.first_name || ''} ${p.owner?.last_name || ''}
            </a>
          </div>
          <div>
            <span class="text-xs text-gray-400 block mb-1">University</span>
            <span class="text-sm font-semibold text-gray-800 dark:text-gray-200 flex items-center gap-1">
              <span class="material-symbols-outlined text-base text-gray-400">school</span>
              ${p.owner?.university || 'Not Specified'}
            </span>
          </div>
        </div>

        <div class="flex gap-3 mt-2">
          ${p.github_url || p.github ? `
            <a href="${p.github_url || p.github}" target="_blank" class="flex-1 flex items-center justify-center gap-2 py-3 border border-gray-200 dark:border-gray-700 hover:border-gray-400 rounded-xl text-sm font-bold text-gray-700 dark:text-gray-200 hover:bg-slate-50 dark:hover:bg-gray-850 transition-all">
              <span class="material-symbols-outlined text-[18px]">code</span> GitHub Repository
            </a>` : ''}
          ${p.demo_url || p.demoUrl || p.liveUrl ? `
            <a href="${p.demo_url || p.demoUrl || p.liveUrl}" target="_blank" class="flex-1 flex items-center justify-center gap-2 py-3 bg-indigo-500 hover:bg-indigo-600 text-white rounded-xl text-sm font-bold shadow-lg shadow-indigo-500/25 hover:-translate-y-0.5 transition-all">
              <span class="material-symbols-outlined text-[18px]">open_in_new</span> Live Demo
            </a>` : ''}
        </div>
      `;
    } catch(e) {
      content.innerHTML = `
        <div class="flex flex-col items-center justify-center py-12 text-rose-500 gap-2">
          <span class="material-symbols-outlined text-4xl">error</span>
          <p class="text-sm">Failed to load project details.</p>
        </div>`;
    }
  };

  window.closeDetailModal = function() {
    document.getElementById('detail-modal').classList.replace('flex', 'hidden');
  };

  document.getElementById('detail-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeDetailModal();
  });

  window.toggleSave=async function(pid,btn){
    const isSaved=savedIds.has(pid);
    const icon=btn.querySelector('.material-symbols-outlined');
    btn.disabled=true;
    try{
      if(isSaved){
        await fetch(API_BASE+`/api/saved/project/${pid}`,{method:'DELETE',headers:H});
        savedIds.delete(pid);
        btn.className='p-1.5 transition-colors text-gray-400 hover:text-indigo-500';
        btn.title='Save project';
        if(icon){icon.textContent='bookmark_border';icon.style.fontVariationSettings='';}
        PHToast?.success('Removed from saved');
      } else {
        await fetch(API_BASE+'/api/saved',{method:'POST',headers:H,body:JSON.stringify({type:'project',projectId:pid})});
        savedIds.add(pid);
        btn.className='p-1.5 transition-colors text-indigo-500';
        btn.title='Unsave';
        if(icon){icon.textContent='bookmark';icon.style.fontVariationSettings="'FILL' 1";}
        PHToast?.success('Project saved!');
      }
    }catch(e){PHToast?.error('Could not update saved');} 
    btn.disabled=false;
  };

  window.deleteProject = async function(pid, btn) {
    PHConfirm({
      title: 'Delete Project?',
      message: 'Are you sure you want to permanently delete this project? This action cannot be undone.',
      confirmText: 'Delete',
      cancelText: 'Cancel',
      danger: true,
      onConfirm: async () => {
        btn.disabled = true;
        try {
          const r = await fetch(API_BASE + `/api/projects/${pid}`, { method: 'DELETE', headers: H });
          if (r.ok) {
            allProjects = allProjects.filter(p => (p._id || p.id) !== pid);
            PHToast?.success('Project deleted');
            render(applyFilter(allProjects));
          } else {
            const d = await r.json();
            PHToast?.error(d.error || 'Cannot delete');
            btn.disabled = false;
          }
        } catch (e) {
          PHToast?.error('Server offline');
          btn.disabled = false;
        }
      }
    });
  };

  async function load(){

    try{
      const r=await fetch(API_BASE+'/api/projects',{headers:H});
      if(r.ok){
        const d=await r.json();
        allProjects=d.projects||d||[];
        render(allProjects);
        
        // Check for pid in URL
        const params = new URLSearchParams(window.location.search);
        const pid = params.get('pid');
        if (pid) {
          setTimeout(() => {
            const card = document.getElementById(`project-card-${pid}`);
            if (card) {
              card.scrollIntoView({ behavior: 'smooth', block: 'center' });
              card.classList.add('ring-2', 'ring-indigo-500', 'ring-offset-2', 'dark:ring-offset-slate-900');
              setTimeout(() => {
                card.classList.remove('ring-2', 'ring-indigo-500', 'ring-offset-2', 'dark:ring-offset-slate-900');
              }, 4000);
            }
          }, 600);
        }
      }
      else throw new Error();
    }catch(e){
      document.getElementById('projects-grid').innerHTML=`<div class="col-span-full flex flex-col items-center justify-center py-16 text-gray-400 gap-3">
        <span class="material-symbols-outlined text-5xl">cloud_off</span><p class="text-sm">Could not load projects</p></div>`;
    }
  }
  load();
})();
</script>
<script src="/assets/js/core/info-modal.js"></script></body></html>
