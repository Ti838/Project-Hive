  <style>
    body { font-family: 'Inter', sans-serif; }

    /* ═══ DARK MODE Overrides ═══ */
    :root {
      --tw-bg:    #F8FAFC;
      --tw-surf:  #FFFFFF;
      --tw-surf2: #F1F5F9;
      --tw-surf3: #E8EDF5;
      --tw-bd:    #E2E8F0;
      --tw-tx:    #0F172A;
      --tw-sub:   #64748B;
    }
    html.dark {
      --tw-bg:    #0B0C14;
      --tw-surf:  #12131D;
      --tw-surf2: #181926;
      --tw-surf3: #1E2030;
      --tw-bd:    #242538;
      --tw-tx:    #E2DEEE;
      --tw-sub:   #8A86A2;
    }
    body, .min-h-screen { background-color: var(--tw-bg) !important; color: var(--tw-tx) !important; }
    html.dark .bg-background    { background-color: var(--tw-bg)    !important; }
    html.dark .bg-surface       { background-color: var(--tw-surf)  !important; }
    html.dark .bg-surface\/80   { background-color: color-mix(in srgb, var(--tw-surf) 85%, transparent) !important; }
    html.dark .bg-surface-container-lowest { background-color: var(--tw-surf)  !important; }
    html.dark .bg-surface-container-low    { background-color: var(--tw-surf2) !important; }
    html.dark .bg-surface-container        { background-color: var(--tw-surf3) !important; }
    html.dark .bg-surface-container-high   { background-color: var(--tw-surf3) !important; }
    html.dark .bg-surface-variant          { background-color: var(--tw-surf2) !important; }
    html.dark .border-surface-variant   { border-color: var(--tw-bd) !important; }
    html.dark .border-outline-variant   { border-color: var(--tw-bd) !important; }
    html.dark .divide-surface-variant > * + * { border-color: var(--tw-bd) !important; }
    html.dark .text-on-surface          { color: var(--tw-tx)  !important; }
    html.dark .text-on-surface-variant  { color: var(--tw-sub) !important; }
    html.dark .text-on-background       { color: var(--tw-tx)  !important; }
    html.dark .text-outline             { color: var(--tw-sub) !important; }
    html.dark header {
      background-color: rgba(11,12,20,.88) !important;
      border-bottom-color: var(--tw-bd) !important;
    }
    html.dark .bg-surface-container-low.border-none {
      background-color: var(--tw-surf2) !important;
      color: var(--tw-tx) !important;
    }
    html.dark .feed-card-shadow { box-shadow: 0 4px 20px rgba(0,0,0,.3) !important; }
    html.dark aside > div {
      background-color: var(--tw-surf) !important;
      border-color: var(--tw-bd) !important;
    }

    /* Reaction Picker Style */
    .reaction-trigger { position: relative; }
    .reaction-picker {
      position: absolute;
      bottom: 110%;
      left: 0;
      background: var(--tw-surf);
      border: 1px solid var(--tw-bd);
      border-radius: 999px;
      padding: 6px 12px;
      display: flex;
      gap: 10px;
      box-shadow: var(--shadow-lg);
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: all 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28);
      z-index: 50;
    }
    .reaction-trigger:hover .reaction-picker,
    .reaction-picker:hover {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    .reaction-btn {
      transition: transform 0.15s;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
    }
    .reaction-btn:hover {
      transform: scale(1.3);
      background: var(--tw-surf2);
    }

    .bg-surface-container-low, .bg-surface-container, header, footer {

  <script>
    (function(){
      const TK = localStorage.getItem('access_token');
      if (!TK) { window.location.href = '/login'; return; }
      try {
        const p = JSON.parse(atob(TK.split('.')[1]));
        if (p.exp && Date.now() >= p.exp * 1000) {
          localStorage.removeItem('access_token');
          window.location.href = '/login'; return;
        }
      } catch(e) { window.location.href = '/login'; return; }

      const H = { Authorization: 'Bearer ' + TK, 'Content-Type': 'application/json' };
      const API_BASE = ['localhost','127.0.0.1'].includes(location.hostname)
        ? '' : 'https://projecthive-backend.onrender.com';

      // Init Sidebar
      PHSidebar.init('feed', '../../');

      // State variables
      let ME = {};
      let selectedPostType = 'general';

      const COLORS = ['#6366f1','#7c3aed','#ec4899','#10b981','#f59e0b','#3b82f6'];
      function getInitials(f, l) { return ((f?.[0]||'') + (l?.[0]||'')).toUpperCase() || '?'; }
      function getAvatarColor(name = '') {
        let h = 0; for (const c of name) h = c.charCodeAt(0) + ((h << 5) - h);
        return COLORS[Math.abs(h) % COLORS.length];
      }
      function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s || '';
        return d.innerHTML;
      }
      function formatTimeAgo(d) {
        if (!d) return 'some time ago';
        const s = Math.floor((Date.now() - new Date(d)) / 1000);
        if (s < 60) return 'Just now';
        if (s < 3600) return Math.floor(s/60) + 'm ago';
        if (s < 86400) return Math.floor(s/3600) + 'h ago';
        return new Date(d).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      }

      // SVGs for Reactions (No Emojis!)
      const REACTION_SVGS = {
        like: `<svg class="w-5 h-5 text-blue-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`,
        celebrate: `<svg class="w-5 h-5 text-yellow-500" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2m-8-4.5h.01m7.99-.01h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,
        insightful: `<svg class="w-5 h-5 text-purple-500" fill="currentColor" viewBox="0 0 24 24"><path d="M9 21h6v-2H9v2zm3-19C7.58 2 4 5.58 4 10c0 2.76 1.4 5.2 3.54 6.64L8 20h8l.46-3.36C18.6 15.2 20 12.76 20 10c0-4.42-3.58-8-8-8z"/></svg>`,
        support: `<svg class="w-5 h-5 text-green-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm0 18a8 8 0 110-16 8 8 0 010 16z"/><path d="M12 6a4 4 0 100 8 4 4 0 000-8z"/></svg>`
      };

      // SVGs Labels
      const REACTION_LABELS = {
        like: 'Like',
        celebrate: 'Celebrate',
        insightful: 'Insightful',
        support: 'Support'
      };

      // Load Profile & Initialize Creator Avatar
      async function initProfile() {
        const cache = localStorage.getItem('ph-user-cache');
        if (cache) {
          try {
            ME = JSON.parse(cache);
            renderProfileData(ME);
          } catch(e) {}
        }

        try {
          const r = await fetch(API_BASE + '/api/users/me', { headers: H });
          if (r.ok) {
            ME = await r.json();
            localStorage.setItem('ph-user-cache', JSON.stringify(ME));
            renderProfileData(ME);
          }
        } catch(e) {}
      }

      function renderProfileData(user) {
        const fn = user.firstName || user.user?.firstName || 'Student';
        const ln = user.lastName || user.user?.lastName || '';
        const name = (fn + ' ' + ln).trim();

        const nameEl = document.getElementById('feed-username');
        if (nameEl) nameEl.textContent = name;
        
        const roleEl = document.getElementById('feed-role');
        if (roleEl) roleEl.textContent = (user.role || 'student').charAt(0).toUpperCase() + (user.role || 'student').slice(1);
        
        const initials = getInitials(fn, ln);
        const color = getAvatarColor(name);

        const av1 = document.getElementById('feed-avatar');
        const av2 = document.getElementById('creator-avatar');
        [av1, av2].forEach(el => {
          if (el) {
            const avatar = user.avatar || user.user?.avatar;
            if (avatar && avatar.startsWith('data:')) {
              el.innerHTML = `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;" alt="Avatar">`;
              el.style.background = 'transparent';
            } else {
              el.textContent = initials;
              el.style.background = color;
              el.style.color = '#fff';
              el.innerHTML = initials;
            }
          }
        });
      }

      // Handle Post Type Selection Styles
      document.querySelectorAll('.post-type-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.post-type-btn').forEach(b => {
            b.classList.remove('bg-primary/10', 'text-primary', 'border-primary/20');
            b.classList.add('bg-surface-container-low', 'text-on-surface-variant', 'border-surface-variant');
          });
          btn.classList.add('bg-primary/10', 'text-primary', 'border-primary/20');
          btn.classList.remove('bg-surface-container-low', 'text-on-surface-variant', 'border-surface-variant');
          selectedPostType = btn.getAttribute('data-type');
        });
      });

      // Attachments & Scraping State
      let attachedImageUrl = null;
      let scrapedLinkMetadata = null;
      let isScrapingLink = false;
      let lastScrapedUrl = null;

      // Extract first URL from string
      function extractUrl(text) {
        const regex = /(https?:\/\/[^\s]+)/gi;
        const match = text.match(regex);
        return match ? match[0] : null;
      }

      // Auto scraper trigger on input
      document.getElementById('post-text').addEventListener('input', async (e) => {
        const text = e.target.value;
        const url = extractUrl(text);
        
        if (url && url !== lastScrapedUrl && !scrapedLinkMetadata && !isScrapingLink) {
          lastScrapedUrl = url;
          isScrapingLink = true;
          try {
            const res = await fetch(API_BASE + `/api/utils/scrape-metadata?url=${encodeURIComponent(url)}`, {
              headers: H
            });
            if (res.ok) {
              const meta = await res.json();
              scrapedLinkMetadata = meta;
              showComposerLinkPreview(meta);
            }
          } catch(err) {
            console.error('Failed to scrape link metadata', err);
          } finally {
            isScrapingLink = false;
          }
        }
      });

      function showComposerLinkPreview(meta) {
        const container = document.getElementById('composer-link-preview');
        const imgContainer = document.getElementById('composer-link-img-container');
        const img = document.getElementById('composer-link-preview-img');
        const domain = document.getElementById('composer-link-domain');
        const title = document.getElementById('composer-link-title');
        const desc = document.getElementById('composer-link-desc');

        domain.textContent = meta.domain || '';
        title.textContent = meta.title || '';
        desc.textContent = meta.description || '';

        if (meta.image) {
          img.src = meta.image;
          imgContainer.classList.remove('hidden');
        } else {
          imgContainer.classList.add('hidden');
        }

        container.classList.remove('hidden');
      }

      window.clearScrapedLink = function() {
        scrapedLinkMetadata = null;
        lastScrapedUrl = null;
        document.getElementById('composer-link-preview').classList.add('hidden');
      }

      window.toggleImageInput = function() {
        const container = document.getElementById('composer-image-input-container');
        container.classList.toggle('hidden');
      }

      window.applyAttachedImage = function() {
        const inp = document.getElementById('post-image-url');
        const url = inp.value.trim();
        if (!url) return;

        attachedImageUrl = url;
        const previewImg = document.getElementById('composer-preview-img');
        previewImg.src = url;
        document.getElementById('composer-image-preview').classList.remove('hidden');
        document.getElementById('composer-image-input-container').classList.add('hidden');
        inp.value = '';
      }

      window.clearAttachedImage = function() {
        attachedImageUrl = null;
        document.getElementById('composer-image-preview').classList.add('hidden');
      }

      // Submit Post Action
      document.getElementById('submit-post-btn').addEventListener('click', async () => {
        const textInp = document.getElementById('post-text');
        const content = textInp.value.trim();
        if (!content) return;

        const btn = document.getElementById('submit-post-btn');
        btn.disabled = true;

        try {
          const r = await fetch(API_BASE + '/api/posts', {
            method: 'POST',
            headers: H,
            body: JSON.stringify({ 
              content, 
              postType: selectedPostType,
              imageUrl: attachedImageUrl,
              linkMetadata: scrapedLinkMetadata
            })
          });
          if (r.ok) {
            textInp.value = '';
            clearAttachedImage();
            clearScrapedLink();
            showToast('Post published successfully!', 'success');
            loadFeed();
            loadStats();
          } else {
            const err = await r.json();
            showToast(err.error || 'Failed to publish post', 'error');
          }
        } catch(e) {
          showToast('Server connection error', 'error');
        } finally {
          btn.disabled = false;
        }
      });

      // Load Suggestions / People you know
      async function loadSuggestions() {
        const cache = localStorage.getItem('ph-feed-suggestions-cache');
        if (cache) {
          try {
            const data = JSON.parse(cache);
            renderSuggestions(data);
          } catch(e) {}
        }

        try {
          const r = await fetch(API_BASE + '/api/users?limit=6', { headers: H });
          if (r.ok) {
            const data = await r.json();
            localStorage.setItem('ph-feed-suggestions-cache', JSON.stringify(data));
            renderSuggestions(data);
          }
        } catch(e) {}
      }

      function renderSuggestions(data) {
        const users = (data.users || data || []).filter(u => u.id !== ME.id && u._id !== ME.id);
        const el = document.getElementById('suggested-people-list');
        if (!users.length) {
          el.innerHTML = '<div class="text-center py-4 text-xs text-on-surface-variant">No recommendations available.</div>';
          return;
        }
        el.innerHTML = users.slice(0, 4).map(u => {
          const name = `${u.firstName || ''} ${u.lastName || ''}`.trim() || 'User';
          const color = getAvatarColor(name);
          const initials = getInitials(u.firstName, u.lastName);
          return `<div class="flex items-center justify-between p-2 rounded-xl hover:bg-surface-container-low transition-all">
            <div class="flex items-center gap-2.5 min-w-0">
              <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-white text-xs shrink-0" style="background:${color}">${initials}</div>
              <div class="min-w-0">
                <p class="font-semibold text-xs text-on-surface truncate">${escapeHtml(name)}</p>
                <p class="text-[10px] text-on-surface-variant truncate">${escapeHtml(u.university || '')}</p>
              </div>
            </div>
            <button onclick="sendFriendRequest('${u.id || u._id}')" class="text-primary hover:text-primary-dark p-1 rounded-full hover:bg-primary/5 shrink-0 transition-colors" title="Connect">
              <span class="material-symbols-outlined text-[18px]">person_add</span>
            </button>
          </div>`;
        }).join('');
      }

      window.sendFriendRequest = async function(friendId) {
        try {
          const r = await fetch(API_BASE + '/api/friends/request', {
            method: 'POST',
            headers: H,
            body: JSON.stringify({ friendId })
          });
          if (r.ok) {
            showToast('Friend request sent!', 'success');
            loadSuggestions();
          } else {
            const err = await r.json();
            showToast(err.error || 'Failed to send request', 'error');
          }
        } catch(e) {
          showToast('Connection error', 'error');
        }
      }

      // Load Stats
      async function loadStats() {
        const cache = localStorage.getItem('ph-feed-stats-cache');
        if (cache) {
          try {
            const data = JSON.parse(cache);
            renderStats(data.postsCount, data.friendsCount);
          } catch(e) {}
        }

        try {
          const [postsRes, friendsRes] = await Promise.all([
            fetch(API_BASE + '/api/feed?limit=50', { headers: H }).then(r => r.json()),
            fetch(API_BASE + '/api/friends', { headers: H }).then(r => r.json())
          ]);

          const myPosts = (postsRes.posts || []).filter(p => p.author?.id === ME.id || p.author?.id === ME._id);
          const postsCount = myPosts.length;
          
          const acceptedFriends = (friendsRes.friends || friendsRes || []).filter(f => f.status === 'accepted');
          const friendsCount = acceptedFriends.length;

          localStorage.setItem('ph-feed-stats-cache', JSON.stringify({ postsCount, friendsCount }));
          renderStats(postsCount, friendsCount);
        } catch(e) {}
      }

      function renderStats(postsCount, friendsCount) {
        const postsEl = document.getElementById('stats-total-posts');
        if (postsEl) postsEl.textContent = postsCount;
        const friendsEl = document.getElementById('stats-total-friends');
        if (friendsEl) friendsEl.textContent = friendsCount;
      }

      // Bookmarks helper functions
      function getBookmarks() {
        try {
          return JSON.parse(localStorage.getItem('projecthive_bookmarks') || '[]');
        } catch(e) { return []; }
      }
      function isBookmarked(postId) {
        return getBookmarks().includes(postId);
      }
      window.toggleBookmark = function(postId) {
        let bookmarks = getBookmarks();
        const btn = document.getElementById(`bookmark-btn-${postId}`);
        const icon = btn ? btn.querySelector('span') : null;
        
        if (bookmarks.includes(postId)) {
          bookmarks = bookmarks.filter(id => id !== postId);
          showToast('Post removed from saved items', 'info');
          if (icon) {
            icon.textContent = 'bookmark_border';
            icon.classList.remove('text-primary');
            icon.style.fontVariationSettings = "'FILL' 0";
          }
        } else {
          bookmarks.push(postId);
          showToast('Post saved successfully!', 'success');
          if (icon) {
            icon.textContent = 'bookmark';
            icon.classList.add('text-primary');
            icon.style.fontVariationSettings = "'FILL' 1";
          }
        }
        localStorage.setItem('projecthive_bookmarks', JSON.stringify(bookmarks));
      }

      // Copy link to clipboard
      window.sharePost = function(postId) {
        const url = window.location.origin + window.location.pathname + '?post=' + postId;
        navigator.clipboard.writeText(url).then(() => {
          showToast('Direct link copied to clipboard!', 'success');
        }).catch(() => {
          showToast('Failed to copy link', 'error');
        });
      }

      // Collapsible text handler
      window.expandPost = function(btn, postId) {
        const card = document.getElementById(`post-card-${postId}`);
        if (card) {
          const brief = card.querySelector(`.post-brief-${postId}`);
          const full = card.querySelector(`.post-full-${postId}`);
          if (brief && full) {
            brief.classList.add('hidden');
            full.classList.remove('hidden');
            btn.classList.add('hidden');
          }
        }
      }

      // Unified Post HTML builder
      function renderPostCardHtml(p, isSharedHighlight = false) {
        const author = p.author || {};
        const name = `${author.firstName || ''} ${author.lastName || ''}`.trim() || 'User';
        const color = getAvatarColor(name);
        const initials = getInitials(author.firstName, author.lastName);
        const isOwn = author.id === ME.id || author.id === ME._id;

        // Type badge styles
        let badgeHtml = '';
        if (p.postType && p.postType !== 'general') {
          const colorsMap = {
            achievement: 'bg-yellow-500/10 text-yellow-500 border-yellow-500/20',
            project_update: 'bg-blue-500/10 text-blue-500 border-blue-500/20',
            looking_for_team: 'bg-green-500/10 text-green-500 border-green-500/20'
          };
          const labelMap = {
            achievement: 'Achievement',
            project_update: 'Project Update',
            looking_for_team: 'Looking for Team'
          };
          badgeHtml = `<span class="px-2 py-0.5 text-[9px] font-bold uppercase rounded border ${colorsMap[p.postType] || ''}">${labelMap[p.postType] || p.postType}</span>`;
        }

        if (isSharedHighlight) {
          badgeHtml += `<span class="px-2 py-0.5 text-[9px] font-bold uppercase rounded border bg-primary text-white border-primary/20 flex items-center gap-0.5"><span class="material-symbols-outlined text-[10px]">share</span> Shared Post</span>`;
        }

        // Reactions counters summary HTML
        let reactionsSummaryHtml = '';
        const rMap = p.reactions || {};
        const totalReactions = Object.values(rMap).reduce((a, b) => a + b, 0);
        if (totalReactions > 0) {
          const reactionIcons = Object.keys(rMap).map(type => {
            const icons = { like: '👍', celebrate: '🎉', insightful: '💡', support: '🤝' };
            return `<span title="${REACTION_LABELS[type]}">${icons[type] || ''} <span class="text-[10px] font-bold ml-0.5">${rMap[type]}</span></span>`;
          }).join(' ');
          reactionsSummaryHtml = `<div class="flex items-center gap-2 text-xs text-on-surface-variant pb-3 border-b border-surface-variant">${reactionIcons}</div>`;
        }

        // Active reaction button highlight
        const myReact = p.myReaction;
        let reactBtnClass = 'text-on-surface-variant hover:text-primary';
        let reactBtnText = 'Like';
        let reactBtnIcon = `<span class="material-symbols-outlined text-[18px]">favorite</span>`;

        if (myReact) {
          reactBtnClass = 'text-primary font-bold';
          reactBtnText = REACTION_LABELS[myReact];
          if (myReact === 'like') reactBtnIcon = REACTION_SVGS.like;
          if (myReact === 'celebrate') reactBtnIcon = REACTION_SVGS.celebrate;
          if (myReact === 'insightful') reactBtnIcon = REACTION_SVGS.insightful;
          if (myReact === 'support') reactBtnIcon = REACTION_SVGS.support;
        }

        // Bookmarked state
        const bookmarked = isBookmarked(p.id);

        // Collapsible Text check
        const isLong = p.content.length > 280;
        const contentHtml = isLong 
          ? `<span class="post-brief-${p.id}">${escapeHtml(p.content.slice(0, 280))}... </span>` + 
            `<button onclick="expandPost(this, '${p.id}')" class="text-primary font-bold hover:underline inline-block text-xs">see more</button>` +
            `<span class="post-full-${p.id} hidden whitespace-pre-wrap">${escapeHtml(p.content)}</span>`
          : `<span class="whitespace-pre-wrap">${escapeHtml(p.content)}</span>`;

        // Media attachment HTML
        let mediaHtml = '';
        if (p.imageUrl) {
          mediaHtml = `<div class="rounded-xl overflow-hidden border border-surface-variant max-h-[360px] bg-black/5 flex items-center justify-center cursor-zoom-in mt-1" onclick="openLightbox('${p.imageUrl}')">
            <img src="${p.imageUrl}" class="w-full h-full object-cover max-h-[360px]" alt="Post attachment">
          </div>`;
        }

        // Link metadata card HTML
        let linkCardHtml = '';
        if (p.linkMetadata && p.linkMetadata.url) {
          const meta = p.linkMetadata;
          const metaImg = meta.image ? `<div class="w-full md:w-1/3 h-32 md:h-full shrink-0"><img src="${meta.image}" class="w-full h-full object-cover" alt="Link preview"></div>` : '';
          
          linkCardHtml = `<a href="${meta.url}" target="_blank" rel="noopener noreferrer" class="flex flex-col md:flex-row rounded-xl border border-surface-variant bg-surface-container-low overflow-hidden hover:bg-surface-container transition-all group mt-1">
            ${metaImg}
            <div class="p-4 flex flex-col justify-center gap-1 min-w-0">
              <span class="text-[10px] uppercase font-bold text-primary tracking-wider">${escapeHtml(meta.domain || '')}</span>
              <h4 class="text-xs font-bold text-on-surface truncate group-hover:text-primary transition-colors">${escapeHtml(meta.title || '')}</h4>
              <p class="text-[11px] text-on-surface-variant line-clamp-2 leading-normal mt-0.5">${escapeHtml(meta.description || '')}</p>
            </div>
          </a>`;
        }

        return `<div id="post-card-${p.id}" class="bg-surface-container-lowest p-6 rounded-2xl border border-surface-variant feed-card-shadow flex flex-col gap-4 relative transition-all duration-300">
          <!-- Header -->
          <div class="flex items-start justify-between">
            <div class="flex items-center gap-3">
              <div class="relative status-indicator-container cursor-pointer" data-user-id="${author.id || author._id}" onclick="showUserProfile('${author.id || author._id}')" title="View Profile">
                ${author.avatar
                  ? `<img src="${author.avatar}" class="w-10 h-10 rounded-full object-cover shrink-0">`
                  : `<div class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-white text-sm shrink-0" style="background:${color}">${initials}</div>`}
                ${author.onlineStatus === 'online' ? `<span class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 rounded-full border-2 border-surface status-dot" title="Online"></span>` : ''}
              </div>
              <div>
                <div class="flex items-center gap-2">
                  <span class="font-bold text-sm text-on-surface hover:text-primary cursor-pointer transition-colors" onclick="showUserProfile('${author.id || author._id}')" title="View Profile">${escapeHtml(name)}</span>
                  ${badgeHtml}
                </div>
                <p class="text-[11px] text-on-surface-variant">${escapeHtml(author.university || '')} • ${formatTimeAgo(p.createdAt)}</p>
              </div>
            </div>

            <div class="flex items-center gap-1.5">
              <button onclick="toggleBookmark('${p.id}')" class="text-outline hover:text-primary p-1 rounded-full hover:bg-primary/5 transition-colors" title="Save Post" id="bookmark-btn-${p.id}">
                <span class="material-symbols-outlined text-[18px] ${bookmarked ? 'text-primary' : ''}" style="${bookmarked ? "font-variation-settings: 'FILL' 1" : ''}">${bookmarked ? 'bookmark' : 'bookmark_border'}</span>
              </button>
              ${isOwn ? `<button onclick="deletePost('${p.id}')" class="text-outline hover:text-error p-1 rounded-full hover:bg-error/5 transition-colors" title="Delete Post">
                <span class="material-symbols-outlined text-[18px]">delete</span>
              </button>` : ''}
            </div>
          </div>

          <!-- Content -->
          <p class="text-sm text-on-surface leading-relaxed">${contentHtml}</p>

          <!-- Attachments -->
          ${mediaHtml}
          ${linkCardHtml}

          <!-- Reactions Summary -->
          ${reactionsSummaryHtml}

          <!-- Actions row -->
          <div class="flex items-center gap-4 pt-1">
            <!-- Like / React Trigger -->
            <div class="reaction-trigger">
              <button class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl hover:bg-surface-container-low text-xs transition-all ${reactBtnClass}">
                ${reactBtnIcon}
                <span>${reactBtnText}</span>
              </button>
              <!-- Floating Picker -->
              <div class="reaction-picker">
                <button onclick="reactPost('${p.id}', 'like')" class="reaction-btn" title="Like">👍</button>
                <button onclick="reactPost('${p.id}', 'celebrate')" class="reaction-btn" title="Celebrate">🎉</button>
                <button onclick="reactPost('${p.id}', 'insightful')" class="reaction-btn" title="Insightful">💡</button>
                <button onclick="reactPost('${p.id}', 'support')" class="reaction-btn" title="Support">🤝</button>
              </div>
            </div>

            <button onclick="toggleCommentsSection('${p.id}')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl hover:bg-surface-container-low text-xs text-on-surface-variant hover:text-primary transition-all">
              <span class="material-symbols-outlined text-[18px]">chat_bubble</span>
              <span>Comment (${p.commentsCount || 0})</span>
            </button>

            <button onclick="sharePost('${p.id}')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl hover:bg-surface-container-low text-xs text-on-surface-variant hover:text-primary transition-all" title="Copy link to post">
              <span class="material-symbols-outlined text-[18px]">share</span>
              <span>Share</span>
            </button>
          </div>

          <!-- Comments Expandable Panel -->
          <div id="comments-section-${p.id}" class="hidden mt-3 pt-3 border-t border-surface-variant flex flex-col gap-3">
            <div id="comments-list-${p.id}" class="flex flex-col gap-3 max-h-[220px] overflow-y-auto pr-1">
              <!-- Loaded dynamically -->
            </div>
            <!-- Add Comment Input -->
            <div class="flex gap-2 pt-2 border-t border-surface-variant/50">
              <input id="comment-input-${p.id}" type="text" placeholder="Add a comment..." class="flex-1 bg-surface-container-low border-none rounded-xl px-4 py-2 text-xs outline-none focus:ring-2 focus:ring-primary text-on-surface placeholder:text-outline">
              <button onclick="submitComment('${p.id}')" class="bg-primary hover:bg-primary-dark text-white px-4 py-2 rounded-xl text-xs font-bold transition-all shrink-0">Send</button>
            </div>
          </div>
        </div>`;
      }

      let feedPage = 1;
      let feedLoading = false;
      let hasMoreFeed = true;

      // Load Feed List
      async function loadFeed() {
        feedPage = 1;
        hasMoreFeed = true;
        feedLoading = false;

        const cache = localStorage.getItem('ph-feed-posts-cache');
        const container = document.getElementById('feed-list');
        if (cache) {
          try {
            const posts = JSON.parse(cache);
            if (posts.length > 0) {
              container.innerHTML = posts.map(p => renderPostCardHtml(p)).join('') + `<div id="feed-load-more-sentry" class="h-10 flex items-center justify-center text-xs text-on-surface-variant mt-4"><span class="animate-pulse">Loading older posts...</span></div>`;
              setupInfiniteScrollObserver();
            }
          } catch(e) {}
        } else {
          container.innerHTML = `
            <div class="bg-surface-container-lowest p-6 rounded-2xl border border-surface-variant animate-pulse">
              <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 bg-surface-container rounded-full"></div>
                <div class="flex-1">
                  <div class="h-4 bg-surface-container rounded w-1/3 mb-2"></div>
                  <div class="h-3 bg-surface-container rounded w-1/4"></div>
                </div>
              </div>
              <div class="h-4 bg-surface-container rounded w-full mb-3"></div>
              <div class="h-4 bg-surface-container rounded w-5/6"></div>
            </div>
          `;
        }
        await fetchFeedPage(1, false);
      }

      async function fetchFeedPage(page, append = false) {
        if (feedLoading) return;
        feedLoading = true;
        
        const sentry = document.getElementById('feed-load-more-sentry');
        if (sentry) sentry.classList.remove('hidden');

        try {
          const limit = 15;
          const r = await fetch(API_BASE + `/api/feed?page=${page}&limit=${limit}`, { headers: H });
          if (r.ok) {
            const data = await r.json();
            const posts = data.posts || [];
            const container = document.getElementById('feed-list');

            if (posts.length < limit) {
              hasMoreFeed = false;
              if (sentry) sentry.classList.add('hidden');
            }

            if (!posts.length && !append) {
              container.innerHTML = `<div class="bg-surface-container-lowest p-10 rounded-2xl border border-surface-variant text-center text-on-surface-variant feed-card-shadow">
                <span class="material-symbols-outlined text-4xl text-outline mb-2">forum</span>
                <p class="font-medium text-sm">Your feed is empty.</p>
                <p class="text-xs text-outline mt-1">Connect with friends or share your first post to start buzzing!</p>
              </div>`;
              return;
            }

            const cardsHtml = posts.map(p => renderPostCardHtml(p)).join('');
            if (page === 1) {
              localStorage.setItem('ph-feed-posts-cache', JSON.stringify(posts));
            }

            if (append) {
              if (sentry) {
                sentry.insertAdjacentHTML('beforebegin', cardsHtml);
              } else {
                container.insertAdjacentHTML('beforeend', cardsHtml);
              }
            } else {
              container.innerHTML = cardsHtml + `<div id="feed-load-more-sentry" class="h-10 flex items-center justify-center text-xs text-on-surface-variant mt-4 ${!hasMoreFeed ? 'hidden' : ''}"><span class="animate-pulse">Loading older posts...</span></div>`;
              setupInfiniteScrollObserver();
            }
          }
        } catch(e) {
          if (!append) {
            document.getElementById('feed-list').innerHTML = `<div class="bg-surface-container-lowest p-10 rounded-2xl border border-surface-variant text-center text-on-surface-variant feed-card-shadow">
              <span class="material-symbols-outlined text-4xl text-error mb-2">cloud_off</span>
              <p class="font-medium text-sm">Failed to load feed</p>
              <p class="text-xs text-outline mt-1">Please try again later.</p>
            </div>`;
          }
        } finally {
          feedLoading = false;
        }
      }

      let infiniteScrollObserver = null;
      function setupInfiniteScrollObserver() {
        if (infiniteScrollObserver) {
          infiniteScrollObserver.disconnect();
        }

        const sentry = document.getElementById('feed-load-more-sentry');
        if (!sentry) return;

        infiniteScrollObserver = new IntersectionObserver((entries) => {
          if (entries[0].isIntersecting && !feedLoading && hasMoreFeed) {
            feedPage++;
            fetchFeedPage(feedPage, true);
          }
        }, { threshold: 0.1 });

        infiniteScrollObserver.observe(sentry);
      }

      // Handles loading a shared post directly
      async function handleSharedPostQuery() {
        const params = new URLSearchParams(window.location.search);
        const sharedPostId = params.get('post');
        if (!sharedPostId) return;

        // Check if it's already rendered in the loaded feed
        const existingCard = document.getElementById(`post-card-${sharedPostId}`);
        if (existingCard) {
          setTimeout(() => {
            existingCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            existingCard.classList.add('ring-2', 'ring-primary', 'ring-offset-2', 'dark:ring-offset-slate-900');
            setTimeout(() => {
              existingCard.classList.remove('ring-2', 'ring-primary', 'ring-offset-2', 'dark:ring-offset-slate-900');
            }, 4000);
          }, 600);
          return;
        }

        // If not in the feed list, fetch single post via the new single post endpoint
        try {
          const r = await fetch(API_BASE + `/api/posts/${sharedPostId}`, { headers: H });
          if (r.ok) {
            const resData = await r.json();
            const p = resData.post;
            if (p) {
              const container = document.getElementById('feed-list');
              
              // Remove empty state message if present
              const empty = container.querySelector('.forum') || (container.textContent.includes('empty'));
              if (empty) container.innerHTML = '';
              
              const cardHtml = renderPostCardHtml(p, true); // highlight = true
              container.insertAdjacentHTML('afterbegin', cardHtml);
              
              setTimeout(() => {
                const card = document.getElementById(`post-card-${p.id}`);
                if (card) {
                  card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                  card.classList.add('ring-2', 'ring-primary', 'ring-offset-2', 'dark:ring-offset-slate-900');
                  setTimeout(() => {
                    card.classList.remove('ring-2', 'ring-primary', 'ring-offset-2', 'dark:ring-offset-slate-900');
                  }, 4000);
                }
              }, 600);
            }
          }
        } catch(e) {}
      }

      // Toggle Reaction Call
      window.reactPost = async function(postId, type) {
        try {
          const r = await fetch(API_BASE + `/api/posts/${postId}/react`, {
            method: 'POST',
            headers: H,
            body: JSON.stringify({ type })
          });
          if (r.ok) {
            loadFeed();
          }
        } catch(e) {}
      }

      // Delete Post Call
      window.deletePost = async function(postId) {
        if (!confirm('Are you sure you want to delete this post?')) return;
        try {
          const r = await fetch(API_BASE + `/api/posts/${postId}`, {
            method: 'DELETE',
            headers: H
          });
          if (r.ok) {
            showToast('Post deleted', 'success');
            loadFeed();
            loadStats();
          }
        } catch(e) {}
      }


      // Expand Comments Section & Fetch Comments
      window.toggleCommentsSection = function(postId) {
        const sec = document.getElementById(`comments-section-${postId}`);
        if (sec.classList.contains('hidden')) {
          sec.classList.remove('hidden');
          loadComments(postId);
        } else {
          sec.classList.add('hidden');
        }
      }

      // Load Comments from DB
      async function loadComments(postId) {
        const listEl = document.getElementById(`comments-list-${postId}`);
        listEl.innerHTML = '<div class="text-center py-2 text-xs text-on-surface-variant">Loading comments...</div>';

        try {
          const r = await fetch(API_BASE + `/api/posts/${postId}/comments`, { headers: H });
          if (r.ok) {
            const data = await r.json();
            const comments = data.comments || [];
            if (!comments.length) {
              listEl.innerHTML = '<div class="text-center py-2 text-xs text-on-surface-variant">No comments yet. Be the first to share!</div>';
              return;
            }

            listEl.innerHTML = comments.map(c => {
              const name = `${c.author?.firstName || ''} ${c.author?.lastName || ''}`.trim() || 'User';
              const color = getAvatarColor(name);
              const initials = getInitials(c.author?.firstName, c.author?.lastName);
              const isOwn = c.author?.id === ME.id || c.author?.id === ME._id;
              const commenterId = c.author?.id || c.author?._id;

              return `<div class="flex items-start gap-2.5 p-2 rounded-xl bg-surface-container-low">
                <div class="w-7 h-7 rounded-full flex items-center justify-center font-bold text-white text-[10px] shrink-0 cursor-pointer overflow-hidden" style="background:${color}" onclick="showUserProfile('${commenterId}')" title="View Profile">
                  ${c.author?.avatar 
                    ? `<img src="${c.author.avatar}" class="w-full h-full object-cover">` 
                    : initials}
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center justify-between">
                    <span class="font-bold text-[11px] text-on-surface hover:text-primary cursor-pointer transition-colors" onclick="showUserProfile('${commenterId}')" title="View Profile">${escapeHtml(name)}</span>
                    <div class="flex items-center gap-1.5">
                      <span class="text-[9px] text-on-surface-variant">${formatTimeAgo(c.createdAt)}</span>
                      ${isOwn ? `<button onclick="deleteComment('${postId}', '${c.id}')" class="text-outline hover:text-error text-[10px]" title="Delete Comment">✕</button>` : ''}
                    </div>
                  </div>
                  <p class="text-xs text-on-surface mt-0.5 leading-relaxed">${escapeHtml(c.content)}</p>
                </div>
              </div>`;
            }).join('');
          }
        } catch(e) {
          listEl.innerHTML = '<div class="text-center py-2 text-xs text-error">Failed to load comments</div>';
        }
      }

      // Submit Comment
      window.submitComment = async function(postId) {
        const inp = document.getElementById(`comment-input-${postId}`);
        const content = inp.value.trim();
        if (!content) return;

        try {
          const r = await fetch(API_BASE + `/api/posts/${postId}/comments`, {
            method: 'POST',
            headers: H,
            body: JSON.stringify({ content })
          });
          if (r.ok) {
            inp.value = '';
            loadComments(postId);
            loadFeed(); // refreshes count in action row
          }
        } catch(e) {}
      }

      // Delete Comment
      window.deleteComment = async function(postId, commentId) {
        if (!confirm('Delete this comment?')) return;
        try {
          const r = await fetch(API_BASE + `/api/posts/${postId}/comments/${commentId}`, {
            method: 'DELETE',
            headers: H
          });
          if (r.ok) {
            showToast('Comment deleted', 'success');
            loadComments(postId);
            loadFeed();
          }
        } catch(e) {}
      }

      // Local feed search filtering
      document.getElementById('feed-search').addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        document.querySelectorAll('#feed-list > div').forEach(card => {
          const authorName = card.querySelector('.font-bold.text-sm')?.textContent.toLowerCase() || '';
          const postText = card.querySelector('.whitespace-pre-wrap')?.textContent.toLowerCase() || '';
          if (authorName.includes(q) || postText.includes(q)) {
            card.style.display = '';
          } else {
            card.style.display = 'none';
          }
        });
      });

      // Socket.IO real-time activity status
      function initSocket() {
        try {
          const SOCKET_URL = ['localhost','127.0.0.1'].includes(location.hostname)
            ? '/' : 'https://projecthive-backend.onrender.com';
          const socket = io(SOCKET_URL, { auth: { token: TK }, transports: ['websocket', 'polling'] });
          socket.on('status:update', data => {
            const { userId, status } = data;
            document.querySelectorAll(`.status-indicator-container[data-user-id="${userId}"]`).forEach(container => {
              let dot = container.querySelector('.status-dot');
              if (status === 'online') {
                if (!dot) {
                  dot = document.createElement('span');
                  dot.className = 'absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 rounded-full border-2 border-surface status-dot';
                  dot.title = 'Online';
                  container.appendChild(dot);
                }
              } else {
                if (dot) dot.remove();
              }
            });
          });
        } catch(e) {}
      }

      // Lightbox Handlers
      window.openLightbox = function(src) {
        const modal = document.getElementById('lightbox-modal');
        const img = document.getElementById('lightbox-img');
        if (modal && img) {
          img.src = src;
          modal.classList.remove('hidden');
        }
      }
      window.closeLightbox = function() {
        const modal = document.getElementById('lightbox-modal');
        if (modal) {
          modal.classList.add('hidden');
        }
      }

      // Init Page Execution
      async function main() {
        await Promise.allSettled([
          initProfile(),
          loadFeed(),
          loadSuggestions(),
          loadStats()
        ]);
        initSocket();
        handleSharedPostQuery();
      }
      
      main();
    })();
  </script>

  <!-- Lightbox Modal -->
  <div id="lightbox-modal" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-center justify-center p-4 cursor-zoom-out" onclick="closeLightbox()">
    <button class="absolute top-4 right-4 text-white hover:text-primary transition-colors">
      <span class="material-symbols-outlined text-3xl">close</span>
    </button>
    <img id="lightbox-img" class="max-w-full max-h-full rounded-lg object-contain shadow-2xl" src="" alt="Zoomed attachment" onclick="event.stopPropagation()">
  </div>
</body>
</html>
