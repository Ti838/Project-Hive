<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Notifications ‚Äî ProjectHive</title>
<script>(function(){const t=localStorage.getItem('theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark');}})()</script>
<style>
  html { background-color: #F0F2F9 !important; }
  html.dark { background-color: #0C0D14 !important; }
  body { background-color: #F0F2F9 !important; }
  html.dark body { background-color: #0C0D14 !important; }
</style>
<link rel="icon" href="/favicon.png?v=2">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/ph-design.css">
<link rel="stylesheet" href="/assets/css/ph-system.css?v=4">
<script src="/assets/js/core/ph-toast.js"></script>
<script src="/assets/js/core/ph-sidebar.js?v=5"></script>
<script src="/assets/js/core/auth.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
body{background:var(--bg);color:var(--tx);margin:0}
.hero{background:linear-gradient(135deg,#6366f1 0%,#7c3aed 60%,#a855f7 100%);padding:36px 32px 78px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;width:320px;height:320px;border-radius:50%;background:rgba(255,255,255,.05);top:-80px;right:-60px}
.nt-wrap{max-width:720px;margin:-48px auto 0;padding:0 24px 60px;position:relative;z-index:1}
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.tabs{display:flex;gap:4px;background:var(--sf);border:1.5px solid var(--bd);border-radius:12px;padding:4px}
.tab{padding:7px 16px;border-radius:9px;border:none;background:transparent;color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.tab.on{background:var(--ac);color:#fff}
.mark-btn{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:10px;border:1.5px solid var(--bd);background:var(--sf);color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.mark-btn:hover{border-color:var(--ac);color:var(--ac)}
.n-list{display:flex;flex-direction:column;gap:10px}
.n-card{background:var(--sf);border:1.5px solid var(--bd);border-radius:16px;padding:16px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.n-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.09);border-color:var(--bd2)}
.n-card.unread{border-left-width:3px}
.n-card.unread::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(99,102,241,.03),transparent);pointer-events:none}
.n-ic{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Material Symbols Outlined';font-size:20px;flex-shrink:0}
.n-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px}
.n-time{font-size:11px;color:var(--sub)}
.n-msg{font-size:13px;line-height:1.55;color:var(--tx)}
.n-msg.fw{font-weight:700}
.empty{text-align:center;padding:64px 20px}
.empty-ic{font-family:'Material Symbols Outlined';font-size:64px;color:var(--bd2);display:block;margin-bottom:12px}
.sum-card{background:var(--sf);border:1.5px solid var(--bd);border-radius:16px;padding:18px 20px;display:flex;gap:20px;margin-bottom:18px;flex-wrap:wrap}
.sum-item{display:flex;align-items:center;gap:10px;flex:1;min-width:100px}
.sum-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Material Symbols Outlined';font-size:18px;flex-shrink:0}
.skel{background:linear-gradient(90deg,var(--sf2) 25%,var(--sf) 50%,var(--sf2) 75%);background-size:200%;animation:sh 1.4s infinite;border-radius:8px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.delete-btn:hover{background:rgba(239,68,68,.1) !important;color:#ef4444 !important}
</style>
</head>
<body data-no-float-theme="1">
<div id="ph-sidebar"></div>
<div class="ph-page">

<div class="ph-topbar">
  <span style="font-family:'Material Symbols Outlined';color:var(--ac)">notifications</span>
  <h1 style="font-size:17px;font-weight:800;margin:0;flex:1;color:var(--tx)">Notifications</h1>
  <div id="unread-pill" style="display:none;background:var(--ac);color:#fff;border-radius:999px;padding:4px 11px;font-size:12px;font-weight:700">
    <span id="unread-cnt">0</span> unread
  </div>
</div>

<div class="hero">
  <div style="position:relative;z-index:1">
    <div style="font-size:26px;font-weight:900;color:#fff">Your Activity</div>
    <div style="font-size:13px;color:rgba(255,255,255,.78);margin-top:6px">Stay updated on teams, projects and connections</div>
  </div>
</div>

<div class="nt-wrap">
  <!-- Summary -->
  <div class="sum-card">
    <div class="sum-item"><div class="sum-ic" style="background:rgba(99,102,241,.12);color:#6366f1">notifications</div><div><div style="font-size:18px;font-weight:800;color:var(--tx)" id="s-total">‚Äî</div><div style="font-size:11px;color:var(--sub)">Total</div></div></div>
    <div class="sum-item"><div class="sum-ic" style="background:rgba(236,72,153,.12);color:#ec4899">mark_email_unread</div><div><div style="font-size:18px;font-weight:800;color:var(--tx)" id="s-unread">‚Äî</div><div style="font-size:11px;color:var(--sub)">Unread</div></div></div>
    <div class="sum-item"><div class="sum-ic" style="background:rgba(16,185,129,.12);color:#10b981">group</div><div><div style="font-size:18px;font-weight:800;color:var(--tx)" id="s-team">‚Äî</div><div style="font-size:11px;color:var(--sub)">Team</div></div></div>
    <div class="sum-item"><div class="sum-ic" style="background:rgba(245,158,11,.12);color:#f59e0b">person_add</div><div><div style="font-size:18px;font-weight:800;color:var(--tx)" id="s-friend">‚Äî</div><div style="font-size:11px;color:var(--sub)">Friends</div></div></div>
  </div>

  <div class="top-row">
    <div class="tabs">
      <button id="tab-all" class="tab on" onclick="setTab('all',this)">All</button>
      <button id="tab-unread" class="tab" onclick="setTab('unread',this)">Unread</button>
      <button id="tab-team" class="tab" onclick="setTab('team',this)">Teams</button>
      <button id="tab-friend" class="tab" onclick="setTab('friend',this)">Friends</button>
      <button id="tab-project" class="tab" onclick="setTab('project',this)">Projects</button>
    </div>
    <button class="mark-btn" onclick="markAll()">
      <span style="font-family:'Material Symbols Outlined';font-size:16px">done_all</span>Mark all read
    </button>
  </div>

  <div id="n-list" class="n-list">
    <div class="n-card skel" style="height:76px"></div>
    <div class="n-card skel" style="height:76px"></div>
    <div class="n-card skel" style="height:76px"></div>
  </div>
</div>
</div>

<script>
(function(){
  window.PHConfirm = function({ title, message, confirmText = 'Confirm', cancelText = 'Cancel', danger = false, onConfirm }) {
    let modal = document.getElementById('ph-custom-confirm-modal');
    if (!modal) {
      modal = document.createElement('div');
      modal.id = 'ph-custom-confirm-modal';
      modal.style.cssText = `
        position: fixed;
        inset: 0;
        z-index: 999999;
        background: rgba(0,0,0,0.55);
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.22s ease;
        padding: 16px;
        font-family: 'Inter', sans-serif;
      `;
      document.body.appendChild(modal);
    }
    
    const iconColor = danger ? '#ef4444' : '#6366f1';
    const iconBg = danger ? 'rgba(239,68,68,0.08)' : 'rgba(99,102,241,0.08)';
    const iconBorder = danger ? 'rgba(239,68,68,0.15)' : 'rgba(99,102,241,0.15)';
    const confirmBtnColor = danger ? '#ef4444' : '#6366f1';
    const confirmBtnHoverBg = danger ? 'rgba(239,68,68,0.06)' : 'rgba(99,102,241,0.06)';
    
    const iconSvg = danger 
      ? `<svg viewBox="0 0 24 24" width="26" height="26" stroke="${iconColor}" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>`
      : `<svg viewBox="0 0 24 24" width="26" height="26" stroke="${iconColor}" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`;

    modal.innerHTML = `
      <div class="lo-card" style="
        background: var(--bg-surface-container-lowest, var(--ph-card, #fff));
        border: 1px solid var(--border-outline, var(--ph-border, #e2e8f0));
        border-radius: 24px;
        width: 100%;
        max-width: 360px;
        overflow: hidden;
        box-shadow: 0 24px 64px rgba(0,0,0,0.3);
        transform: scale(0.9) translateY(10px);
        transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      ">
        <div class="lo-header" style="padding: 28px 24px 20px; text-align: center;">
          <div class="lo-icon" style="
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: ${iconBg};
            border: 1.5px solid ${iconBorder};
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
          ">
            ${iconSvg}
          </div>
          <h3 class="lo-title" style="
            font-size: 17px;
            font-weight: 800;
            color: var(--text-on-surface, var(--ph-txt, #0f172a));
            margin: 0 0 8px;
          ">${title}</h3>
          <p class="lo-msg" style="
            font-size: 13px;
            color: var(--text-on-surface-variant, var(--ph-txt2, #475569));
            line-height: 1.5;
            margin: 0;
          ">${message}</p>
        </div>
        <div class="lo-actions" style="display: flex; border-top: 1px solid var(--border-outline, var(--ph-border, #e2e8f0));">
          <button class="lo-btn lo-btn-cancel" id="ph-confirm-cancel" style="
            flex: 1;
            padding: 15px 12px;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: background 0.15s;
            color: var(--text-on-surface-variant, var(--ph-txt2, #475569));
          ">${cancelText}</button>
          <button class="lo-btn lo-btn-confirm" id="ph-confirm-ok" style="
            flex: 1;
            padding: 15px 12px;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: background 0.15s;
            color: ${confirmBtnColor};
            border-left: 1px solid var(--border-outline, var(--ph-border, #e2e8f0));
          ">${confirmText}</button>
        </div>
      </div>
    `;

    const btnCancel = modal.querySelector('#ph-confirm-cancel');
    const btnConfirm = modal.querySelector('#ph-confirm-ok');
    
    btnCancel.addEventListener('mouseenter', () => btnCancel.style.background = 'var(--bg-surface-variant, #f1f5f9)');
    btnCancel.addEventListener('mouseleave', () => btnCancel.style.background = 'none');
    btnConfirm.addEventListener('mouseenter', () => btnConfirm.style.background = confirmBtnHoverBg);
    btnConfirm.addEventListener('mouseleave', () => btnConfirm.style.background = 'none');

    const container = modal.querySelector('.lo-card');
    
    function hide() {
      modal.style.opacity = '0';
      modal.style.pointerEvents = 'none';
      container.style.transform = 'scale(0.9) translateY(10px)';
    }

    btnCancel.addEventListener('click', hide);
    btnConfirm.addEventListener('click', () => {
      hide();
      if (typeof onConfirm === 'function') onConfirm();
    });
    
    modal.addEventListener('click', (e) => {
      if (e.target === modal) hide();
    });

    modal.style.pointerEvents = 'all';
    modal.style.opacity = '1';
    requestAnimationFrame(() => {
      container.style.transform = 'scale(1) translateY(0)';
    });
  };

  const TK=localStorage.getItem('access_token');
  if(!TK){location.href='/login';return;}
  PHSidebar.init('notifications','../../');

  // Clear notification badges when user lands on this page
  setTimeout(() => {
    const nb = document.getElementById('notif-badge');
    if (nb) { nb.textContent = ''; nb.classList.add('hidden'); }
    const tb = document.getElementById('topbar-unread');
    if (tb) tb.classList.add('hidden');
  }, 400);

  const H={Authorization:'Bearer '+TK};
  const API_BASE=(location.hostname==='localhost'||location.hostname==='127.0.0.1')
    ? (location.port === '3000' ? 'http://localhost:5000' : '')
    : 'https://projecthive-backend.onrender.com';

  const ICONS={team:'group',project:'folder_special',message:'chat',friend:'person_add',system:'info',default:'circle_notifications'};
  const COLORS={team:'#3b82f6',project:'#8b5cf6',message:'#10b981',friend:'#f59e0b',system:'#6366f1',default:'#6366f1'};

  function ago(d){if(!d)return '';const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return 'Just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}

  let all=[], currentTab='all';

  function stats(){
    const uc=all.filter(n=>!n.read).length;
    document.getElementById('s-total').textContent=all.length;
    document.getElementById('s-unread').textContent=uc;
    document.getElementById('s-team').textContent=all.filter(n=>n.type==='team').length;
    document.getElementById('s-friend').textContent=all.filter(n=>n.type==='friend').length;
    if(uc>0){document.getElementById('unread-pill').style.display='block';document.getElementById('unread-cnt').textContent=uc;}
    else document.getElementById('unread-pill').style.display='none';
    const ub=document.getElementById('tab-unread');
    ub.textContent=uc?`Unread (${uc})`:'Unread';
  }

  // √¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨ Get redirect link per notification type √¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨
  function getNotifLink(n) {
    const meta = n.metadata || n.data || {};
    switch(n.type) {
      case 'friend':  return `/people?tab=requests${meta.senderId ? '&uid=' + meta.senderId : ''}`;
      case 'team':    return meta.teamId     ? `/teams?tid=${meta.teamId}`        : '/teams';
      case 'project': return meta.projectId  ? `/showcase?pid=${meta.projectId}` : '/showcase';
      case 'message': return meta.senderId   ? `/messages?chat=${meta.senderId}` : '/messages';
      default: return '';
    }
  }

  function render(list){
    const el=document.getElementById('n-list');
    if(!list.length){el.innerHTML=`<div class="empty"><span class="empty-ic">notifications_none</span><div style="font-size:17px;font-weight:800;color:var(--tx);margin-bottom:6px">${currentTab==='unread'?'All caught up!':'Nothing here yet'}</div><div style="font-size:13px;color:var(--sub)">${currentTab==='unread'?'No unread notifications':'Notifications will appear here'}</div></div>`;return;}
    el.innerHTML=list.map(n=>{
      const t=n.type||'default';
      const ic=ICONS[t]||ICONS.default;
      const co=COLORS[t]||COLORS.default;
      const ur=!n.read;
      const link=getNotifLink(n);
      return `<div class="n-card${ur?' unread':''}" id="nc-${n._id}" onclick="handleNotifClick('${n._id}','${link}',this)" style="${ur?'border-left-color:'+co:''}" title="${link?'Click to open':''}">
        <div class="n-ic" style="background:${co}18;color:${co}">${ic}</div>
        <div style="flex:1;min-width:0">
          <div class="n-msg${ur?' fw':''}">${n.message||n.title||'New notification'}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
            <span class="n-time">${ago(n.createdAt)}</span>
            ${n.type?`<span style="padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;background:${co}18;color:${co}">${n.type}</span>`:''}
            ${link?`<span style="font-size:10px;color:${co};font-weight:600">&#8594; Open</span>`:''}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0;margin-top:4px">
          ${ur?`<div class="n-dot" style="background:${co}"></div>`:'<span style="font-family:\'Material Symbols Outlined\';font-size:16px;color:var(--bd2)">check_circle</span>'}
          <button onclick="event.stopPropagation(); deleteNotif('${n._id}', this)" class="delete-btn" style="border:none;background:transparent;color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:4px;border-radius:6px;transition:all 0.15s" title="Delete notification">
            <span style="font-family:'Material Symbols Outlined';font-size:18px">delete</span>
          </button>
        </div>
      </div>`;
    }).join('');
  }

  window.setTab=function(t,btn){
    currentTab=t;
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    render(t==='all'?all:t==='unread'?all.filter(n=>!n.read):all.filter(n=>n.type===t));
  };

  window.handleNotifClick=async function(id, link, el){
    const n=all.find(x=>x._id===id);
    if(n&&!n.read){
      const oldRead = n.read;
      // Optimistic update
      n.read=true;
      el.classList.remove('unread');
      el.querySelector('.n-msg')?.classList.remove('fw');
      el.querySelector('.n-dot')?.remove();
      
      const deleteBtn = el.querySelector('.delete-btn');
      if (deleteBtn && deleteBtn.previousElementSibling) {
        deleteBtn.previousElementSibling.outerHTML = '<span style="font-family:\'Material Symbols Outlined\';font-size:16px;color:var(--bd2);margin-top:4px;flex-shrink:0">check_circle</span>';
      }
      stats();
      if(currentTab==='unread') {
        const card = document.getElementById(`nc-${id}`);
        if (card) {
          card.style.opacity = '0';
          card.style.transform = 'scale(0.95)';
          card.style.transition = 'all 0.2s ease';
          setTimeout(() => render(all.filter(n=>!n.read)), 200);
        } else {
          render(all.filter(n=>!n.read));
        }
      }

      try{
        const res = await fetch(API_BASE+`/api/notifications/${id}/read`,{method:'PUT',headers:H});
        if (!res.ok) throw new Error();
      }catch(e){
        // Revert on error
        n.read = oldRead;
        stats();
        render(currentTab==='all'?all:currentTab==='unread'?all.filter(n=>!n.read):all.filter(n=>n.type===currentTab));
        PHToast?.error('Failed to update notification read status');
      }
    }
    if(link) setTimeout(()=>window.location.href=link, 150);
  };

  // Legacy alias
  window.readN=function(id,el){window.handleNotifClick(id,'',el);};

  window.markAll=async function(){
    PHConfirm({
      title: 'Mark all as read?',
      message: 'This will mark all of your notifications as read.',
      confirmText: 'Mark Read',
      cancelText: 'Cancel',
      danger: false,
      onConfirm: async () => {
        const oldAll = JSON.parse(JSON.stringify(all));
        
        // Optimistic update
        all.forEach(n=>n.read=true);
        stats();
        render(currentTab==='all'?all:all.filter(n=>n.type===currentTab));
        PHToast?.success('All notifications marked as read');

        try {
          const res = await fetch(API_BASE+'/api/notifications/read-all',{method:'PUT',headers:H});
          if (!res.ok) throw new Error();
        } catch(e) {
          // Revert on error
          all = oldAll;
          stats();
          render(currentTab==='all'?all:all.filter(n=>n.type===currentTab));
          PHToast?.error('Failed to mark notifications as read. Please try again.');
        }
      }
    });
  };

  window.deleteNotif = async function(id, btn){
    PHConfirm({
      title: 'Delete notification?',
      message: 'Are you sure you want to permanently delete this notification?',
      confirmText: 'Delete',
      cancelText: 'Cancel',
      danger: true,
      onConfirm: async () => {
        const oldAll = JSON.parse(JSON.stringify(all));

        // Optimistic update
        all = all.filter(n => n._id !== id);
        stats();

        // Animate removal
        const card = document.getElementById(`nc-${id}`);
        if (card) {
          card.style.opacity = '0';
          card.style.transform = 'scale(0.95)';
          card.style.transition = 'all 0.2s ease';
          setTimeout(() => {
            render(currentTab==='all'?all:currentTab==='unread'?all.filter(n=>!n.read):all.filter(n=>n.type===currentTab));
          }, 200);
        } else {
          render(currentTab==='all'?all:currentTab==='unread'?all.filter(n=>!n.read):all.filter(n=>n.type===currentTab));
        }
        PHToast?.success('Notification deleted');

        try {
          const res = await fetch(API_BASE+`/api/notifications/${id}`, { method: 'DELETE', headers: H });
          if (!res.ok) throw new Error();
        } catch(e) {
          // Revert on error
          all = oldAll;
          stats();
          render(currentTab==='all'?all:currentTab==='unread'?all.filter(n=>!n.read):all.filter(n=>n.type===currentTab));
          PHToast?.error('Failed to delete notification. Please try again.');
        }
      }
    });
  };

  // √¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨ Load from API √¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨√¢‚Äù‚Ç¨
  fetch(API_BASE+'/api/notifications?limit=60',{headers:H}).then(r=>r.ok?r.json():null).then(d=>{
    if(d){
      // Normalize API response fields (Supabase snake_case √¢‚ÄÝ‚Äô camelCase)
      const raw = d.notifications||d||[];
      all = raw.map(n => ({
        _id:       n.id || n._id,
        id:        n.id || n._id,
        type:      n.type || 'default',
        title:     n.title || 'Notification',
        message:   n.message || '',
        read:      n.read ?? n.is_read ?? false,
        createdAt: n.createdAt || n.created_at,
        metadata:  n.metadata || n.data || {},
      }));
    }
    stats();render(all);
  }).catch(()=>{ all=[];stats();render(all); });

  // ‚îÄ‚îÄ‚îÄ Global Notification Event Listener ‚îÄ‚îÄ‚îÄ
  window.addEventListener('app:notification-update', (e) => {
    const notif = e.detail;
    if(!notif) return;
    const normalized = {
      _id:       notif.id || notif._id || Date.now().toString(),
      id:        notif.id || notif._id,
      type:      notif.type || 'default',
      title:     notif.title || 'Notification',
      message:   notif.message || '',
      read:      notif.read ?? notif.is_read ?? false,
      createdAt: notif.createdAt || notif.created_at || new Date().toISOString(),
      metadata:  notif.metadata || notif.data || {},
    };
    if(all.find(n=>n._id===normalized._id || n.id===normalized.id)) return;
    all.unshift(normalized);
    stats();
    const list = currentTab==='all'?all:currentTab==='unread'?all.filter(n=>!n.read):all.filter(n=>n.type===currentTab);
    render(list);
  });
})();
</script>
