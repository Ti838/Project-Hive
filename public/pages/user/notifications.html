<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Notifications — ProjectHive</title>
<script>(function(){const t=localStorage.getItem('theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark');}})()</script>
<link rel="icon" href="../../assets/svg/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/css/ph-design.css">
<link rel="stylesheet" href="../../assets/css/ph-system.css">
<script src="../../assets/js/core/ph-toast.js"></script>
<script src="../../assets/js/core/ph-sidebar.js"></script>
<style>
body{background:var(--bg);color:var(--tx);margin:0}
.hero{background:linear-gradient(135deg,#6366f1 0%,#7c3aed 60%,#a855f7 100%);padding:36px 32px 78px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;width:320px;height:320px;border-radius:50%;background:rgba(255,255,255,.05);top:-80px;right:-60px}
.nt-wrap{max-width:720px;margin:-48px auto 0;padding:0 24px 60px;position:relative;z-index:1}
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.tabs{display:flex;gap:4px;background:var(--sf);border:1.5px solid var(--bd);border-radius:12px;padding:4px}
.tab{padding:7px 16px;border-radius:9px;border:none;background:transparent;color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.tab.on{background:var(--ac);color:#fff}
.mark-btn{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:10px;border:1.5px solid var(--bd);background:var(--sf);color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.mark-btn:hover{border-color:var(--ac);color:var(--ac)}
.n-list{display:flex;flex-direction:column;gap:10px}
.n-card{background:var(--sf);border:1.5px solid var(--bd);border-radius:16px;padding:16px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.n-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.09);border-color:var(--bd2)}
.n-card.unread{border-left-width:3px}
.n-card.unread::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(99,102,241,.03),transparent);pointer-events:none}
.n-ic{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Material Symbols Outlined';font-size:20px;flex-shrink:0}
.n-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px}
.n-time{font-size:11px;color:var(--sub)}
.n-msg{font-size:13px;line-height:1.55;color:var(--tx)}
.n-msg.fw{font-weight:700}
.empty{text-align:center;padding:64px 20px}
.empty-ic{font-family:'Material Symbols Outlined';font-size:64px;color:var(--bd2);display:block;margin-bottom:12px}
.sum-card{background:var(--sf);border:1.5px solid var(--bd);border-radius:16px;padding:18px 20px;display:flex;gap:20px;margin-bottom:18px;flex-wrap:wrap}
.sum-item{display:flex;align-items:center;gap:10px;flex:1;min-width:100px}
.sum-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Material Symbols Outlined';font-size:18px;flex-shrink:0}
.skel{background:linear-gradient(90deg,var(--sf2) 25%,var(--sf) 50%,var(--sf2) 75%);background-size:200%;animation:sh 1.4s infinite;border-radius:8px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body data-no-float-theme="1">
<div id="ph-sidebar"></div>
<div class="ph-page">

<div class="ph-topbar">
  <span style="font-family:'Material Symbols Outlined';color:var(--ac)">notifications</span>
  <h1 style="font-size:17px;font-weight:800;margin:0;flex:1;color:var(--tx)">Notifications</h1>
  <div id="unread-pill" style="display:none;background:var(--ac);color:#fff;border-radius:999px;padding:4px 11px;font-size:12px;font-weight:700">
    <span id="unread-cnt">0</span> unread
  </div>
</div>

<div class="hero">
  <div style="position:relative;z-index:1">
    <div style="font-size:26px;font-weight:900;color:#fff">Your Activity</div>
    <div style="font-size:13px;color:rgba(255,255,255,.78);margin-top:6px">Stay updated on teams, projects and connections</div>
  </div>
</div>

<div class="nt-wrap">
  <!-- Summary -->
  <div class="sum-card">
    <div class="sum-item"><div class="sum-ic" style="background:rgba(99,102,241,.12);color:#6366f1">notifications</div><div><div style="font-size:18px;font-weight:800;color:var(--tx)" id="s-total">—</div><div style="font-size:11px;color:var(--sub)">Total</div></div></div>
    <div class="sum-item"><div class="sum-ic" style="background:rgba(236,72,153,.12);color:#ec4899">mark_email_unread</div><div><div style="font-size:18px;font-weight:800;color:var(--tx)" id="s-unread">—</div><div style="font-size:11px;color:var(--sub)">Unread</div></div></div>
    <div class="sum-item"><div class="sum-ic" style="background:rgba(16,185,129,.12);color:#10b981">group</div><div><div style="font-size:18px;font-weight:800;color:var(--tx)" id="s-team">—</div><div style="font-size:11px;color:var(--sub)">Team</div></div></div>
    <div class="sum-item"><div class="sum-ic" style="background:rgba(245,158,11,.12);color:#f59e0b">person_add</div><div><div style="font-size:18px;font-weight:800;color:var(--tx)" id="s-friend">—</div><div style="font-size:11px;color:var(--sub)">Friends</div></div></div>
  </div>

  <div class="top-row">
    <div class="tabs">
      <button id="tab-all" class="tab on" onclick="setTab('all',this)">All</button>
      <button id="tab-unread" class="tab" onclick="setTab('unread',this)">Unread</button>
      <button id="tab-team" class="tab" onclick="setTab('team',this)">Teams</button>
      <button id="tab-friend" class="tab" onclick="setTab('friend',this)">Friends</button>
      <button id="tab-project" class="tab" onclick="setTab('project',this)">Projects</button>
    </div>
    <button class="mark-btn" onclick="markAll()">
      <span style="font-family:'Material Symbols Outlined';font-size:16px">done_all</span>Mark all read
    </button>
  </div>

  <div id="n-list" class="n-list">
    <div class="n-card skel" style="height:76px"></div>
    <div class="n-card skel" style="height:76px"></div>
    <div class="n-card skel" style="height:76px"></div>
  </div>
</div>
</div>

<script>
(function(){
  const TK=localStorage.getItem('access_token');
  if(!TK){location.href='../auth/login.html';return;}
  PHSidebar.init('notifications','../../');
  const H={Authorization:'Bearer '+TK};
  const API_BASE=(location.hostname==='localhost'||location.hostname==='127.0.0.1')?'':'https://projecthive-backend.onrender.com';

  const ICONS={team:'group',project:'folder_special',message:'chat',friend:'person_add',system:'info',default:'circle_notifications'};
  const COLORS={team:'#3b82f6',project:'#8b5cf6',message:'#10b981',friend:'#f59e0b',system:'#6366f1',default:'#6366f1'};

  function ago(d){if(!d)return '';const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return 'Just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}

  let all=[], currentTab='all';

  function stats(){
    const uc=all.filter(n=>!n.read).length;
    document.getElementById('s-total').textContent=all.length;
    document.getElementById('s-unread').textContent=uc;
    document.getElementById('s-team').textContent=all.filter(n=>n.type==='team').length;
    document.getElementById('s-friend').textContent=all.filter(n=>n.type==='friend').length;
    if(uc>0){document.getElementById('unread-pill').style.display='block';document.getElementById('unread-cnt').textContent=uc;}
    else document.getElementById('unread-pill').style.display='none';
    const ub=document.getElementById('tab-unread');
    ub.textContent=uc?`Unread (${uc})`:'Unread';
  }

  function render(list){
    const el=document.getElementById('n-list');
    if(!list.length){el.innerHTML=`<div class="empty"><span class="empty-ic">notifications_none</span><div style="font-size:17px;font-weight:800;color:var(--tx);margin-bottom:6px">${currentTab==='unread'?'All caught up! <span class="ph-svg-icon" style="display:inline-flex;align-items:center;vertical-align:middle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5.8 11.3 2 22l10.7-3.79"/><path d="M4 3h.01"/><path d="M22 8h.01"/><path d="M15 2h.01"/><path d="M22 20h.01"/><path d="m22 2-2.24.75a2.9 2.9 0 0 0-1.96 3.12v0c.1.86-.57 1.63-1.45 1.63h-.38c-.86 0-1.6.6-1.76 1.44L14 10"/><path d="m22 13-.82-.33c-.86-.34-1.82.2-1.98 1.11v0c-.11.7-.72 1.22-1.43 1.22H17"/><path d="m11 2 .33.82c.34.86-.2 1.82-1.11 1.98v0C9.52 4.9 9 5.52 9 6.23V7"/><path d="M11 13c1.93 1.93 2.83 4.17 2 5-.83.83-3.07-.07-5-2-1.93-1.93-2.83-4.17-2-5 .83-.83 3.07.07 5 2z"/></svg></span>':'Nothing here yet'}</div><div style="font-size:13px;color:var(--sub)">${currentTab==='unread'?'No unread notifications':'Notifications will appear here'}</div></div>`;return;}
    el.innerHTML=list.map(n=>{
      const t=n.type||'default';
      const ic=ICONS[t]||ICONS.default;
      const co=COLORS[t]||COLORS.default;
      const ur=!n.read;
      return `<div class="n-card${ur?' unread':''}" id="nc-${n._id}" onclick="readN('${n._id}',this)" style="${ur?'border-left-color:'+co:''}" title="${ur?'Click to mark as read':''}">
        <div class="n-ic" style="background:${co}18;color:${co}">${ic}</div>
        <div style="flex:1;min-width:0">
          <div class="n-msg${ur?' fw':''}">${n.message||n.title||'New notification'}</div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
            <span class="n-time">${ago(n.createdAt)}</span>
            ${n.type?`<span style="padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;background:${co}18;color:${co}">${n.type}</span>`:''}
          </div>
        </div>
        ${ur?`<div class="n-dot" style="background:${co}"></div>`:'<span style="font-family:\'Material Symbols Outlined\';font-size:16px;color:var(--bd2);margin-top:4px;flex-shrink:0">check_circle</span>'}
      </div>`;
    }).join('');
  }

  window.setTab=function(t,btn){
    currentTab=t;
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    render(t==='all'?all:t==='unread'?all.filter(n=>!n.read):all.filter(n=>n.type===t));
  };

  window.readN=async function(id,el){
    const n=all.find(x=>x._id===id);
    if(!n||n.read)return;
    try{await fetch(API_BASE+`/api/notifications/${id}/read`,{method:'PUT',headers:H});}catch(e){}
    n.read=true;
    el.classList.remove('unread');
    el.querySelector('.n-msg')?.classList.remove('fw');
    el.querySelector('.n-dot')?.remove();
    const ic=document.createElement('span');
    ic.style.cssText="font-family:'Material Symbols Outlined';font-size:16px;color:var(--bd2);margin-top:4px;flex-shrink:0";
    ic.textContent='check_circle';
    el.appendChild(ic);
    stats();
    if(currentTab==='unread')render(all.filter(n=>!n.read));
  };

  window.markAll=async function(){
    try{await fetch(API_BASE+'/api/notifications/read-all',{method:'PUT',headers:H});}catch(e){}
    all.forEach(n=>n.read=true);
    stats();
    render(currentTab==='all'?all:all.filter(n=>n.type===currentTab));
    PHToast?.success('All marked as read <span class="ph-svg-icon" style="display:inline-flex;align-items:center;vertical-align:middle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span>');
  };

  // Generate demo notifications if API returns nothing
  function demoNotifs(){
    return [
      {_id:'d1',type:'team',message:'<span class="ph-svg-icon" style="display:inline-flex;align-items:center;vertical-align:middle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></span> You were invited to join "WebCraft Team"',read:false,createdAt:new Date(Date.now()-300000)},
      {_id:'d2',type:'friend',message:'<span class="ph-svg-icon" style="display:inline-flex;align-items:center;vertical-align:middle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12c1.33-4 4-6 9-6 5 0 7.67 2 9 6-1.33 4-4 6-9 6-5 0-7.67-2-9-6z"/></svg></span> Ahmed Hassan sent you a friend request',read:false,createdAt:new Date(Date.now()-1800000)},
      {_id:'d3',type:'project',message:'<span class="ph-svg-icon" style="display:inline-flex;align-items:center;vertical-align:middle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg></span> Your project "EcoRoute" received 5 new views',read:false,createdAt:new Date(Date.now()-3600000)},
      {_id:'d4',type:'message',message:'<span class="ph-svg-icon" style="display:inline-flex;align-items:center;vertical-align:middle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span> Sarah sent you a new message',read:true,createdAt:new Date(Date.now()-7200000)},
      {_id:'d5',type:'team',message:'<span class="ph-svg-icon" style="display:inline-flex;align-items:center;vertical-align:middle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span> Your team application was approved!',read:true,createdAt:new Date(Date.now()-86400000)},
      {_id:'d6',type:'system',message:'<span class="ph-svg-icon" style="display:inline-flex;align-items:center;vertical-align:middle"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span> Welcome to ProjectHive! Complete your profile to get started',read:true,createdAt:new Date(Date.now()-172800000)},
    ];
  }

  fetch(API_BASE+'/api/notifications?limit=60',{headers:H}).then(r=>r.ok?r.json():null).then(d=>{
    if(d){all=d.notifications||d||[];}
    if(!all.length)all=demoNotifs();
    stats();render(all);
  }).catch(()=>{all=demoNotifs();stats();render(all);});
})();
</script>
</body></html>
