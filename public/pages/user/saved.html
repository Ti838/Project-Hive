<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Saved â€” ProjectHive</title>
<script>(function(){const t=localStorage.getItem("theme");if(t==="dark"||(!t&&matchMedia("(prefers-color-scheme:dark)").matches)){document.documentElement.classList.add("dark");}})();</script>
<style>html{background-color:#F0F2F9!important}html.dark{background-color:#0C0D14!important}</style>
<link rel="icon" href="/favicon.png?v=2">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/ph-design.css">
<link rel="stylesheet" href="/assets/css/ph-system.css?v=4">
<script src="/assets/js/core/ph-toast.js"></script>
<script src="/assets/js/core/ph-sidebar.js?v=4"></script>
<style>
.sv-wrap{max-width:720px;margin:0 auto;padding:24px 16px 80px}
.sv-tabs{display:flex;gap:8px;margin-bottom:22px}
.sv-tab{display:flex;align-items:center;gap:6px;padding:8px 18px;border-radius:30px;font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all .2s;font-family:inherit}
.sv-tab.active{background:var(--ac);color:#fff}
.sv-tab:not(.active){background:var(--sf2);color:var(--sub)}
.sv-tab:not(.active):hover{color:var(--tx)}
.sv-count{font-size:11px;background:rgba(255,255,255,.25);padding:1px 7px;border-radius:20px;font-weight:800}
.sv-tab:not(.active) .sv-count{background:var(--bd);color:var(--sub)}

.sv-card{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:20px;margin-bottom:12px;transition:transform .18s,box-shadow .18s,opacity .2s}
.sv-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,.07)}
.sv-card-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sv-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px;flex-shrink:0;overflow:hidden}
.sv-avatar img{width:100%;height:100%;object-fit:cover}
.sv-meta .sv-name{font-size:13px;font-weight:700;color:var(--tx);cursor:pointer;transition:color .15s}
.sv-meta .sv-name:hover{color:var(--ac)}
.sv-meta .sv-info{font-size:11px;color:var(--sub);margin-top:1px}
.sv-body{font-size:13px;color:var(--tx);line-height:1.7;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.sv-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:6px;font-size:10px;font-weight:700;margin-bottom:8px}
.sv-foot{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--bd)}
.sv-foot-actions{display:flex;gap:6px}
.sv-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .15s;font-family:inherit}
.sv-btn-ghost{background:var(--sf2);color:var(--sub)}
.sv-btn-ghost:hover{background:rgba(99,102,241,.08);color:var(--ac)}
.sv-btn-danger{background:rgba(239,68,68,.06);color:#ef4444}
.sv-btn-danger:hover{background:rgba(239,68,68,.12)}
.sv-reactions{display:flex;gap:8px;font-size:12px;color:var(--sub);margin-bottom:10px}
.sv-proj-img{width:100%;height:150px;object-fit:cover;border-radius:10px;margin-bottom:12px}
.sv-proj-title{font-size:15px;font-weight:800;color:var(--tx);margin-bottom:6px}
.sv-empty{text-align:center;padding:80px 24px}
.sv-empty .sv-eic{width:80px;height:80px;border-radius:24px;background:var(--sf2);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.sv-empty .sv-eic span{font-size:36px;color:var(--sub)}
.sv-empty h2{font-size:18px;font-weight:800;color:var(--tx);margin-bottom:6px}
.sv-empty p{font-size:13px;color:var(--sub);max-width:300px;margin:0 auto 20px;line-height:1.6}
.sv-empty a{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;background:var(--ac);color:#fff;text-decoration:none;border-radius:10px;font-size:13px;font-weight:700}
.sv-loading{text-align:center;padding:60px;color:var(--sub);font-size:13px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body data-no-float-theme="1">
<div id="ph-sidebar"></div>
<div class="ph-page">
  <div class="ph-topbar">
    <a href="/feed" aria-label="Go Back" style="color:var(--sub);display:flex;align-items:center;text-decoration:none;transition:color .15s" onmouseover="this.style.color='var(--ac)'" onmouseout="this.style.color='var(--sub)'"><span class="material-symbols-outlined">arrow_back</span></a>
    <span class="material-symbols-outlined" style="color:var(--ac)">bookmark</span>
    <h1 style="font-size:16px;font-weight:800;margin:0;flex:1;color:var(--tx)">Saved</h1>
  </div>
  <div class="sv-wrap">
    <div class="sv-tabs">
      <button class="sv-tab active" id="tab-posts" onclick="switchTab('posts')">
        <span class="material-symbols-outlined" style="font-size:16px">article</span>Posts
        <span class="sv-count" id="cnt-posts">â€”</span>
      </button>
      <button class="sv-tab" id="tab-projects" onclick="switchTab('projects')">
        <span class="material-symbols-outlined" style="font-size:16px">folder_special</span>Projects
        <span class="sv-count" id="cnt-projects">â€”</span>
      </button>
      <button class="sv-tab" id="tab-ideas" onclick="switchTab('ideas')">
        <span class="material-symbols-outlined" style="font-size:16px">lightbulb</span>Ideas
        <span class="sv-count" id="cnt-ideas">â€”</span>
      </button>
    </div>
    <div id="sv-list">
      <div class="sv-loading"><span class="material-symbols-outlined" style="font-size:28px;animation:spin 1s linear infinite;display:inline-block">progress_activity</span><p style="margin-top:8px">Loading saved items...</p></div>
    </div>
  </div>
</div>

<script>
(function(){
  const TK = localStorage.getItem('access_token');
  if (!TK) { location.href='/login'; return; }

  PHSidebar.init('', '../../');

  const H = { Authorization:'Bearer '+TK, 'Content-Type':'application/json' };
  const API = (location.hostname==='localhost'||location.hostname==='127.0.0.1') ? 'http://localhost:5000' : 'https://projecthive-backend.onrender.com';

  const COLORS = ['#6366f1','#7c3aed','#ec4899','#10b981','#f59e0b','#3b82f6'];
  function getColor(s=''){let h=0;for(const c of s)h=c.charCodeAt(0)+((h<<5)-h);return COLORS[Math.abs(h)%COLORS.length];}
  function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
  function ago(d){if(!d)return'';const s=Math.floor((Date.now()-new Date(d))/1000);if(s<60)return'Just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});}

  const TYPE_BADGE={achievement:{bg:'rgba(245,158,11,.1)',color:'#f59e0b',icon:'emoji_events',label:'Achievement'},project_update:{bg:'rgba(59,130,246,.1)',color:'#3b82f6',icon:'rocket_launch',label:'Project Update'},looking_for_team:{bg:'rgba(16,185,129,.1)',color:'#10b981',icon:'group_add',label:'Looking for Team'}};

  let currentTab='posts', savedPosts=[], savedProjects=[], savedIdeas=[];

  window.switchTab = function(tab) {
    currentTab=tab;
    document.getElementById('tab-posts').className='sv-tab'+(tab==='posts'?' active':'');
    document.getElementById('tab-projects').className='sv-tab'+(tab==='projects'?' active':'');
    document.getElementById('tab-ideas').className='sv-tab'+(tab==='ideas'?' active':'');
    render();
  };

  function render() {
    const el=document.getElementById('sv-list');
    if (currentTab==='posts') {
      if (!savedPosts.length){el.innerHTML=emptyHtml('bookmark_border','No saved posts yet','Save posts from your feed â€” click the bookmark icon on any post.','/feed','Go to Feed');return;}
      el.innerHTML=savedPosts.map(p=>postCard(p)).join('');
    } else if (currentTab==='projects') {
      if (!savedProjects.length){el.innerHTML=emptyHtml('folder_off','No saved projects yet','Explore and save projects that interest you.','/showcase','Explore Projects');return;}
      el.innerHTML=savedProjects.map(p=>projectCard(p)).join('');
    } else {
      if (!savedIdeas.length){el.innerHTML=emptyHtml('lightbulb','No saved ideas yet','Use the AI Generator to create and save project ideas.','/generator','Open AI Generator');return;}
      el.innerHTML=savedIdeas.map((idea,i)=>ideaCard(idea,i)).join('');
    }
  }

  function emptyHtml(icon,title,desc,href,linkText) {
    return `<div class="sv-empty"><div class="sv-eic"><span class="material-symbols-outlined">${icon}</span></div><h2>${title}</h2><p>${desc}</p><a href="${href}"><span class="material-symbols-outlined" style="font-size:16px">arrow_forward</span>${linkText}</a></div>`;
  }

  function postCard(p) {
    const a=p.author||{};
    const fn=a.firstName||a.first_name||'';const ln=a.lastName||a.last_name||'';
    const name=esc((fn+' '+ln).trim()||'User');
    const color=a.avatarColor||a.avatar_color||getColor(a.id||'');
    const initials=((fn[0]||'').toUpperCase()+(ln[0]||'').toUpperCase())||'?';
    const badge=TYPE_BADGE[p.postType];
    const totalReact=Object.values(p.reactions||{}).reduce((s,v)=>s+v,0);
    const EMOJIS={like:'ðŸ‘',celebrate:'ðŸŽ‰',insightful:'ðŸ’¡',support:'ðŸ¤'};
    return `<div class="sv-card" id="sv-post-${p.id}">
      <div class="sv-card-head">
        <div class="sv-avatar" style="background:${color}">${a.avatar?`<img src="${a.avatar}" alt="${name}">`:(initials)}</div>
        <div class="sv-meta">
          <div class="sv-name" onclick="location.href='/profile?id=${a.id||a._id}'">${name}</div>
          <div class="sv-info">${esc(a.university||'')}${a.university?' • ':''}${ago(p.createdAt)}</div>
        </div>
      </div>
      ${badge?`<div class="sv-badge" style="background:${badge.bg};color:${badge.color}"><span class="material-symbols-outlined" style="font-size:12px">${badge.icon}</span>${badge.label}</div>`:''}
      <div class="sv-body">${esc(p.content||'')}</div>
      ${totalReact?`<div class="sv-reactions">${Object.entries(p.reactions||{}).map(([t,c])=>EMOJIS[t]?`<span>${EMOJIS[t]} ${c}</span>`:'').join('')}</div>`:''}
      <div class="sv-foot">
        <span style="font-size:12px;color:var(--sub)">ðŸ’¬ ${p.commentsCount||0} comment${(p.commentsCount||0)!==1?'s':''}</span>
        <div class="sv-foot-actions">
          <button class="sv-btn sv-btn-ghost" onclick="location.href='/feed?post=${p.id}'"><span class="material-symbols-outlined" style="font-size:15px">open_in_new</span>View</button>
          <button class="sv-btn sv-btn-danger" onclick="unsavePost('${p.id}')"><span class="material-symbols-outlined" style="font-size:15px">bookmark_remove</span>Unsave</button>
        </div>
      </div>
    </div>`;
  }

  function projectCard(p) {
    const title=esc(p.title||'Untitled');
    return `<div class="sv-card" id="sv-proj-${p.id}">
      ${p.image_url?`<img src="${p.image_url}" class="sv-proj-img" alt="${title}">` :''}
      <div class="sv-proj-title">${title}</div>
      <div class="sv-body">${esc(p.description||'No description provided.')}</div>
      <div class="sv-foot">
        <span style="font-size:12px;color:var(--sub);display:flex;align-items:center;gap:4px"><span class="material-symbols-outlined" style="font-size:14px">category</span>${esc(p.category||'Project')}</span>
        <div class="sv-foot-actions">
          <button class="sv-btn sv-btn-ghost" onclick="location.href='/showcase/project?id=${p.id}'"><span class="material-symbols-outlined" style="font-size:15px">open_in_new</span>View</button>
          <button class="sv-btn sv-btn-danger" onclick="unsaveProject('${p.id}')"><span class="material-symbols-outlined" style="font-size:15px">bookmark_remove</span>Unsave</button>
        </div>
      </div>
    </div>`;
  }

  function ideaCard(idea, index) {
    const title = esc(idea.title || idea.name || 'Untitled Idea');
    const desc = esc(idea.description || idea.summary || '');
    const techs = (idea.techStack || idea.technologies || idea.tech || []);
    const savedAt = idea.savedAt ? ago(idea.savedAt) : '';
    const DOMAIN_COLORS = {web:'#6366f1',mobile:'#ec4899',ai:'#f59e0b',data:'#3b82f6',iot:'#10b981'};
    const domainColor = DOMAIN_COLORS[idea.domain] || '#6366f1';
    return `<div class="sv-card" id="sv-idea-${index}">
      <div class="sv-card-head">
        <div class="sv-avatar" style="background:${domainColor}"><span class="material-symbols-outlined" style="font-size:18px;color:#fff">lightbulb</span></div>
        <div class="sv-meta">
          <div class="sv-name" style="cursor:default">${title}</div>
          <div class="sv-info">${idea.difficulty?idea.difficulty+' • ':''}${idea.domain?esc(idea.domain)+' • ':''}${savedAt}</div>
        </div>
      </div>
      <div class="sv-body" style="-webkit-line-clamp:6">${desc}</div>
      ${techs.length?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${techs.slice(0,6).map(t=>`<span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--sf2);color:var(--sub)">${esc(t)}</span>`).join('')}</div>`:''}
      <div class="sv-foot">
        <span style="font-size:12px;color:var(--sub);display:flex;align-items:center;gap:4px"><span class="material-symbols-outlined" style="font-size:14px">auto_awesome</span>AI Generated</span>
        <div class="sv-foot-actions">
          <button class="sv-btn sv-btn-danger" onclick="deleteIdea(${index})"><span class="material-symbols-outlined" style="font-size:15px">delete</span>Remove</button>
        </div>
      </div>
    </div>`;
  }

  window.deleteIdea = function(index) {
    savedIdeas.splice(index, 1);
    localStorage.setItem('ph-saved-ideas', JSON.stringify(savedIdeas));
    document.getElementById('cnt-ideas').textContent = savedIdeas.length;
    render();
    PHToast?.info('Idea removed');
  };

  window.unsavePost = async function(postId) {
    try {
      const r=await fetch(API+`/api/posts/${postId}/save`,{method:'POST',headers:H});
      if (r.ok) {
        savedPosts=savedPosts.filter(p=>p.id!==postId);
        document.getElementById('cnt-posts').textContent=savedPosts.length;
        const card=document.getElementById('sv-post-'+postId);
        if(card){card.style.opacity='0';card.style.transform='scale(0.95)';setTimeout(()=>{card.remove();if(!savedPosts.length&&currentTab==='posts')render();},220);}
        PHToast?.info('Post unsaved');
      }
    } catch(e){PHToast?.error('Failed');}
  };

  window.unsaveProject = async function(projId) {
    try {
      const r=await fetch(API+`/api/projects/${projId}/save`,{method:'POST',headers:H});
      if (r.ok) {
        savedProjects=savedProjects.filter(p=>p.id!==projId);
        document.getElementById('cnt-projects').textContent=savedProjects.length;
        const card=document.getElementById('sv-proj-'+projId);
        if(card){card.style.opacity='0';card.style.transform='scale(0.95)';setTimeout(()=>{card.remove();if(!savedProjects.length&&currentTab==='projects')render();},220);}
        PHToast?.info('Project unsaved');
      }
    } catch(e){PHToast?.error('Failed');}
  };

  async function load() {
    try {
      const [pr,qr]=await Promise.allSettled([
        fetch(API+'/api/posts/saved',{headers:H}).then(r=>r.json()),
        fetch(API+'/api/projects/saved',{headers:H}).then(r=>r.json()),
      ]);
      if(pr.status==='fulfilled'){savedPosts=pr.value.posts||[];document.getElementById('cnt-posts').textContent=savedPosts.length;}
      if(qr.status==='fulfilled'){savedProjects=qr.value.projects||[];document.getElementById('cnt-projects').textContent=savedProjects.length;}
    } catch(e){}
    render();
  }

  // Load saved ideas from localStorage
  try {
    const raw = localStorage.getItem('ph-saved-ideas');
    if (raw) {
      savedIdeas = JSON.parse(raw) || [];
      document.getElementById('cnt-ideas').textContent = savedIdeas.length;
    } else {
      document.getElementById('cnt-ideas').textContent = '0';
    }
  } catch(e) { document.getElementById('cnt-ideas').textContent = '0'; }

  load();
})();
</script>
<script src="/assets/js/core/info-modal.js"></script>
</body>
</html>
