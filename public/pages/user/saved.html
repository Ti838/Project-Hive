<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Saved Posts — ProjectHive</title>
<script>(function(){const t=localStorage.getItem("theme");if(t==="dark"||(!t&&matchMedia("(prefers-color-scheme:dark)").matches)){document.documentElement.classList.add("dark");}})();</script>
<style>html{background-color:#F0F2F9!important}html.dark{background-color:#0C0D14!important}</style>
<link rel="icon" href="/favicon.png?v=2">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/ph-design.css">
<link rel="stylesheet" href="/assets/css/ph-system.css?v=2">
<script src="/assets/js/core/ph-toast.js"></script>
<script src="/assets/js/core/ph-sidebar.js?v=2"></script>
<style>
.saved-wrap{max-width:680px;margin:0 auto;padding:24px 16px 60px}
.saved-header{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.saved-header .ic{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#ec4899,#db2777);display:flex;align-items:center;justify-content:center}
.saved-header .ic .material-symbols-outlined{font-size:22px;color:#fff}
.saved-header h1{font-size:22px;font-weight:800;color:var(--tx)}
.saved-header .count{font-size:12px;color:var(--sub);font-weight:600;margin-top:2px}

.empty-state{text-align:center;padding:80px 24px}
.empty-state .ic{width:80px;height:80px;border-radius:24px;background:var(--sf2);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.empty-state .ic .material-symbols-outlined{font-size:36px;color:var(--sub)}
.empty-state h2{font-size:18px;font-weight:800;color:var(--tx);margin-bottom:6px}
.empty-state p{font-size:13px;color:var(--sub);max-width:320px;margin:0 auto 20px;line-height:1.6}
.empty-state a{display:inline-flex;align-items:center;gap:6px;padding:10px 24px;background:var(--ac);color:#fff;text-decoration:none;border-radius:10px;font-size:13px;font-weight:700;transition:opacity .2s}
.empty-state a:hover{opacity:.9}

.post-card{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:20px;margin-bottom:14px;transition:transform .2s,box-shadow .2s}
.post-card:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,.06)}
.post-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.post-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px;flex-shrink:0;overflow:hidden}
.post-avatar img{width:100%;height:100%;object-fit:cover}
.post-meta .name{font-size:13px;font-weight:700;color:var(--tx);cursor:pointer}
.post-meta .name:hover{color:var(--ac)}
.post-meta .info{font-size:11px;color:var(--sub)}
.post-content{font-size:14px;color:var(--tx);line-height:1.7;margin-bottom:12px}
.post-content a{color:var(--ac);font-weight:600;text-decoration:none}
.post-actions{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--bd)}
.post-actions button{display:flex;align-items:center;gap:5px;padding:6px 12px;border:none;background:none;border-radius:8px;font-size:12px;font-weight:600;color:var(--sub);cursor:pointer;transition:all .15s;font-family:inherit}
.post-actions button:hover{background:rgba(99,102,241,.06);color:var(--ac)}
.post-actions .remove{color:#ef4444}
.post-actions .remove:hover{background:rgba(239,68,68,.06);color:#ef4444}

.loading-state{text-align:center;padding:60px;color:var(--sub);font-size:13px}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;margin-right:6px;margin-bottom:4px}
</style>
</head>
<body>
<div id="ph-sidebar"></div>
<div class="ph-page">
  <div class="ph-topbar">
    <a href="/feed" style="color:var(--sub);display:flex;align-items:center;text-decoration:none;transition:color .15s" onmouseover="this.style.color='var(--ac)'" onmouseout="this.style.color='var(--sub)'"><span class="material-symbols-outlined">arrow_back</span></a>
    <span class="material-symbols-outlined" style="color:var(--ac)">bookmark</span>
    <h1 style="font-size:16px;font-weight:800;margin:0;flex:1;color:var(--tx)">Saved Posts</h1>
  </div>
  <div class="saved-wrap">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding:0 4px">
    <div id="saved-count" style="font-size:12px;color:var(--sub);font-weight:700">Loading...</div>
  </div>
  <div id="saved-list">
    <div class="loading-state"><span class="material-symbols-outlined" style="font-size:28px;animation:spin 1s linear infinite">progress_activity</span><p style="margin-top:8px">Loading saved posts...</p></div>
  </div>
</div>
</div>

<script>
(function(){
  const TK = localStorage.getItem('access_token');
  if (!TK) { window.location.href = '/login'; return; }

  PHSidebar.init('', '../../');

  const API = window.location.hostname === 'localhost' ? '' : 'https://projecthive-backend.onrender.com';

  function getBookmarks() {
    try { return JSON.parse(localStorage.getItem('projecthive_bookmarks') || '[]'); }
    catch { return []; }
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function formatTimeAgo(date) {
    const s = Math.floor((Date.now() - new Date(date)) / 1000);
    if (s < 60) return 'Just now';
    if (s < 3600) return Math.floor(s/60) + 'm ago';
    if (s < 86400) return Math.floor(s/3600) + 'h ago';
    if (s < 604800) return Math.floor(s/86400) + 'd ago';
    return new Date(date).toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }

  function getInitials(fn, ln) {
    return ((fn||'')[0]||'') + ((ln||'')[0]||'') || '?';
  }

  const COLORS = ['#6366f1','#7c3aed','#ec4899','#10b981','#f59e0b','#3b82f6','#ef4444','#8b5cf6'];
  function getColor(id) { let h=0; for(let i=0;i<(id||'').length;i++) h=id.charCodeAt(i)+((h<<5)-h); return COLORS[Math.abs(h)%COLORS.length]; }

  const TYPE_STYLES = {
    'general':{'bg':'rgba(99,102,241,.08)','color':'#6366f1','icon':'chat_bubble'},
    'achievement':{'bg':'rgba(245,158,11,.08)','color':'#f59e0b','icon':'emoji_events'},
    'project_update':{'bg':'rgba(16,185,129,.08)','color':'#10b981','icon':'rocket_launch'},
    'looking_for_team':{'bg':'rgba(236,72,153,.08)','color':'#ec4899','icon':'group_add'}
  };

  function removeBookmark(postId) {
    let bm = getBookmarks().filter(id => id !== postId);
    localStorage.setItem('projecthive_bookmarks', JSON.stringify(bm));
    const card = document.getElementById('saved-' + postId);
    if (card) { card.style.transform='scale(0.95)'; card.style.opacity='0'; setTimeout(()=>{card.remove(); updateCount();},200); }
    if (window.PHToast) PHToast.info('Post removed from saved');
  }
  window.removeBookmark = removeBookmark;

  function updateCount() {
    const cards = document.querySelectorAll('.post-card');
    document.getElementById('saved-count').textContent = cards.length + ' saved post' + (cards.length!==1?'s':'');
    if (cards.length === 0) showEmpty();
  }

  function showEmpty() {
    document.getElementById('saved-list').innerHTML = `
      <div class="empty-state">
        <div class="ic"><span class="material-symbols-outlined">bookmark_border</span></div>
        <h2>No saved posts yet</h2>
        <p>When you save posts from your feed, they'll appear here for easy access.</p>
        <a href="/feed"><span class="material-symbols-outlined" style="font-size:16px">arrow_back</span> Go to Feed</a>
      </div>`;
  }

  async function loadSavedPosts() {
    const bookmarks = getBookmarks();
    if (bookmarks.length === 0) { showEmpty(); return; }

    try {
      const res = await fetch(`${API}/api/posts/feed?limit=100`, { headers: { Authorization: 'Bearer ' + TK } });
      if (!res.ok) throw new Error('Failed');
      const data = await res.json();
      const posts = (data.posts || data || []).filter(p => bookmarks.includes(p.id));

      if (posts.length === 0) { showEmpty(); return; }

      document.getElementById('saved-count').textContent = posts.length + ' saved post' + (posts.length!==1?'s':'');

      let html = '';
      for (const p of posts) {
        const a = p.author || {};
        const name = escapeHtml([a.first_name, a.last_name].filter(Boolean).join(' ') || 'Unknown');
        const initials = getInitials(a.first_name, a.last_name);
        const color = a.avatar_color || getColor(a.id || '');
        const ts = TYPE_STYLES[p.type] || TYPE_STYLES['general'];

        const avatarHtml = a.avatar
          ? `<div class="post-avatar"><img src="${a.avatar}" alt="${name}"></div>`
          : `<div class="post-avatar" style="background:${color}">${initials}</div>`;

        const contentText = escapeHtml(p.content || '').replace(/#(\w+)/g, '<a href="/feed?tag=$1">#$1</a>');

        const tagHtml = p.type ? `<span class="tag" style="background:${ts.bg};color:${ts.color}"><span class="material-symbols-outlined" style="font-size:11px;vertical-align:middle">${ts.icon}</span> ${(p.type||'').replace(/_/g,' ')}</span>` : '';

        html += `
        <div class="post-card" id="saved-${p.id}" style="transition:transform .2s,opacity .2s">
          <div class="post-header">
            ${avatarHtml}
            <div class="post-meta">
              <div class="name" onclick="window.location.href='/feed'">${name}</div>
              <div class="info">${escapeHtml(a.university||'')} · ${formatTimeAgo(p.createdAt||p.created_at)}</div>
            </div>
          </div>
          ${tagHtml}
          <div class="post-content">${contentText}</div>
          <div class="post-actions">
            <button onclick="window.location.href='/feed'"><span class="material-symbols-outlined" style="font-size:16px">open_in_new</span> View in Feed</button>
            <button class="remove" onclick="removeBookmark('${p.id}')"><span class="material-symbols-outlined" style="font-size:16px">bookmark_remove</span> Unsave</button>
          </div>
        </div>`;
      }
      document.getElementById('saved-list').innerHTML = html;
    } catch (err) {
      document.getElementById('saved-list').innerHTML = `
        <div class="empty-state">
          <div class="ic"><span class="material-symbols-outlined">error_outline</span></div>
          <h2>Something went wrong</h2>
          <p>Could not load your saved posts. Please try again.</p>
          <a href="/saved"><span class="material-symbols-outlined" style="font-size:16px">refresh</span> Retry</a>
        </div>`;
    }
  }

  loadSavedPosts();
})();
</script>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<script src="/assets/js/core/info-modal.js"></script></body>
</html>
