<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Panel — ProjectHive</title><script>(function(){if(localStorage.getItem("theme")==="dark"||(!localStorage.getItem("theme")&&matchMedia("(prefers-color-scheme:dark)").matches))document.documentElement.classList.add("dark")})()</script><link rel="icon" href="../../assets/svg/logo.png"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}:root{--bg:#080910;--sb:#0c0d18;--bd:#1a1d2e;--tx:#e2deee;--sub:#64748b;--ac:#6366f1;--sf:#0f1019}body{min-height:100vh;background:var(--bg);color:var(--tx);display:flex}.sb{width:240px;min-height:100vh;background:var(--sb);border-right:1px solid var(--bd);padding:20px 14px;display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}.sbl{display:flex;align-items:center;gap:9px;padding:10px 12px;margin-bottom:4px}.sbl img{width:30px;height:30px;border-radius:8px}.sbl-name{font-size:15px;font-weight:900;background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.admbadge{padding:1px 7px;border-radius:999px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#ef4444;font-size:9px;font-weight:800;letter-spacing:.06em}.sb-sec{font-size:9px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.1em;padding:14px 12px 5px}.sbn{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:9px;color:var(--sub);text-decoration:none;font-size:13px;font-weight:600;transition:all .15s;cursor:pointer;border:none;background:none;width:100%;text-align:left}.sbn:hover{background:rgba(99,102,241,.08);color:var(--tx)}.sbn.on{background:rgba(99,102,241,.12);color:#818cf8}.sbf{margin-top:auto;padding-top:14px;border-top:1px solid var(--bd)}.main{flex:1;min-width:0;display:flex;flex-direction:column}.topbar{padding:14px 24px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:10}.topbar h1{font-size:14px;font-weight:800}.content{padding:22px 24px;flex:1}.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}.sc{background:var(--sf);border:1.5px solid var(--bd);border-radius:14px;padding:18px;transition:all .2s}.sc:hover{border-color:#6366f1;transform:translateY(-2px)}.sn{font-size:28px;font-weight:900;margin:6px 0 3px}.sl{font-size:10px;color:var(--sub);font-weight:700;text-transform:uppercase;letter-spacing:.05em}.si{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:2px}.card{background:var(--sf);border:1.5px solid var(--bd);border-radius:14px;overflow:hidden;margin-bottom:14px}.ch{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.ch h2{font-size:13px;font-weight:800}.tabs{display:flex;gap:2px;background:rgba(255,255,255,.04);border-radius:7px;padding:2px}.tab{padding:4px 10px;border-radius:5px;border:none;background:transparent;color:var(--sub);font-size:11px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif;transition:all .12s}.tab.on{background:var(--bd);color:var(--tx)}.srch{background:var(--bg);border:1.5px solid var(--bd);border-radius:8px;padding:6px 11px;color:var(--tx);font-size:12px;font-family:Inter,sans-serif;outline:none;width:180px;transition:border .2s}.srch:focus{border-color:#6366f1}table{width:100%;border-collapse:collapse}th{padding:9px 14px;font-size:9px;font-weight:800;color:var(--sub);text-align:left;text-transform:uppercase;letter-spacing:.06em;background:rgba(0,0,0,.2)}td{padding:11px 14px;font-size:12px;border-bottom:1px solid var(--bd);vertical-align:middle}tr:last-child td{border:none}tr:hover td{background:rgba(255,255,255,.015)}.av{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden}.av img{width:100%;height:100%;object-fit:cover}.badge{padding:2px 7px;border-radius:999px;font-size:9px;font-weight:800;display:inline-flex}.badge.admin{background:rgba(99,102,241,.15);color:#818cf8}.badge.student{background:rgba(16,185,129,.1);color:#10b981}.badge.banned{background:rgba(239,68,68,.12);color:#ef4444}.badge.active{background:rgba(16,185,129,.08);color:#10b981}.badge.open{background:rgba(59,130,246,.1);color:#60a5fa}.badge.closed{background:rgba(100,116,139,.1);color:#94a3b8}.act{background:none;border:1px solid var(--bd);cursor:pointer;padding:3px 8px;border-radius:6px;color:var(--sub);font-size:10px;font-weight:700;transition:all .12s;font-family:Inter,sans-serif}.act:hover{border-color:#6366f1;color:#818cf8}.act.red:hover{border-color:#ef4444;color:#ef4444}.empty{text-align:center;padding:36px;color:var(--sub);font-size:12px}@keyframes spin{to{transform:rotate(360deg)}}.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(99,102,241,.2);border-top-color:#6366f1;border-radius:50%;animation:spin .6s linear infinite}</style></head>
<body><div class="sb"><div class="sbl"><img src="../../assets/svg/logo.png" onerror="this.style.display='none'"><span class="sbl-name">ProjectHive</span><span class="admbadge">ADMIN</span></div><div class="sb-sec">Overview</div><button class="sbn on" onclick="show('ov',this)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Control Center</button><div class="sb-sec">Manage</div><button class="sbn" onclick="show('us',this)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>Users <span id="ub" style="margin-left:auto;background:rgba(99,102,241,.2);color:#818cf8;padding:1px 6px;border-radius:999px;font-size:10px;font-weight:800">—</span></button><button class="sbn" onclick="show('tm',this)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg>Teams <span id="tb2" style="margin-left:auto;background:rgba(16,185,129,.15);color:#10b981;padding:1px 6px;border-radius:999px;font-size:10px;font-weight:800">—</span></button><div class="sbf"><button class="sbn" onclick="location.href='../../index.html'" style="color:var(--sub)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Back to Site</button><button class="sbn" onclick="doOut()" style="color:#ef4444"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out</button></div></div><div class="main"><div class="topbar"><h1 id="st">⚡ Control Center</h1><button onclick="loadAll()" style="background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);color:#818cf8;padding:5px 13px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:700;font-family:Inter,sans-serif;transition:all .15s" onmouseover="this.style.background='rgba(99,102,241,.2)'" onmouseout="this.style.background='rgba(99,102,241,.1)'">↻ Refresh</button></div><div class="content"><div id="ov"><div class="sgrid"><div class="sc"><div class="si" style="background:rgba(99,102,241,.15);color:#818cf8">👥</div><div class="sn" id="nu">—</div><div class="sl">Total Users</div></div><div class="sc"><div class="si" style="background:rgba(16,185,129,.12);color:#10b981">🏆</div><div class="sn" id="nt">—</div><div class="sl">Teams</div></div><div class="sc"><div class="si" style="background:rgba(245,158,11,.12);color:#f59e0b">📁</div><div class="sn" id="np">—</div><div class="sl">Projects</div></div><div class="sc"><div class="si" style="background:rgba(239,68,68,.12);color:#ef4444">🚫</div><div class="sn" id="nb">—</div><div class="sl">Banned</div></div></div><div class="card"><div class="ch"><h2>👥 Recent Users</h2></div><div id="ru"><div class="empty"><span class="spin"></span> Loading…</div></div></div></div><div id="us" style="display:none"><div class="card"><div class="ch"><h2>User Management</h2><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><div class="tabs"><button class="tab on" onclick="uf('all',this)">All</button><button class="tab" onclick="uf('student',this)">Students</button><button class="tab" onclick="uf('admin',this)">Admins</button><button class="tab" onclick="uf('banned',this)">Banned</button></div><input class="srch" id="us2" placeholder="Search…" oninput="ru2()"></div></div><div style="overflow-x:auto"><table><thead><tr><th>User</th><th>Email</th><th>University</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead><tbody id="utb"><tr><td colspan="6" class="empty"><span class="spin"></span></td></tr></tbody></table></div></div></div><div id="tm" style="display:none"><div class="card"><div class="ch"><h2>Team Management</h2><div style="display:flex;gap:8px;align-items:center"><div class="tabs"><button class="tab on" onclick="tf('all',this)">All</button><button class="tab" onclick="tf('open',this)">Open</button><button class="tab" onclick="tf('closed',this)">Closed</button></div><input class="srch" id="ts2" placeholder="Search…" oninput="rt2()"></div></div><div style="overflow-x:auto"><table><thead><tr><th>Team</th><th>Members</th><th>Status</th><th>Category</th><th>Created</th><th>Actions</th></tr></thead><tbody id="ttb"><tr><td colspan="6" class="empty"><span class="spin"></span></td></tr></tbody></table></div></div></div></div></div></body>
<script>
const TK=localStorage.getItem("admin_token")||localStorage.getItem("access_token");
if(!TK){location.href="login.html"}
try{const p=JSON.parse(atob(TK.split(".")[1]));if(p.exp&&Date.now()>=p.exp*1000){location.href="login.html"}if(p.role!=="admin"){location.href="login.html"}}catch(e){location.href="login.html"}
const API=["localhost","127.0.0.1"].includes(location.hostname)?"":"https://projecthive-backend.onrender.com";
const H={"Authorization":"Bearer "+TK,"Content-Type":"application/json"};
const CL=["#6366f1","#7c3aed","#ec4899","#10b981","#f59e0b","#3b82f6"];
function avC(s){let h=0;for(const c of s||"")h=c.charCodeAt(0)+((h<<5)-h);return CL[Math.abs(h)%CL.length]}
function ago(d){if(!d)return"—";const s=Math.floor((Date.now()-new Date(d))/1e3);if(s<60)return"Just now";if(s<3600)return Math.floor(s/60)+"m ago";if(s<86400)return Math.floor(s/3600)+"h ago";return new Date(d).toLocaleDateString()}
let AU=[],AT=[],uf_="all",tf_="all";
function show(id,btn){
  ["ov","us","tm"].forEach(s=>document.getElementById(s).style.display=s===id?"":"none");
  document.querySelectorAll(".sbn").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  const T={"ov":"⚡ Control Center","us":"👥 User Management","tm":"🏆 Team Management"};
  document.getElementById("st").textContent=T[id];
}
async function loadAll(){
  try{
    const[st,us,tm]=await Promise.all([
      fetch(API+"/api/admin/stats",{headers:H}).then(r=>r.ok?r.json():{}).catch(()=>({})),
      fetch(API+"/api/admin/users?limit=500",{headers:H}).then(r=>r.ok?r.json():[]).catch(()=>[]),
      fetch(API+"/api/admin/teams?limit=500",{headers:H}).then(r=>r.ok?r.json():[]).catch(()=>[])
    ]);
    AU=Array.isArray(us)?us:(us.users||[]);
    AT=Array.isArray(tm)?tm:(tm.teams||[]);
    document.getElementById("nu").textContent=AU.length;
    document.getElementById("nt").textContent=AT.length;
    document.getElementById("np").textContent=st.totalProjects||"—";
    document.getElementById("nb").textContent=AU.filter(u=>u.isBanned).length;
    document.getElementById("ub").textContent=AU.length;
    document.getElementById("tb2").textContent=AT.length;
    rRec();ru2();rt2();
  }catch(e){console.error(e)}
}
function rRec(){
  const el=document.getElementById("ru");
  const list=AU.slice(0,8);
  if(!list.length){el.innerHTML="<div class='empty'>No users yet</div>";return}
  el.innerHTML="<table><thead><tr><th>User</th><th>Email</th><th>Role</th><th>Joined</th></tr></thead><tbody>"+list.map(u=>{
    const nm=(u.firstName||"")+" "+(u.lastName||"");const c=u.avatarColor||avC(nm);const i=((u.firstName?.[0]||"")+(u.lastName?.[0]||"")).toUpperCase()||"?";
    return"<tr><td><div style='display:flex;align-items:center;gap:8px'><div class='av' style='background:"+c+"'>"+i+"</div><b>"+nm.trim()+"</b></div></td><td style='color:var(--sub)'>"+u.email+"</td><td><span class='badge "+u.role+"'>"+u.role+"</span></td><td style='color:var(--sub)'>"+ago(u.createdAt)+"</td></tr>"
  }).join("")+"</tbody></table>";
}
function uf(f,btn){uf_=f;btn.closest(".tabs").querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));btn.classList.add("on");ru2()}
function ru2(){
  const q=document.getElementById("us2")?.value.toLowerCase()||"";
  let list=AU;
  if(uf_==="banned")list=list.filter(u=>u.isBanned);
  else if(uf_!=="all")list=list.filter(u=>u.role===uf_);
  if(q)list=list.filter(u=>((u.firstName||"")+" "+(u.lastName||"")+" "+(u.email||"")).toLowerCase().includes(q));
  const tb=document.getElementById("utb");if(!tb)return;
  if(!list.length){tb.innerHTML="<tr><td colspan='6' class='empty'>No users found</td></tr>";return}
  tb.innerHTML=list.map(u=>{
    const nm=(u.firstName||"")+" "+(u.lastName||"");const c=u.avatarColor||avC(nm);const i=((u.firstName?.[0]||"")+(u.lastName?.[0]||"")).toUpperCase()||"?";
    const av=u.avatar&&u.avatar.startsWith("data:")?'<img src="'+u.avatar+'">':i;
    const bn=u.isBanned;
    return"<tr><td><div style='display:flex;align-items:center;gap:8px'><div class='av' style='background:"+c+"'>"+av+"</div><div><b>"+nm.trim()+"</b><div style='font-size:10px;color:var(--sub)'>"+u.university+"</div></div></div></td><td style='color:var(--sub);font-size:11px'>"+u.email+"</td><td style='font-size:11px'>"+u.university+"</td><td><span class='badge "+u.role+"'>"+u.role+"</span></td><td><span class='badge "+(bn?"banned":"active")+"'>"+(bn?"Banned":"Active")+"</span></td><td><div style='display:flex;gap:4px'><button class='act' onclick='cRole(\""+u._id+"\",\""+(u.role==="admin"?"student":"admin")+"\")'>"+(u.role==="admin"?"👤":"👑")+"</button><button class='act "+(bn?"":"red")+"' onclick='banU(\""+u._id+"\","+(!bn)+")'>"+(bn?"🔓":"🚫")+"</button><button class='act red' onclick='delU(\""+u._id+"\",\""+nm.trim()+"\")'">🗑</button></div></td></tr>"
  }).join("");
}
function tf(f,btn){tf_=f;btn.closest(".tabs").querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));btn.classList.add("on");rt2()}
function rt2(){
  const q=document.getElementById("ts2")?.value.toLowerCase()||"";
  let list=AT;
  if(tf_==="open")list=list.filter(t=>!t.isClosed&&t.status!=="closed");
  else if(tf_==="closed")list=list.filter(t=>t.isClosed||t.status==="closed");
  if(q)list=list.filter(t=>(t.name||"").toLowerCase().includes(q));
  const tb=document.getElementById("ttb");if(!tb)return;
  if(!list.length){tb.innerHTML="<tr><td colspan='6' class='empty'>No teams found</td></tr>";return}
  tb.innerHTML=list.map(t=>{
    const cl=t.isClosed||t.status==="closed";
    return"<tr><td><b>"+t.name+"</b><div style='font-size:10px;color:var(--sub)'>"+(t.description||"").slice(0,40)+"</div></td><td>"+((t.members?.length||0))+"/"+t.maxMembers+"</td><td><span class='badge "+(cl?"closed":"open")+"'>"+(cl?"Closed":"Open")+"</span></td><td style='font-size:11px;color:var(--sub)'>"+t.category+"</td><td style='font-size:11px;color:var(--sub)'>"+ago(t.createdAt)+"</td><td><button class='act red' onclick='delT(\""+t._id+"\",\""+t.name+"\")'>🗑</button></td></tr>"
  }).join("");
}
async function banU(id,ban){if(!confirm(ban?"Ban this user?":"Unban this user?"))return;const r=await fetch(API+"/api/admin/users/"+id+"/ban",{method:"PATCH",headers:H,body:JSON.stringify({ban})});if(r.ok)loadAll();else alert("Failed")}
async function cRole(id,role){if(!confirm("Change role to "+role+"?"))return;const r=await fetch(API+"/api/admin/users/"+id+"/role",{method:"PATCH",headers:H,body:JSON.stringify({role})});if(r.ok)loadAll();else alert("Failed")}
async function delU(id,nm){if(!confirm("Delete "+nm+"? This cannot be undone."))return;const r=await fetch(API+"/api/admin/users/"+id,{method:"DELETE",headers:H});if(r.ok)loadAll();else alert("Failed")}
async function delT(id,nm){if(!confirm("Delete team "+nm+"?"))return;const r=await fetch(API+"/api/admin/teams/"+id,{method:"DELETE",headers:H});if(r.ok)loadAll();else alert("Failed")}
function doOut(){localStorage.removeItem("admin_token");localStorage.removeItem("access_token");location.href="login.html"}
loadAll();
</script></html>
