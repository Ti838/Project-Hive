<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Admin Access Restricted</title>
<link rel="icon" href="/favicon.png?v=2">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2ff;
  --card:#fff;
  --text:#0f172a;
  --sub:#64748b;
  --border:rgba(99,102,241,0.2);
  --info-bg:rgba(99,102,241,0.08);
  --info-border:rgba(99,102,241,0.2);
  --info-text:#6366f1;
  --shadow:rgba(0,0,0,0.15);
}
:root.dark{
  --bg:#07080f;
  --card:rgba(11,13,23,0.95);
  --text:#e2e8f0;
  --sub:#8b93b8;
  --border:rgba(99,102,241,0.25);
  --info-bg:rgba(99,102,241,0.1);
  --info-border:rgba(99,102,241,0.3);
  --info-text:#818cf8;
  --shadow:rgba(0,0,0,0.5);
}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);font-family:Inter,system-ui,sans-serif;padding:24px 20px;transition:background .3s}
.container{max-width:400px;width:100%;text-align:center}
.card{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1.5px solid var(--border);border-radius:24px;padding:32px 24px;box-shadow:0 20px 40px var(--shadow);transition:all .3s}
.icon-shield{margin:0 auto 20px;width:56px;height:56px;display:flex;align-items:center;justify-content:center;border-radius:16px;background:rgba(239,68,68,0.1);border:2px solid rgba(239,68,68,0.2)}
.badge{display:inline-flex;align-items:center;gap:6px;margin-bottom:16px;padding:6px 14px;border-radius:999px;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);color:#ef4444;font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.pulse{width:6px;height:6px;border-radius:50%;background:#ef4444;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
h1{font-size:24px;margin:0 0 12px;font-weight:900;color:var(--text);line-height:1.2;transition:color .3s}
p{margin:0 0 24px;color:var(--sub);line-height:1.6;font-size:15px;transition:color .3s}
.info-box{background:var(--info-bg);border:1.5px solid var(--info-border);border-radius:16px;padding:16px;margin-bottom:24px;text-align:left;transition:all .3s}
.info-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.info-title{color:var(--info-text);font-size:13px;font-weight:700;transition:color .3s}
.info-list{margin:0;padding-left:20px;color:var(--sub);font-size:13px;line-height:1.8;transition:color .3s}
.btn-home{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:linear-gradient(135deg,#6366f1,#7c3aed);border:none;border-radius:12px;color:#fff;font-weight:700;font-size:14px;text-decoration:none;transition:transform .2s,box-shadow .2s;cursor:pointer}
.btn-home:active{transform:scale(0.98)}
.theme-toggle{position:fixed;top:20px;right:20px;width:44px;height:44px;border-radius:12px;background:var(--card);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;box-shadow:0 2px 8px var(--shadow)}
.theme-toggle:hover{transform:scale(1.05);border-color:#6366f1}
.theme-toggle svg{transition:all .3s}
</style>
<script>
// Apply theme on load
(function(){
  const prefersDark = matchMedia('(prefers-color-scheme:dark)').matches;
  const storedTheme = localStorage.getItem('theme');
  const isDark = storedTheme === 'dark' || (!storedTheme && prefersDark);
  if(isDark) document.documentElement.classList.add('dark');
})();
</script>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="theme-icon">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>
</button>

<div class="container">
  <div class="card">
    <div class="icon-shield">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <div class="badge"><span class="pulse"></span>ACCESS RESTRICTED</div>
    <h1>Admin Panel<br>Desktop Only</h1>
    <p>For security and workflow efficiency, ProjectHive Admin Panel requires a desktop computer.</p>
    <div class="info-box">
      <div class="info-header">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--info-text)">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/>
          <line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        <span class="info-title">Requirements</span>
      </div>
      <ul class="info-list">
        <li>Desktop or Laptop Computer</li>
        <li>Modern Web Browser</li>
        <li>Mouse & Keyboard</li>
      </ul>
    </div>
    <a href="/" class="btn-home">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Back to Home
    </a>
  </div>
</div>

<script>
function toggleTheme(){
  const root = document.documentElement;
  const isDark = root.classList.toggle('dark');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  const icon = document.getElementById('theme-icon');
  icon.innerHTML = isDark
    ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
    : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
}

// Update icon on load
(function(){
  if(document.documentElement.classList.contains('dark')){
    document.getElementById('theme-icon').innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  }
})();
</script>
</body>
</html>
