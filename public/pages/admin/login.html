<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login — ProjectHive</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="/favicon.png?v=2">
<script>(function(){const t=localStorage.getItem('theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark');}})()</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{colors:{primary:'#6366f1',primary2:'#7c3aed'},fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>
<style>
.gradient-text{background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(99,102,241,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes pulse-dot{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.animate-fadeUp{animation:fadeUp .4s ease}
</style>
</head>
<body class="min-h-screen bg-slate-100 dark:bg-[#0b0c14] flex items-center justify-center overflow-hidden relative font-sans">

<div class="bg-grid"></div>
<div class="fixed w-[600px] h-[600px] bg-[radial-gradient(circle,rgba(99,102,241,.15),transparent_70%)] -top-[200px] -left-[100px] pointer-events-none"></div>
<div class="fixed w-[500px] h-[500px] bg-[radial-gradient(circle,rgba(124,58,237,.1),transparent_70%)] -bottom-[150px] -right-[100px] pointer-events-none"></div>

<!-- Theme toggle -->
<button onclick="toggleTheme()" title="Toggle theme" class="fixed top-5 right-5 z-50 w-[38px] h-[38px] rounded-[10px] border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 cursor-pointer flex items-center justify-center text-slate-500 hover:border-indigo-500 hover:text-indigo-500 transition-all">
  <svg id="ti" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>

<div class="relative z-10 w-full max-w-[420px] px-5 animate-fadeUp">
  <!-- Brand -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-red-500/10 border border-red-500/25 text-red-500 text-[11px] font-extrabold uppercase tracking-wider mb-4">
      <span class="w-1.5 h-1.5 rounded-full bg-red-500" style="animation:pulse-dot 2s ease-in-out infinite"></span>RESTRICTED ACCESS
    </div>
    <div class="flex items-center justify-center gap-2.5 mb-1.5">
      <img src="/favicon.png?v=2" alt="ProjectHive" class="w-11 h-11 rounded-xl" onerror="this.style.display='none'">
      <span class="text-[26px] font-black gradient-text">ProjectHive</span>
    </div>
    <div class="text-[13px] text-slate-500 dark:text-slate-400">Admin Control Center</div>
  </div>

  <!-- Login Box -->
  <div class="bg-white dark:bg-[#12131d] border-[1.5px] border-slate-200 dark:border-slate-700/80 rounded-3xl p-8 sm:p-9 shadow-xl dark:shadow-[0_24px_60px_rgba(0,0,0,.6),0_0_0_1px_rgba(99,102,241,.08)]">
    <div class="text-lg font-extrabold text-slate-900 dark:text-slate-100 mb-1 flex items-center gap-2">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Admin Sign In
    </div>
    <div class="text-[13px] text-slate-500 dark:text-slate-400 mb-6">Use your dedicated admin credentials to continue.</div>

    <div id="alert" class="hidden items-center gap-2 px-3.5 py-2.5 rounded-xl text-[13px] mb-3.5 bg-red-500/[.08] border border-red-500/20 text-red-500 dark:text-red-400">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="alert-msg"></span>
    </div>

    <form onsubmit="handleLogin(event)" id="form">
      <div class="mb-3.5">
        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-1.5">Admin Email</label>
        <div class="relative">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input id="email" type="email" placeholder="admin@projecthive.com" required autocomplete="username"
            class="w-full pl-[42px] pr-4 py-3 border-[1.5px] border-slate-200 dark:border-slate-600 rounded-[13px] bg-slate-50 dark:bg-[#0b0c14] text-slate-900 dark:text-slate-100 text-[15px] font-sans outline-none focus:border-indigo-500 focus:ring-[3px] focus:ring-indigo-500/15 transition-all placeholder:text-slate-400 dark:placeholder:text-slate-600">
        </div>
      </div>
      <div class="mb-3.5">
        <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wide mb-1.5">Admin Password</label>
        <div class="relative">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input id="password" type="password" placeholder="••••••••••••" required autocomplete="current-password"
            class="w-full pl-[42px] pr-11 py-3 border-[1.5px] border-slate-200 dark:border-slate-600 rounded-[13px] bg-slate-50 dark:bg-[#0b0c14] text-slate-900 dark:text-slate-100 text-[15px] font-sans outline-none focus:border-indigo-500 focus:ring-[3px] focus:ring-indigo-500/15 transition-all placeholder:text-slate-400 dark:placeholder:text-slate-600">
          <button type="button" onclick="togglePw()" class="absolute right-3 top-1/2 -translate-y-1/2 bg-transparent border-none cursor-pointer text-slate-400 p-1 flex hover:text-slate-600 dark:hover:text-slate-300 transition-colors">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eye"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" id="btn" class="w-full mt-1 py-3.5 border-none rounded-[13px] bg-gradient-to-br from-indigo-500 to-purple-600 text-white text-[15px] font-extrabold cursor-pointer flex items-center justify-center gap-2 tracking-wide hover:-translate-y-0.5 hover:shadow-lg hover:shadow-indigo-500/50 disabled:opacity-60 disabled:cursor-not-allowed disabled:transform-none transition-all">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span id="btn-txt">Access Admin Panel</span>
      </button>
    </form>

    <div class="flex items-center justify-center gap-1.5 mt-5 text-[11px] text-slate-400 dark:text-slate-500">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Secure admin session · 8 hours validity
    </div>
  </div>
</div>

<footer class="fixed bottom-4 text-[11px] text-slate-400 dark:text-slate-500 text-center w-full z-[1]">© 2026 ProjectHive &nbsp;·&nbsp; Admin Portal &nbsp;·&nbsp; Restricted</footer>

<script>
const API=(location.hostname==='localhost'||location.hostname==='127.0.0.1')?'':'https://projecthive-backend.onrender.com';
(function(){const tk=localStorage.getItem('admin_token')||localStorage.getItem('access_token');if(tk){try{const p=JSON.parse(atob(tk.split('.')[1]));if(p.role==='admin'&&p.exp&&Date.now()<p.exp*1000)location.href='/pages/admin/dashboard.html';}catch(e){}}})();

function toggleTheme(){const dark=document.documentElement.classList.toggle('dark');localStorage.setItem('theme',dark?'dark':'light');document.getElementById('ti').innerHTML=dark?'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>':'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';}
if(document.documentElement.classList.contains('dark')){document.getElementById('ti').innerHTML='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';}

function togglePw(){const i=document.getElementById('password');const open=i.type==='password';i.type=open?'text':'password';document.getElementById('eye').innerHTML=open?'<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>':'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';}

function showErr(msg){const a=document.getElementById('alert');document.getElementById('alert-msg').textContent=msg;a.classList.remove('hidden');a.classList.add('flex');}

async function handleLogin(e){
  e.preventDefault();document.getElementById('alert').classList.add('hidden');document.getElementById('alert').classList.remove('flex');
  const email=document.getElementById('email').value.trim(),password=document.getElementById('password').value;
  const btn=document.getElementById('btn'),txt=document.getElementById('btn-txt');
  btn.disabled=true;txt.innerHTML='<span class="spinner"></span>&nbsp;Authenticating…';
  try{
    const res=await fetch(API+'/api/admin/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const data=await res.json();
    if(res.ok&&data.token){localStorage.setItem('admin_token',data.token);localStorage.setItem('access_token',data.token);txt.textContent='✅ Redirecting…';setTimeout(()=>{location.href='/pages/admin/dashboard.html';},500);}
    else{showErr(data.error||'Login failed. Check your credentials.');btn.disabled=false;txt.textContent='Access Admin Panel';}
  }catch(err){showErr('Cannot connect to server. Please try again.');btn.disabled=false;txt.textContent='Access Admin Panel';}
}
</script>
</body>
</html>
