<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create Team - ProjectHive">
    <title>Create Team - ProjectHive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link rel="stylesheet" href="../../assets/css/custom.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' font-weight='bold' fill='%231f2937'></text></svg>">
</head>
<body class="bg-slate-50">
    <div class="min-h-screen">
        <nav class="bg-white border-b border-slate-200 px-6 py-4">
            <div class="max-w-4xl mx-auto flex justify-between items-center">
                <h1 class="text-2xl font-bold text-slate-900">Create New Team</h1>
                <a href="../../pages/teams/index.html" class="text-slate-600 hover:text-indigo-600">← Back</a>
            </div>
        </nav>

        <main class="max-w-4xl mx-auto px-6 py-8">
            <form onsubmit="handleCreateTeam(event)" class="bg-white rounded-lg border border-slate-200 p-8 space-y-6">
                <!-- Team Name -->
                <div>
                    <label for="teamName" class="block text-lg font-bold text-slate-900 mb-2">Team Name</label>
                    <input
                        type="text"
                        id="teamName"
                        name="teamName"
                        placeholder="e.g., AI Legends, Code Wizards"
                        required
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition text-lg"
                    >
                </div>

                <!-- Description -->
                <div>
                    <label for="description" class="block text-lg font-bold text-slate-900 mb-2">Description</label>
                    <textarea
                        id="description"
                        name="description"
                        placeholder="What is your team building? What's your goal?"
                        rows="4"
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition"
                    ></textarea>
                </div>

                <!-- Max Members -->
                <div>
                    <label for="maxMembers" class="block text-lg font-bold text-slate-900 mb-2">Maximum Team Size</label>
                    <select id="maxMembers" name="maxMembers" required class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition text-lg">
                        <option value="">Select size</option>
                        <option value="2">2 people</option>
                        <option value="3">3 people</option>
                        <option value="4">4 people</option>
                        <option value="5">5 people</option>
                        <option value="6">6+ people</option>
                    </select>
                </div>

                <!-- Required Skills -->
                <div>
                    <label class="block text-lg font-bold text-slate-900 mb-2">Required Skills</label>
                    <div class="space-y-2 mb-4">
                        <div class="flex gap-2">
                            <input type="text" id="skillInput" placeholder="e.g., React, Design, Leadership" class="flex-1 px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                            <button type="button" onclick="addRequiredSkill()" class="px-4 py-2 bg-indigo-100 text-indigo-600 font-semibold rounded-lg hover:bg-indigo-200 transition">
                                Add
                            </button>
                        </div>
                    </div>
                    <div id="skillsList" class="flex flex-wrap gap-2"></div>
                </div>

                <!-- Messages -->
                <div id="error-message" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg"></div>
                <div id="success-message" class="hidden bg-green-50 border border-green-200 text-green-600 px-4 py-3 rounded-lg"></div>

                <!-- Buttons -->
                <div class="flex gap-4 pt-4">
                    <button type="submit" class="px-8 py-3 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 transition">
                        Create Team
                    </button>
                    <a href="../../pages/teams/index.html" class="px-8 py-3 border-2 border-slate-300 text-slate-700 font-bold rounded-lg hover:bg-slate-50 transition text-center">
                        Cancel
                    </a>
                </div>
            </form>
        </main>
    </div>

    <script src="../../assets/js/core/api.js"></script>
    <script src="../../assets/js/core/auth.js"></script>

    <script>
        Auth.requireAuth();
        const requiredSkills = [];

        function addRequiredSkill() {
            const input = document.getElementById('skillInput');
            const skill = input.value.trim();
            
            if (skill && !requiredSkills.includes(skill)) {
                requiredSkills.push(skill);
                input.value = '';
                renderSkills();
            }
        }

        function removeSkill(skill) {
            requiredSkills.splice(requiredSkills.indexOf(skill), 1);
            renderSkills();
        }

        function renderSkills() {
            const skillsList = document.getElementById('skillsList');
            skillsList.innerHTML = requiredSkills.map(skill => `
                <div class="inline-flex items-center gap-2 px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full">
                    <span>${skill}</span>
                    <button type="button" onclick="removeSkill('${skill}')" class="font-bold hover:text-indigo-900">×</button>
                </div>
            `).join('');
        }

        async function handleCreateTeam(event) {
            event.preventDefault();

            const teamData = {
                name: document.getElementById('teamName').value,
                description: document.getElementById('description').value,
                maxMembers: parseInt(document.getElementById('maxMembers').value),
                requiredSkills,
            };

            const errorMsg = document.getElementById('error-message');
            const successMsg = document.getElementById('success-message');
            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            try {
                const response = await API.teams.createTeam(teamData);
                if (response.ok) {
                    successMsg.textContent = 'Team created successfully! Redirecting...';
                    successMsg.classList.remove('hidden');
                    setTimeout(() => {
                        window.location.href = `/pages/teams/${response.team._id}.html`;
                    }, 1500);
                } else {
                    errorMsg.textContent = response.message || 'Failed to create team';
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                console.error('[v0] Error creating team:', error);
                errorMsg.textContent = 'An error occurred. Please try again.';
                errorMsg.classList.remove('hidden');
            }
        }
    </script>

    
    <!-- Global Modal -->
    <div id="global-modal-backdrop" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[90] flex items-center justify-center p-4 transition-all duration-300 opacity-0">
        <div class="bg-white dark:bg-slate-800 text-slate-900 dark:text-white shadow-2xl p-8 rounded-3xl max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-90 transition-all duration-300" id="global-toast">
            <img src="../../assets/svg/logo.svg" alt="ProjectHive Logo" class="w-16 h-16 mx-auto mb-5 animate-pulse">
            <p id="global-toast-msg" class="text-lg font-semibold mb-8 text-slate-700 dark:text-slate-200 leading-relaxed"></p>
            <button onclick="hideModal()" class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl transition-all font-semibold shadow-lg shadow-indigo-200 dark:shadow-none hover:scale-[1.02] active:scale-95">Got it, thanks!</button>
        </div>
    </div>
    <script>
        function showToast(message) {
            const backdrop = document.getElementById('global-modal-backdrop');
            const msgEl = document.getElementById('global-toast-msg');
            const modal = document.getElementById('global-toast');
            if (backdrop && msgEl) {
                msgEl.innerHTML = message;
                backdrop.classList.remove('hidden');
                // Force reflow
                void backdrop.offsetWidth;
                backdrop.classList.remove('opacity-0');
                modal.classList.remove('scale-90');
                modal.classList.add('scale-100');
            }
        }
        function hideModal() {
            const backdrop = document.getElementById('global-modal-backdrop');
            const modal = document.getElementById('global-toast');
            if (backdrop) {
                backdrop.classList.add('opacity-0');
                modal.classList.remove('scale-100');
                modal.classList.add('scale-90');
                setTimeout(() => backdrop.classList.add('hidden'), 300);
            }
        }
    </script>

</body>
