<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Find Teams - ProjectHive">
    <title>Find Teams - ProjectHive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link rel="stylesheet" href="../../assets/css/custom.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' font-weight='bold' fill='%231f2937'></text></svg>">
</head>
<body class="bg-slate-50">
    <div class="min-h-screen">
        <!-- Navigation -->
        <nav class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <a href="../../pages/dashboard.html" class="text-2xl font-bold text-slate-900"><img src="../../assets/svg/logo.svg" alt="Logo" class="w-8 h-8 inline-block mr-2">ProjectHive</a>
                </div>
                <div class="flex space-x-3">
                    <a href="../../pages/dashboard.html" class="text-slate-600 hover:text-indigo-600">← Back</a>
                    <button onclick="handleLogout()" class="text-slate-600 hover:text-red-600">Logout</button>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="max-w-7xl mx-auto px-6 py-8">
            <!-- Header -->
            <div class="mb-8">
                <h1 class="text-4xl font-bold text-slate-900 mb-2">Find Your Team</h1>
                <p class="text-slate-600">Browse teams looking for members or create your own</p>
            </div>

            <!-- Search and Filters -->
            <div class="bg-white rounded-lg border border-slate-200 p-6 mb-8">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input
                        type="text"
                        id="search-teams"
                        placeholder="Search teams..."
                        class="px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition"
                    >
                    <select id="filter-role" class="px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        <option value="">All Roles</option>
                        <option value="developer">Developer</option>
                        <option value="designer">Designer</option>
                        <option value="manager">Manager</option>
                        <option value="researcher">Researcher</option>
                    </select>
                    <select id="filter-status" class="px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        <option value="">All Status</option>
                        <option value="open">Open</option>
                        <option value="full">Full</option>
                    </select>
                    <button onclick="applyFilters()" class="px-4 py-2 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition">
                        Search
                    </button>
                </div>
            </div>

            <!-- Action Button -->
            <div class="mb-8">
                <a href="../../pages/teams/create.html" class="inline-block px-6 py-3 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition">
                    ➕ Create New Team
                </a>
            </div>

            <!-- Teams Grid -->
            <div id="teams-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Loading State -->
                <div class="col-span-full text-center py-12">
                    <div class="inline-block animate-pulse">Loading teams...</div>
                </div>
            </div>

            <!-- No Results -->
            <div id="no-results" class="hidden text-center py-12">
                <div class="text-4xl mb-4">🔍</div>
                <p class="text-slate-600">No teams found. Try adjusting your filters.</p>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="../../assets/js/core/api.js"></script>
    <script src="../../assets/js/core/auth.js"></script>
    <script src="../../assets/js/core/store.js"></script>

    <script>
        Auth.requireAuth();

        async function loadTeams() {
            const grid = document.getElementById('teams-grid');
            const noResults = document.getElementById('no-results');
            
            try {
                const response = await API.teams.listTeams();
                
                if (response.ok && response.teams && response.teams.length > 0) {
                    grid.innerHTML = response.teams.map(team => `
                        <div class="bg-white rounded-lg border border-slate-200 p-6 hover:shadow-lg transition">
                            <div class="mb-4">
                                <h3 class="text-xl font-bold text-slate-900 mb-2">${team.name}</h3>
                                <p class="text-slate-600 text-sm">${team.description || 'No description'}</p>
                            </div>

                            <div class="space-y-3 mb-4">
                                <div class="flex items-center text-sm">
                                    <span class="text-slate-600">👥 Members:</span>
                                    <span class="ml-2 font-semibold text-slate-900">${team.memberCount || 0}/${team.maxMembers || 5}</span>
                                </div>
                                <div class="flex items-center text-sm">
                                    <span class="text-slate-600">🎯 Required Skills:</span>
                                    <div class="ml-2 flex flex-wrap gap-1">
                                        ${(team.requiredSkills || []).slice(0, 2).map(skill => `<span class="inline-block px-2 py-1 bg-indigo-100 text-indigo-700 rounded text-xs">${skill}</span>`).join('')}
                                        ${team.requiredSkills && team.requiredSkills.length > 2 ? `<span class="inline-block px-2 py-1 bg-slate-100 text-slate-700 rounded text-xs">+${team.requiredSkills.length - 2}</span>` : ''}
                                    </div>
                                </div>
                                <div class="flex items-center text-sm">
                                    <span class="text-slate-600">🏢 University:</span>
                                    <span class="ml-2 font-semibold text-slate-900">${team.university || 'Unknown'}</span>
                                </div>
                            </div>

                            <div class="border-t border-slate-100 pt-4">
                                <button onclick="viewTeam('${team._id}')" class="w-full px-4 py-2 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition">
                                    View Team
                                </button>
                            </div>
                        </div>
                    `).join('');
                    noResults.classList.add('hidden');
                } else {
                    grid.innerHTML = '';
                    noResults.classList.remove('hidden');
                }
            } catch (error) {
                console.error('[v0] Error loading teams:', error);
                grid.innerHTML = '<div class="col-span-full text-center text-red-600">Failed to load teams</div>';
            }
        }

        function applyFilters() {
            const search = document.getElementById('search-teams').value;
            const role = document.getElementById('filter-role').value;
            const status = document.getElementById('filter-status').value;

            const filters = {};
            if (search) filters.search = search;
            if (role) filters.role = role;
            if (status) filters.status = status;

            loadTeamsWithFilters(filters);
        }

        async function loadTeamsWithFilters(filters) {
            const grid = document.getElementById('teams-grid');
            try {
                const response = await API.teams.listTeams(filters);
                if (response.ok && response.teams) {
                    if (response.teams.length === 0) {
                        document.getElementById('no-results').classList.remove('hidden');
                        grid.innerHTML = '';
                    } else {
                        document.getElementById('no-results').classList.add('hidden');
                        // Reuse same rendering logic
                        loadTeams();
                    }
                }
            } catch (error) {
                console.error('[v0] Error applying filters:', error);
            }
        }

        function viewTeam(teamId) {
            window.location.href = `/pages/teams/${teamId}.html`;
        }

        function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                Auth.logout();
            }
        }

        // Load teams on page load
        document.addEventListener('DOMContentLoaded', loadTeams);
    </script>

    
    <!-- Global Modal -->
    <div id="global-modal-backdrop" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[90] flex items-center justify-center p-4 transition-all duration-300 opacity-0">
        <div class="bg-white dark:bg-slate-800 text-slate-900 dark:text-white shadow-2xl p-8 rounded-3xl max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-90 transition-all duration-300" id="global-toast">
            <img src="../../assets/svg/logo.svg" alt="ProjectHive Logo" class="w-16 h-16 mx-auto mb-5 animate-pulse">
            <p id="global-toast-msg" class="text-lg font-semibold mb-8 text-slate-700 dark:text-slate-200 leading-relaxed"></p>
            <button onclick="hideModal()" class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl transition-all font-semibold shadow-lg shadow-indigo-200 dark:shadow-none hover:scale-[1.02] active:scale-95">Got it, thanks!</button>
        </div>
    </div>
    <script>
        function showToast(message) {
            const backdrop = document.getElementById('global-modal-backdrop');
            const msgEl = document.getElementById('global-toast-msg');
            const modal = document.getElementById('global-toast');
            if (backdrop && msgEl) {
                msgEl.innerHTML = message;
                backdrop.classList.remove('hidden');
                // Force reflow
                void backdrop.offsetWidth;
                backdrop.classList.remove('opacity-0');
                modal.classList.remove('scale-90');
                modal.classList.add('scale-100');
            }
        }
        function hideModal() {
            const backdrop = document.getElementById('global-modal-backdrop');
            const modal = document.getElementById('global-toast');
            if (backdrop) {
                backdrop.classList.add('opacity-0');
                modal.classList.remove('scale-100');
                modal.classList.add('scale-90');
                setTimeout(() => backdrop.classList.add('hidden'), 300);
            }
        }
    </script>

        function showProjectInfo(key) {
            showToast(projectInfo[key]);

</body>
</html>
