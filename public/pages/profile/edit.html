<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Edit Profile - ProjectHive">
    <title>Edit Profile - ProjectHive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link rel="stylesheet" href="../../assets/css/custom.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' font-weight='bold' fill='%231f2937'></text></svg>">
</head>
<body class="bg-slate-50">
    <div class="min-h-screen">
        <!-- Navigation -->
        <nav class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-40">
            <div class="max-w-4xl mx-auto flex justify-between items-center">
                <a href="../../pages/dashboard.html" class="text-2xl font-bold text-slate-900"><img src="../../assets/svg/logo.svg" alt="Logo" class="w-8 h-8 inline-block mr-2">ProjectHive</a>
                <button onclick="handleLogout()" class="text-slate-600 hover:text-red-600">Logout</button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="max-w-4xl mx-auto px-6 py-8">
            <!-- Header -->
            <div class="mb-8">
                <h1 class="text-4xl font-bold text-slate-900 mb-2">Edit Profile</h1>
                <p class="text-slate-600">Complete your profile to get matched with great teams</p>
            </div>

            <!-- Profile Form -->
            <form id="profile-form" onsubmit="handleProfileUpdate(event)" class="bg-white rounded-lg border border-slate-200 p-8">
                <!-- Avatar Section -->
                <div class="mb-8">
                    <label class="block text-lg font-bold text-slate-900 mb-4">Profile Picture</label>
                    <div class="flex items-center space-x-6">
                        <div id="avatar-preview" class="w-24 h-24 bg-indigo-100 rounded-full flex items-center justify-center text-4xl">
                            👤
                        </div>
                        <div>
                            <input
                                type="file"
                                id="avatar-upload"
                                accept="image/*"
                                class="block mb-2"
                                onchange="previewAvatar(event)"
                            >
                            <p class="text-sm text-slate-500">JPG, PNG up to 10MB</p>
                        </div>
                    </div>
                </div>

                <hr class="my-8">

                <!-- Personal Information -->
                <div class="mb-8">
                    <h2 class="text-2xl font-bold text-slate-900 mb-4">Personal Information</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="firstName" class="block text-sm font-medium text-slate-700 mb-2">First Name</label>
                            <input type="text" id="firstName" name="firstName" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        </div>
                        <div>
                            <label for="lastName" class="block text-sm font-medium text-slate-700 mb-2">Last Name</label>
                            <input type="text" id="lastName" name="lastName" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        </div>
                        <div>
                            <label for="university" class="block text-sm font-medium text-slate-700 mb-2">University</label>
                            <input type="text" id="university" name="university" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        </div>
                        <div>
                            <label for="major" class="block text-sm font-medium text-slate-700 mb-2">Major</label>
                            <input type="text" id="major" name="major" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        </div>
                        <div>
                            <label for="yearOfStudy" class="block text-sm font-medium text-slate-700 mb-2">Academic Year</label>
                            <select id="yearOfStudy" name="yearOfStudy" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                                <option value="">Select year</option>
                                <option value="1">Freshman (Year 1)</option>
                                <option value="2">Sophomore (Year 2)</option>
                                <option value="3">Junior (Year 3)</option>
                                <option value="4">Senior (Year 4)</option>
                                <option value="5">Graduate (Year 5+)</option>
                            </select>
                        </div>
                    </div>
                </div>
                <hr class="my-8">

                <!-- Bio -->
                <div class="mb-8">
                    <label for="bio" class="block text-lg font-bold text-slate-900 mb-4">Bio</label>
                    <textarea
                        id="bio"
                        name="bio"
                        placeholder="Tell us about yourself, your interests, and what you&apos;re looking for in a team..."
                        rows="4"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition"
                    ></textarea>
                </div>

                <hr class="my-8">

                <!-- Skills -->
                <div class="mb-8">
                    <label class="block text-lg font-bold text-slate-900 mb-4">Skills</label>
                    <p class="text-slate-600 mb-4">Add your technical and soft skills</p>
                    
                    <div id="skills-container" class="space-y-3 mb-4">
                        <div class="flex gap-2">
                            <input type="text" class="flex-1 px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" placeholder="Enter a skill (e.g., React, Design Thinking)">
                            <button type="button" onclick="addSkill()" class="px-4 py-2 bg-indigo-100 text-indigo-600 font-semibold rounded-lg hover:bg-indigo-200 transition">
                                Add
                            </button>
                        </div>
                    </div>

                    <div id="skills-list" class="flex flex-wrap gap-2">
                        <!-- Skills will be added here -->
                    </div>
                </div>

                <hr class="my-8">

                <!-- Availability -->
                <div class="mb-8">
                    <h2 class="text-2xl font-bold text-slate-900 mb-4">Availability</h2>
                    <div class="space-y-3">
                        <div>
                            <label for="availability" class="block text-sm font-medium text-slate-700 mb-2">Hours per week you can commit</label>
                            <select id="availability" name="availability" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                                <option value="">Select availability</option>
                                <option value="5">5 hours/week</option>
                                <option value="10">10 hours/week</option>
                                <option value="15">15 hours/week</option>
                                <option value="20">20+ hours/week</option>
                            </select>
                        </div>
                        <div>
                            <label for="timezone" class="block text-sm font-medium text-slate-700 mb-2">Timezone</label>
                            <input type="text" id="timezone" name="timezone" placeholder="e.g., EST, PST" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        </div>
                    </div>
                </div>

                <hr class="my-8">

                <!-- Messages -->
                <div id="error-message" class="hidden mb-4 bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm"></div>
                <div id="success-message" class="hidden mb-4 bg-green-50 border border-green-200 text-green-600 px-4 py-3 rounded-lg text-sm"></div>

                <!-- Buttons -->
                <div class="flex gap-4">
                    <button
                        type="submit"
                        class="px-6 py-3 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition disabled:opacity-50 disabled:cursor-not-allowed"
                    >
                        Save Changes
                    </button>
                    <a href="../../pages/dashboard.html" class="px-6 py-3 border-2 border-slate-300 text-slate-700 font-semibold rounded-lg hover:bg-slate-50 transition text-center">
                        Cancel
                    </a>
                </div>
            </form>
        </main>
    </div>

    <!-- Scripts -->
    <script src="../../assets/js/core/api.js"></script>
    <script src="../../assets/js/core/auth.js"></script>

    <script>
        Auth.requireAuth();

        const skills = [];

        async function loadProfile() {
            try {
                const response = await API.users.getCurrentUser();
                if (response.ok && response.user) {
                    const user = response.user;
                    document.getElementById('firstName').value = user.firstName || '';
                    document.getElementById('lastName').value = user.lastName || '';
                    document.getElementById('university').value = user.university || '';
                    document.getElementById('major').value = user.major || '';
                    document.getElementById('yearOfStudy').value = user.yearOfStudy || '';
                    document.getElementById('bio').value = user.bio || '';
                    document.getElementById('availability').value = user.availability || '';
                    document.getElementById('timezone').value = user.timezone || '';

                    if (user.skills && Array.isArray(user.skills)) {
                        user.skills.forEach(skill => {
                            // skill can be an object { name, level } or string
                            const skillName = typeof skill === 'object' ? skill.name : skill;
                            if (skillName && !skills.includes(skillName)) {
                                skills.push(skillName);
                            }
                        });
                        renderSkills();
                    }
                }
            } catch (error) {
                console.error('[v0] Error loading profile:', error);
            }
        }

        function previewAvatar(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('avatar-preview').innerHTML = `<img src="${e.target.result}" class="w-24 h-24 rounded-full object-cover">`;
                };
                reader.readAsDataURL(file);
            }
        }

        function addSkill() {
            const input = document.querySelector('#skills-container input[type="text"]');
            const skill = input.value.trim();

            if (skill && !skills.includes(skill)) {
                skills.push(skill);
                input.value = '';
                renderSkills();
            }
        }

        function removeSkill(skill) {
            skills.splice(skills.indexOf(skill), 1);
            renderSkills();
        }

        function renderSkills() {
            const skillsList = document.getElementById('skills-list');
            skillsList.innerHTML = skills.map(skill => `
                <div class="inline-flex items-center gap-2 px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full">
                    <span>${skill}</span>
                    <button type="button" onclick="removeSkill('${skill}')" class="text-indigo-600 hover:text-indigo-900 font-bold">×</button>
                </div>
            `).join('');
        }

        async function handleProfileUpdate(event) {
            event.preventDefault();

            // Transform simple skills string array into [{ name, level }] for backend schema compatibility
            const skillsPayload = skills.map(name => ({ name, level: 'intermediate' }));

            const profileData = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                university: document.getElementById('university').value,
                major: document.getElementById('major').value,
                yearOfStudy: parseInt(document.getElementById('yearOfStudy').value) || 1,
                bio: document.getElementById('bio').value,
                availability: document.getElementById('availability').value,
                timezone: document.getElementById('timezone').value,
                skills: skillsPayload,
            };

            const errorMsg = document.getElementById('error-message');
            const successMsg = document.getElementById('success-message');
            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            try {
                const response = await API.users.updateProfile(profileData);

                if (response.ok) {
                    successMsg.textContent = 'Profile updated successfully!';
                    successMsg.classList.remove('hidden');
                    setTimeout(() => {
                        window.location.href = '../../pages/dashboard.html';
                    }, 1500);
                } else {
                    errorMsg.textContent = response.message || 'Failed to update profile';
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                console.error('[v0] Error updating profile:', error);
                errorMsg.textContent = 'An error occurred. Please try again.';
                errorMsg.classList.remove('hidden');
            }
        }

        function handleLogout() {
            if (confirm('Are you sure you want to logout?')) {
                Auth.logout();
            }
        }

        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>

    
    <!-- Global Modal -->
    <div id="global-modal-backdrop" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[90] flex items-center justify-center p-4 transition-all duration-300 opacity-0">
        <div class="bg-white dark:bg-slate-800 text-slate-900 dark:text-white shadow-2xl p-8 rounded-3xl max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-90 transition-all duration-300" id="global-toast">
            <img src="../../assets/svg/logo.svg" alt="ProjectHive Logo" class="w-16 h-16 mx-auto mb-5 animate-pulse">
            <p id="global-toast-msg" class="text-lg font-semibold mb-8 text-slate-700 dark:text-slate-200 leading-relaxed"></p>
            <button onclick="hideModal()" class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl transition-all font-semibold shadow-lg shadow-indigo-200 dark:shadow-none hover:scale-[1.02] active:scale-95">Got it, thanks!</button>
        </div>
    </div>
    <script>
        function showToast(message) {
            const backdrop = document.getElementById('global-modal-backdrop');
            const msgEl = document.getElementById('global-toast-msg');
            const modal = document.getElementById('global-toast');
            if (backdrop && msgEl) {
                msgEl.innerHTML = message;
                backdrop.classList.remove('hidden');
                // Force reflow
                void backdrop.offsetWidth;
                backdrop.classList.remove('opacity-0');
                modal.classList.remove('scale-90');
                modal.classList.add('scale-100');
            }
        }
        function hideModal() {
            const backdrop = document.getElementById('global-modal-backdrop');
            const modal = document.getElementById('global-toast');
            if (backdrop) {
                backdrop.classList.add('opacity-0');
                modal.classList.remove('scale-100');
                modal.classList.add('scale-90');
                setTimeout(() => backdrop.classList.add('hidden'), 300);
            }
        }
    </script>

        function showProjectInfo(key) {

</body>
</html>
