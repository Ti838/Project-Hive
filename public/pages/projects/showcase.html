<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Project Showcase - ProjectHive">
    <title>Project Showcase - ProjectHive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link rel="stylesheet" href="../../assets/css/custom.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' font-weight='bold' fill='%231f2937'></text></svg>">
</head>
<body class="bg-slate-50">
    <div class="min-h-screen">
        <nav class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 class="text-2xl font-bold text-slate-900">🏆 Project Showcase</h1>
                <div class="flex gap-3">
                    <a href="../../pages/projects/create.html" class="px-4 py-2 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition">
                        ➕ Submit Project
                    </a>
                    <a href="../../pages/dashboard.html" class="text-slate-600 hover:text-indigo-600">← Back</a>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-6 py-8">
            <!-- Filters -->
            <div class="bg-white rounded-lg border border-slate-200 p-4 mb-8">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input
                        type="text"
                        placeholder="Search projects..."
                        id="search-projects"
                        class="px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition"
                    >
                    <select class="px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        <option value="">All Categories</option>
                        <option value="web">Web App</option>
                        <option value="mobile">Mobile App</option>
                        <option value="ai">AI/ML</option>
                        <option value="game">Game</option>
                        <option value="other">Other</option>
                    </select>
                    <select class="px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        <option value="">All Universities</option>
                        <option value="stanford">Stanford</option>
                        <option value="mit">MIT</option>
                        <option value="berkeley">UC Berkeley</option>
                    </select>
                    <button onclick="applyFilters()" class="px-4 py-2 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition">
                        Search
                    </button>
                </div>
            </div>

            <!-- Projects Grid -->
            <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="col-span-full text-center py-12 text-slate-500">
                    <div class="text-4xl mb-2">🎨</div>
                    <p>No projects submitted yet. Be the first!</p>
                </div>
            </div>
        </main>
    </div>

    <script src="../../assets/js/core/api.js"></script>
    <script src="../../assets/js/core/auth.js"></script>

    <script>
        Auth.requireAuth();

        async function loadProjects() {
            try {
                const response = await API.projects.listProjects();
                if (response.ok && response.projects && response.projects.length > 0) {
                    const grid = document.getElementById('projects-grid');
                    grid.innerHTML = response.projects.map(project => `
                        <div class="bg-white rounded-lg border border-slate-200 overflow-hidden hover:shadow-lg transition">
                            <div class="h-40 bg-gradient-to-br from-indigo-400 to-purple-500"></div>
                            <div class="p-6">
                                <h3 class="text-xl font-bold text-slate-900 mb-2">${project.title}</h3>
                                <p class="text-slate-600 text-sm mb-4">${project.description || 'No description'}</p>
                                <div class="flex flex-wrap gap-2 mb-4">
                                    ${(project.tags || []).slice(0, 3).map(tag => `<span class="px-2 py-1 bg-slate-100 text-slate-700 rounded text-xs">${tag}</span>`).join('')}
                                </div>
                                <div class="flex gap-2">
                                    <button class="flex-1 px-3 py-2 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition text-sm">
                                        View
                                    </button>
                                    <button class="flex-1 px-3 py-2 border-2 border-indigo-600 text-indigo-600 font-semibold rounded-lg hover:bg-indigo-50 transition text-sm">
                                        ❤️
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('[v0] Error loading projects:', error);
            }
        }

        function applyFilters() {
            loadProjects();
        }

        document.addEventListener('DOMContentLoaded', loadProjects);
    </script>

    
    <!-- Global Modal -->
    <div id="global-modal-backdrop" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[90] flex items-center justify-center p-4 transition-all duration-300 opacity-0">
        <div class="bg-white dark:bg-slate-800 text-slate-900 dark:text-white shadow-2xl p-8 rounded-3xl max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-90 transition-all duration-300" id="global-toast">
            <img src="../../assets/svg/logo.svg" alt="ProjectHive Logo" class="w-16 h-16 mx-auto mb-5 animate-pulse">
            <p id="global-toast-msg" class="text-lg font-semibold mb-8 text-slate-700 dark:text-slate-200 leading-relaxed"></p>
            <button onclick="hideModal()" class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl transition-all font-semibold shadow-lg shadow-indigo-200 dark:shadow-none hover:scale-[1.02] active:scale-95">Got it, thanks!</button>
        </div>
    </div>
    <script>
        function showToast(message) {
            const backdrop = document.getElementById('global-modal-backdrop');
            const msgEl = document.getElementById('global-toast-msg');
            const modal = document.getElementById('global-toast');
            if (backdrop && msgEl) {
                msgEl.innerHTML = message;
                backdrop.classList.remove('hidden');
                // Force reflow
                void backdrop.offsetWidth;
                backdrop.classList.remove('opacity-0');
                modal.classList.remove('scale-90');
                modal.classList.add('scale-100');
            }
        }
        function hideModal() {
            const backdrop = document.getElementById('global-modal-backdrop');
            const modal = document.getElementById('global-toast');
            if (backdrop) {
                backdrop.classList.add('opacity-0');
                modal.classList.remove('scale-100');
                modal.classList.add('scale-90');
                setTimeout(() => backdrop.classList.add('hidden'), 300);
            }
        }
    </script>

        function showProjectInfo(key) {
            showToast(projectInfo[key]);
        }
    </script>
</body>
</html>
