<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verify Email — ProjectHive</title>
<meta name="description" content="Verify your ProjectHive email address.">
<link rel="icon" href="../../assets/svg/logo.png">
<script>(function(){const t=localStorage.getItem('theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark');}})()</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8fafc;--card:#fff;--txt:#0f172a;--sub:#475569;--muted:#94a3b8;--border:#e2e8f0;--primary:#6366f1;--primary2:#7c3aed;--primary3:#a855f7;--shadow:0 4px 24px rgba(99,102,241,.08)}
.dark{--bg:#0f172a;--card:#1e293b;--txt:#f1f5f9;--sub:#94a3b8;--muted:#64748b;--border:#334155;--shadow:0 4px 24px rgba(0,0,0,.4)}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{min-height:100vh;background:var(--bg);color:var(--txt);display:flex;align-items:center;justify-content:center;padding:24px;transition:background .3s,color .3s}
.bg-orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.orb1{width:500px;height:500px;background:rgba(99,102,241,.12);top:-150px;left:-100px}
.orb2{width:400px;height:400px;background:rgba(168,85,247,.1);bottom:-100px;right:-80px}
.card{position:relative;z-index:1;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:48px 40px;width:100%;max-width:440px;box-shadow:var(--shadow);text-align:center}
.dark .card{border-color:rgba(255,255,255,.06)}
.icon{width:72px;height:72px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 24px}
.icon.loading{background:rgba(99,102,241,.1)}
.icon.success{background:rgba(16,185,129,.1)}
.icon.error{background:rgba(239,68,68,.1)}
.card-title{font-size:22px;font-weight:700;margin-bottom:8px}
.card-sub{font-size:14px;color:var(--sub);line-height:1.6;margin-bottom:28px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 28px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;transition:all .2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,.4)}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--txt);margin-left:10px}
.btn-outline:hover{background:var(--border)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.card{animation:fadeIn .4s ease}
</style>
</head>
<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<div class="card" id="card">
  <!-- Loading state -->
  <div id="loading-state">
    <div class="icon loading">
      <span class="spin"><span class="ph-svg-icon" style="display:inline-flex;align-items:center;vertical-align:middle"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:ph-spin 1s linear infinite"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></span></span>
    </div>
    <h1 class="card-title">Verifying your email…</h1>
    <p class="card-sub">Please wait while we confirm your email address.</p>
  </div>

  <!-- Success state -->
  <div id="success-state" style="display:none">
    <div class="icon success"><span class="ph-svg-icon" style="display:inline-flex;align-items:center;vertical-align:middle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span></div>
    <h1 class="card-title">Email Verified!</h1>
    <p class="card-sub">Your email has been verified successfully. Welcome to ProjectHive! <span class="ph-svg-icon" style="display:inline-flex;align-items:center;vertical-align:middle"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><ellipse cx="12" cy="13" rx="5" ry="6"/><path d="M7.5 11c-2 0-3.5.9-3.5 2.5s1.5 2.5 3.5 2.5m9-5c2 0 3.5.9 3.5 2.5s-1.5 2.5-3.5 2.5"/><path d="M12 7V4m-2 3 1-2 1 2"/><circle cx="10" cy="12" r="1"/><circle cx="14" cy="12" r="1"/></svg></span></p>
    <a href="login.html" class="btn">Go to Sign In <span class="ph-svg-icon" style="display:inline-flex;align-items:center;vertical-align:middle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span></a>
  </div>

  <!-- Error state -->
  <div id="error-state" style="display:none">
    <div class="icon error"><span class="ph-svg-icon" style="display:inline-flex;align-items:center;vertical-align:middle"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></span></div>
    <h1 class="card-title" id="err-title">Verification Failed</h1>
    <p class="card-sub" id="err-msg">This verification link is invalid or has expired.</p>
    <a href="login.html" class="btn">Sign In</a>
    <a href="#" onclick="resendFlow()" class="btn btn-outline">Resend Email</a>
  </div>
</div>

<script>
(async function(){
  const params=new URLSearchParams(location.search);
  const token=params.get('token');

  function show(state){
    ['loading','success','error'].forEach(s=>{
      document.getElementById(s+'-state').style.display=s===state?'block':'none';
    });
  }

  if(!token){
    show('error');
    document.getElementById('err-title').textContent='Missing Token';
    document.getElementById('err-msg').textContent='No verification token found. Please use the link from your email.';
    return;
  }

  // Use Render backend in production, relative path in dev
  const API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? '/api'
    : 'https://projecthive-backend.onrender.com/api';

  try{
    const res=await fetch(API_BASE+'/auth/verify-email?token='+encodeURIComponent(token));
    const data=await res.json();
    if(res.ok){
      show('success');
      // Clear any stale user data — they need to login fresh
      localStorage.removeItem('user_data');
      localStorage.removeItem('access_token');
      localStorage.removeItem('refresh_token');
      // Auto-redirect to login after 3s
      setTimeout(()=>{window.location.href='login.html';},3000);
    }else{
      show('error');
      document.getElementById('err-msg').textContent=data.error||'Verification failed. Please request a new link.';
    }
  }catch(err){
    show('error');
    document.getElementById('err-msg').textContent='Could not connect to server. Please try again.';
  }
})();

async function resendFlow(){
  const email=prompt('Enter your email address to resend the verification link:');
  if(!email)return;
  try{
    const res=await fetch(API_BASE+'/auth/resend-verification',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email})
    });
    const data=await res.json();
    alert(data.message||'Verification email sent!');
  }catch(e){
    alert('Failed to resend. Please try again.');
  }
}
</script>
</body>
</html>
