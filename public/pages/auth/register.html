<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Create Account — ProjectHive</title>
<meta name="description" content="Join ProjectHive and start collaborating with students worldwide.">
<link rel="icon" href="/favicon.png?v=2">
<script>(function(){const t=localStorage.getItem('theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark');}})()</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: { primary: '#6366f1', primary2: '#7c3aed', primary3: '#a855f7' },
      fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
    }
  }
}
</script>
<style>
.gradient-text{background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.strength-bar{height:3px;border-radius:4px;background:#e2e8f0;margin-top:6px;overflow:hidden}
.dark .strength-bar{background:#334155}
.strength-fill{height:100%;border-radius:4px;transition:width .3s,background .3s;width:0}
.uni-dropdown{position:absolute;top:100%;left:0;right:0;max-height:220px;overflow-y:auto;background:white;border:1.5px solid #6366f1;border-top:0;border-radius:0 0 12px 12px;z-index:50;display:none;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.dark .uni-dropdown{background:#1e293b}
.uni-dropdown.show{display:block}
.uni-opt{padding:10px 14px;font-size:14px;cursor:pointer;transition:background .15s;border-bottom:1px solid #e2e8f0}
.dark .uni-opt{border-color:#334155;color:#f1f5f9}
.uni-opt:last-child{border-bottom:0}
.uni-opt:hover,.uni-opt.active{background:rgba(99,102,241,.1);color:#6366f1}
.uni-opt mark{background:rgba(99,102,241,.25);color:#6366f1;border-radius:2px;padding:0 1px}
.input-field{width:100%;padding:11px 12px 11px 40px !important;border:1.5px solid #e2e8f0;border-radius:12px;background:#f8fafc;color:#0f172a;font-size:16px;font-family:'Inter',sans-serif;outline:none;transition:all .2s}
.dark .input-field{border-color:#475569;background:#0f172a;color:#f1f5f9}
.input-field:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.input-field::placeholder{color:#94a3b8}

/* Sprint 2 #19+#20 — Auth mobile touch targets + checkbox */
@media(max-width:768px){
  #theme-btn{min-width:44px!important;min-height:44px!important;width:44px!important;height:44px!important}
  nav a[href="/register"],nav a[href="/login"]{min-height:44px!important;padding:10px 20px!important;display:inline-flex!important;align-items:center!important}
  button[type="submit"]{min-height:48px!important;font-size:15px!important}
  input[type="email"],input[type="password"],input[type="text"],select{font-size:16px!important;min-height:44px!important}
  /* #20 — Checkbox 24x24 for touch */
  input[type="checkbox"]#terms{width:24px!important;height:24px!important;min-width:24px!important;min-height:24px!important}
}
</style>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 flex flex-col transition-colors duration-300 overflow-x-hidden font-sans">

<!-- Background orbs -->
<div class="fixed w-[500px] h-[500px] rounded-full bg-indigo-500/10 dark:bg-indigo-500/5 blur-[80px] -top-[150px] -left-[100px] pointer-events-none z-0"></div>
<div class="fixed w-[400px] h-[400px] rounded-full bg-purple-500/10 dark:bg-purple-500/5 blur-[80px] -bottom-[100px] -right-[80px] pointer-events-none z-0"></div>

<!-- Nav -->
<nav class="fixed top-0 left-0 right-0 z-50 bg-white/85 dark:bg-slate-900/90 backdrop-blur-xl border-b border-slate-200 dark:border-slate-700 px-6 h-[60px] flex items-center justify-between transition-colors">
  <a href="/" class="flex items-center gap-2.5 no-underline">
    <img src="/favicon.png?v=2" alt="ProjectHive" class="w-9 h-9 rounded-[9px] object-contain" onerror="this.style.display='none'">
    <span class="text-lg font-extrabold gradient-text">ProjectHive</span>
  </a>
  <div class="flex items-center gap-2">
    <button id="theme-btn" onclick="toggleTheme()" title="Toggle theme" class="w-9 h-9 rounded-[9px] border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-800 cursor-pointer flex items-center justify-center text-slate-500 hover:border-indigo-500 hover:text-indigo-500 transition-all">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="theme-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <a href="/login" class="inline-flex items-center gap-1.5 px-4 py-2 rounded-[10px] text-[13.5px] font-semibold border-[1.5px] border-slate-200 dark:border-slate-600 text-slate-500 dark:text-slate-400 hover:border-indigo-500 hover:text-indigo-500 hover:bg-indigo-500/5 transition-all no-underline">Sign In</a>
  </div>
</nav>

<!-- Main -->
<div class="flex-1 flex items-start justify-center px-6 pt-20 pb-10 relative z-10">
  <div class="relative bg-white dark:bg-slate-800 border border-slate-200 dark:border-white/[.06] rounded-3xl p-9 sm:p-10 w-full max-w-[480px] shadow-lg dark:shadow-2xl my-auto" id="main-card">

    <a href="/" class="flex items-center justify-center gap-2.5 mb-6 no-underline">
      <img src="/favicon.png?v=2" alt="ProjectHive" class="w-[42px] h-[42px] rounded-xl object-contain" onerror="this.style.display='none'">
      <span class="text-xl font-extrabold gradient-text">ProjectHive</span>
    </a>

    <h1 class="text-[22px] font-bold text-center mb-1">Create your account</h1>
    <p class="text-sm text-slate-500 dark:text-slate-400 text-center mb-6">Join thousands of students building together</p>

    <!-- Google OAuth Button -->
    <button id="google-btn" onclick="signInWithGoogle()"
      class="w-full flex items-center justify-center gap-3 py-[12px] border-[1.5px] border-slate-200 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 text-[14px] font-semibold cursor-pointer hover:border-indigo-400 hover:bg-slate-50 dark:hover:bg-slate-700 transition-all mb-5 shadow-sm">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M47.5 24.5c0-1.6-.1-3.2-.4-4.7H24v9h13.2c-.6 3-2.3 5.6-5 7.3v6h8.1c4.7-4.3 7.2-10.7 7.2-17.6z"/><path fill="#34A853" d="M24 48c6.5 0 12-2.1 16-5.8l-8.1-6c-2.2 1.5-5 2.4-7.9 2.4-6.1 0-11.2-4.1-13-9.6H2.6v6.2C6.5 42.6 14.7 48 24 48z"/><path fill="#FBBC05" d="M11 29c-.5-1.5-.8-3-.8-4.5s.3-3 .8-4.5V13.7H2.6C.9 17.1 0 20.4 0 24s.9 6.9 2.6 10.3L11 29z"/><path fill="#EA4335" d="M24 9.5c3.4 0 6.5 1.2 8.9 3.5l6.7-6.7C35.9 2.5 30.4 0 24 0 14.7 0 6.5 5.4 2.6 13.7l8.4 6.5C12.8 13.6 17.9 9.5 24 9.5z"/></svg>
      <span id="google-btn-text">Continue with Google</span>
    </button>

    <!-- Divider -->
    <div class="flex items-center gap-3 mb-5">
      <div class="flex-1 h-px bg-slate-200 dark:bg-slate-600"></div>
      <span class="text-xs text-slate-400 font-medium">or register with email</span>
      <div class="flex-1 h-px bg-slate-200 dark:bg-slate-600"></div>
    </div>

    <div id="alert" class="hidden rounded-[10px] text-[13px] mb-3.5 px-3.5 py-2.5"></div>

    <form id="reg-form" onsubmit="handleRegister(event)">

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3.5">
        <div class="mb-0">
          <label for="fname" class="block text-[13px] font-semibold text-slate-500 dark:text-slate-400 mb-1.5">First Name</label>
          <div class="relative">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="absolute left-3.5 top-1/2 -translate-y-1/2 opacity-40 pointer-events-none z-10"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input id="fname" type="text" placeholder="John" required autocomplete="given-name" class="input-field">
          </div>
        </div>
        <div class="mb-0">
          <label for="lname" class="block text-[13px] font-semibold text-slate-500 dark:text-slate-400 mb-1.5">Last Name</label>
          <div class="relative">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="absolute left-3.5 top-1/2 -translate-y-1/2 opacity-40 pointer-events-none z-10"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input id="lname" type="text" placeholder="Doe" required autocomplete="family-name" class="input-field">
          </div>
        </div>
      </div>

      <div class="mt-3.5">
        <label for="email" class="block text-[13px] font-semibold text-slate-500 dark:text-slate-400 mb-1.5">University Email</label>
        <div class="relative">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="absolute left-3.5 top-1/2 -translate-y-1/2 opacity-40 pointer-events-none z-10"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <input id="email" type="email" placeholder="john@university.edu" required autocomplete="email" class="input-field">
        </div>
      </div>

      <div class="mt-3.5">
        <label for="university" class="block text-[13px] font-semibold text-slate-500 dark:text-slate-400 mb-1.5">University / Institution</label>
        <div class="relative">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="absolute left-3.5 top-1/2 -translate-y-1/2 opacity-40 pointer-events-none z-10"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <input id="university" type="text" placeholder="Type university name…" required autocomplete="off" list="uni-list" class="input-field">
          <datalist id="uni-list"></datalist>
          <div class="uni-dropdown" id="uni-dropdown"></div>
        </div>
        <div id="uni-status"></div>
      </div>

      <div class="mt-3.5">
        <label for="password" class="block text-[13px] font-semibold text-slate-500 dark:text-slate-400 mb-1.5">Password</label>
        <div class="relative">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="absolute left-3.5 top-1/2 -translate-y-1/2 opacity-40 pointer-events-none z-10"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input id="password" type="password" placeholder="Min. 8 characters" required oninput="checkStrength(this.value)" autocomplete="new-password" class="input-field pr-11">
          <button type="button" onclick="togglePw('password','eye1')" class="absolute right-2.5 top-1/2 -translate-y-1/2 bg-transparent border-none cursor-pointer text-slate-400 p-1.5 hover:text-indigo-500 transition-colors z-20 flex items-center">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eye1"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="s-fill"></div></div>
      </div>

      <div class="mt-3.5">
        <label for="confirm" class="block text-[13px] font-semibold text-slate-500 dark:text-slate-400 mb-1.5">Confirm Password</label>
        <div class="relative">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="absolute left-3.5 top-1/2 -translate-y-1/2 opacity-40 pointer-events-none z-10"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input id="confirm" type="password" placeholder="Repeat your password" required autocomplete="new-password" class="input-field pr-11">
          <button type="button" onclick="togglePw('confirm','eye2')" class="absolute right-2.5 top-1/2 -translate-y-1/2 bg-transparent border-none cursor-pointer text-slate-400 p-1.5 hover:text-indigo-500 transition-colors z-20 flex items-center">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eye2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="flex items-start gap-2.5 mt-4 mb-4 text-[13px] text-slate-500 dark:text-slate-400">
        <input type="checkbox" id="terms" required class="w-4 h-4 mt-0.5 cursor-pointer accent-indigo-500 shrink-0">
        <label for="terms">I agree to the <a href="/terms" class="text-indigo-500 no-underline hover:underline">Terms of Service</a> and <a href="/privacy" class="text-indigo-500 no-underline hover:underline">Privacy Policy</a></label>
      </div>

      <button type="submit" id="submit-btn" class="w-full py-[13px] border-none rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 text-white text-[15px] font-bold cursor-pointer hover:-translate-y-0.5 hover:shadow-lg hover:shadow-indigo-500/40 active:translate-y-0 disabled:opacity-60 disabled:cursor-not-allowed disabled:transform-none transition-all flex items-center justify-center gap-2">
        <span id="btn-text">Create Account</span>
      </button>
    </form>

    <div class="text-center mt-5 text-sm text-slate-500 dark:text-slate-400">
      Already have an account? <a href="/login" class="text-indigo-500 font-semibold no-underline hover:underline">Sign in</a>
    </div>
  </div>
</div>

<footer class="text-center py-5 text-[13px] text-slate-400 dark:text-slate-500">&copy; 2026 ProjectHive &mdash; Built for students, by students 🐝</footer>

<script src="/assets/js/core/ph-toast.js"></script>
<script src="/assets/js/core/api.js"></script>
<script src="/assets/js/core/auth.js"></script>
<script src="/assets/js/core/bd-universities.js"></script>
<script>
if(typeof Auth!=='undefined'&&Auth.isAuthenticated()){window.location.href='/dashboard';}

const BACKEND_BASE=(window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1')
  ?(window.location.port==='3000'?'http://localhost:5000/api':'/api')
  :'https://projecthive-backend.onrender.com/api';

async function signInWithGoogle(){
  const btn=document.getElementById('google-btn');
  const txt=document.getElementById('google-btn-text');
  btn.disabled=true;
  txt.textContent='Connecting to Google…';
  try{
    const res=await fetch(BACKEND_BASE+'/auth/google');
    const data=await res.json();
    if(data.url){
      window.location.href=data.url;
    }else{
      showAlert(data.error||'Could not start Google sign-in.');
      btn.disabled=false;txt.textContent='Continue with Google';
    }
  }catch(e){
    showAlert('Could not reach server. Please try again.');
    btn.disabled=false;txt.textContent='Continue with Google';
  }
}


function toggleTheme(){
  const dark=document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme',dark?'dark':'light');
  updateThemeIcon(dark);
}
function updateThemeIcon(dark){
  const i=document.getElementById('theme-icon');
  if(dark){i.innerHTML='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';}
  else{i.innerHTML='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';}
}
updateThemeIcon(document.documentElement.classList.contains('dark'));

function togglePw(id,iconId){
  const inp=document.getElementById(id);const open=inp.type==='password';
  inp.type=open?'text':'password';
  document.getElementById(iconId).innerHTML=open
    ?'<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
    :'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}

function checkStrength(pw){
  const fill=document.getElementById('s-fill');let score=0;
  if(pw.length>=8)score++;if(/[A-Z]/.test(pw))score++;if(/[0-9]/.test(pw))score++;if(/[^A-Za-z0-9]/.test(pw))score++;
  const colors=['#ef4444','#f59e0b','#10b981','#6366f1'];
  fill.style.width=(score*25)+'%';fill.style.background=colors[score-1]||'#e2e8f0';
}

function showAlert(msg,type='err'){
  const el=document.getElementById('alert');el.textContent=msg;
  el.className='rounded-[10px] text-[13px] mb-3.5 px-3.5 py-2.5 block '+(
    type==='ok'?'bg-emerald-500/[.08] border border-emerald-500/20 text-emerald-600 dark:text-emerald-400':
    'bg-red-500/[.08] border border-red-500/20 text-red-600 dark:text-red-400');
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function showSuccessState(email){
  document.getElementById('main-card').innerHTML=`
    <div class="text-center py-12 px-8">
      <div class="text-7xl mb-4">📧</div>
      <h2 class="text-2xl font-bold mb-3">Check your email!</h2>
      <p class="text-slate-500 dark:text-slate-400 text-[15px] leading-relaxed mb-6">
        We sent a verification link to<br>
        <strong class="text-indigo-500">${email}</strong>
      </p>
      <p class="text-slate-500 dark:text-slate-400 text-sm mb-8">
        Click the link in your email to activate your account.<br>
        <small class="opacity-60">The email should arrive within a minute.</small>
      </p>
      <a href="/login" class="inline-block px-9 py-3.5 bg-gradient-to-br from-indigo-500 to-purple-600 text-white no-underline rounded-xl text-[15px] font-bold hover:-translate-y-0.5 hover:shadow-lg transition-all">Go to Sign In →</a>
    </div>`;
}

async function handleRegister(e){
  e.preventDefault();
  const fn=document.getElementById('fname').value.trim();
  const ln=document.getElementById('lname').value.trim();
  const email=document.getElementById('email').value.trim();
  const uni=document.getElementById('university').value.trim();
  const pw=document.getElementById('password').value;
  const cpw=document.getElementById('confirm').value;
  if(pw!==cpw){showAlert('Passwords do not match.');return;}
  if(pw.length<8){showAlert('Password must be at least 8 characters.');return;}
  if(!document.getElementById('terms').checked){showAlert('Please accept the Terms of Service.');return;}
  const btn=document.getElementById('submit-btn');const txt=document.getElementById('btn-text');
  btn.disabled=true;txt.innerHTML='<span class="spinner"></span>';
  try{
    const BACKEND=(window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1')
      ?(window.location.port==='3000'?'http://localhost:5000/api':'/api')
      :'https://projecthive-backend.onrender.com/api';
    const res=await fetch(`${BACKEND}/auth/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({firstName:fn,lastName:ln,email,university:uni,password:pw})});
    const data=await res.json();
    if(res.ok&&data.requiresVerification){showSuccessState(data.user?.email||email);}
    else if(res.ok&&data.accessToken){localStorage.setItem('access_token',data.accessToken);if(data.refreshToken)localStorage.setItem('refresh_token',data.refreshToken);if(data.user)localStorage.setItem('user_data',JSON.stringify(data.user));showAlert('Account created! Redirecting...','ok');setTimeout(()=>{window.location.href='/dashboard';},1500);}
    else{showAlert(data.message||data.error||'Registration failed. Please try again.');btn.disabled=false;txt.textContent='Create Account';}
  }catch(err){showAlert('Could not connect to server. Please try again.');btn.disabled=false;txt.textContent='Create Account';}
}

// ── University Autocomplete ──
(function(){
  const inp=document.getElementById('university'),dd=document.getElementById('uni-dropdown'),dl=document.getElementById('uni-list'),status=document.getElementById('uni-status');
  if(!inp||!window.BD_UNIVERSITIES)return;
  const unis=window.BD_UNIVERSITIES;let activeIdx=-1;
  unis.forEach(u=>{const o=document.createElement('option');o.value=u;dl.appendChild(o);});
  function renderDropdown(query){
    if(!query||query.length<1){dd.classList.remove('show');return;}
    const q=query.toLowerCase();
    const matches=unis.filter(u=>{const low=u.toLowerCase();if(low.includes(q))return true;const m=u.match(/\(([^)]+)\)/);return m&&m[1].toLowerCase().includes(q);}).slice(0,8);
    if(!matches.length){dd.classList.remove('show');return;}
    dd.innerHTML=matches.map((m,i)=>{const idx=m.toLowerCase().indexOf(q);let html=m;if(idx>=0)html=m.slice(0,idx)+'<mark>'+m.slice(idx,idx+q.length)+'</mark>'+m.slice(idx+q.length);return'<div class="uni-opt" data-idx="'+i+'" data-val="'+m.replace(/"/g,'&quot;')+'">'+html+'</div>';}).join('');
    activeIdx=-1;dd.classList.add('show');
    dd.querySelectorAll('.uni-opt').forEach(opt=>{opt.addEventListener('mousedown',e=>{e.preventDefault();inp.value=opt.dataset.val;dd.classList.remove('show');validateUni(opt.dataset.val);});});
  }
  function validateUni(val){
    const match=unis.find(u=>u.toLowerCase()===val.toLowerCase());
    if(match)status.innerHTML='<span class="inline-flex items-center gap-1 text-[11px] mt-1 px-2 py-0.5 rounded-md font-semibold bg-emerald-500/10 text-emerald-500"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>Verified University</span>';
    else if(val.length>2)status.innerHTML='<span class="inline-flex items-center gap-1 text-[11px] mt-1 px-2 py-0.5 rounded-md font-semibold bg-red-500/[.08] text-red-500">Not in verified list — select from suggestions</span>';
    else status.innerHTML='';
  }
  inp.addEventListener('input',()=>{renderDropdown(inp.value.trim());validateUni(inp.value.trim());});
  inp.addEventListener('focus',()=>{if(inp.value.trim().length>=1)renderDropdown(inp.value.trim());});
  inp.addEventListener('blur',()=>{setTimeout(()=>dd.classList.remove('show'),150);});
  inp.addEventListener('keydown',e=>{
    const opts=dd.querySelectorAll('.uni-opt');if(!opts.length||!dd.classList.contains('show'))return;
    if(e.key==='ArrowDown'){e.preventDefault();activeIdx=Math.min(activeIdx+1,opts.length-1);opts.forEach((o,i)=>o.classList.toggle('active',i===activeIdx));opts[activeIdx]?.scrollIntoView({block:'nearest'});}
    else if(e.key==='ArrowUp'){e.preventDefault();activeIdx=Math.max(activeIdx-1,0);opts.forEach((o,i)=>o.classList.toggle('active',i===activeIdx));opts[activeIdx]?.scrollIntoView({block:'nearest'});}
    else if(e.key==='Enter'&&activeIdx>=0){e.preventDefault();inp.value=opts[activeIdx].dataset.val;dd.classList.remove('show');validateUni(inp.value);}
  });
})();
</script>
<script src="/assets/js/core/info-modal.js"></script>
