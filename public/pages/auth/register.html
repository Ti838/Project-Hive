<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Create Account — ProjectHive</title>
<meta name="description" content="Join ProjectHive and start collaborating with students worldwide.">
<link rel="icon" href="/assets/svg/logo.png">
<script>(function(){const t=localStorage.getItem('theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark');};})()</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8fafc;--card:#fff;--txt:#0f172a;--sub:#475569;--muted:#94a3b8;--border:#e2e8f0;--primary:#6366f1;--primary2:#7c3aed;--primary3:#a855f7;--input-bg:#f8fafc;--shadow:0 4px 24px rgba(99,102,241,.08)}
.dark{--bg:#0f172a;--card:#1e293b;--txt:#f1f5f9;--sub:#94a3b8;--muted:#64748b;--border:#334155;--input-bg:#0f172a;--shadow:0 4px 24px rgba(0,0,0,.4)}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{min-height:100vh;background:var(--bg);color:var(--txt);display:flex;flex-direction:column;transition:background .3s,color .3s;overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(248,250,252,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;transition:background .3s}
.dark nav{background:rgba(15,23,42,.9)}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo img{width:36px;height:36px;border-radius:9px;object-fit:contain}
.nav-logo span{font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--primary3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-right{display:flex;align-items:center;gap:8px}
.theme-btn{width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;color:var(--sub)}
.theme-btn:hover{border-color:var(--primary);color:var(--primary)}
.nav-link{padding:7px 16px;border-radius:9px;text-decoration:none;font-size:14px;font-weight:500;color:var(--sub);transition:all .15s;border:1px solid var(--border)}
.nav-link:hover{background:var(--border);color:var(--txt)}
.bg-orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.orb1{width:500px;height:500px;background:rgba(99,102,241,.12);top:-150px;left:-100px}
.orb2{width:400px;height:400px;background:rgba(168,85,247,.1);bottom:-100px;right:-80px}
.page{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:80px 24px 40px;position:relative}
.card{position:relative;z-index:1;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:36px 40px;width:100%;max-width:480px;box-shadow:var(--shadow);margin:auto}
.dark .card{border-color:rgba(255,255,255,.06)}
.logo-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:24px;text-decoration:none}
.logo-row img{width:42px;height:42px;border-radius:12px;object-fit:contain}
.logo-row .brand{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--primary3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card-title{font-size:22px;font-weight:700;text-align:center;margin-bottom:4px}
.card-sub{font-size:14px;color:var(--sub);text-align:center;margin-bottom:24px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--sub);margin-bottom:5px}
.input-wrap{position:relative}
.input-wrap>svg:first-of-type{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none;z-index:1}
.input-wrap input,.input-wrap select{width:100%;padding:11px 44px 11px 40px;border:1.5px solid var(--border);border-radius:12px;background:var(--input-bg);color:var(--txt);font-size:16px;font-family:'Inter',sans-serif;transition:all .2s;outline:none;-webkit-appearance:none;position:relative;z-index:0}
.input-wrap input.no-icon{padding-left:14px}
.input-wrap input:focus,.input-wrap select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.input-wrap input::placeholder{color:var(--muted)}
.input-wrap select option{background:var(--card);color:var(--txt)}
.eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);padding:6px;transition:color .15s;z-index:2;line-height:0;display:flex;align-items:center;justify-content:center}
.eye-btn:hover{color:var(--primary)}
.eye-btn svg{position:static!important;transform:none!important;opacity:1!important}
.strength-bar{height:3px;border-radius:4px;background:var(--border);margin-top:6px;overflow:hidden}
.strength-fill{height:100%;border-radius:4px;transition:width .3s,background .3s;width:0}
.terms-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:16px;font-size:13px;color:var(--sub)}
.terms-row input[type=checkbox]{width:16px;height:16px;margin-top:1px;cursor:pointer;accent-color:var(--primary);flex-shrink:0}
.terms-row a{color:var(--primary);text-decoration:none}
.terms-row a:hover{text-decoration:underline}
.btn-submit{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,.4)}
.btn-submit:active{transform:translateY(0)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}
.alert{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none}
.alert.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#dc2626}
.alert.ok{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);color:#059669}
.dark .alert.err{color:#f87171}
.dark .alert.ok{color:#34d399}
.signin-row{text-align:center;margin-top:18px;font-size:14px;color:var(--sub)}
.signin-row a{color:var(--primary);font-weight:600;text-decoration:none}
.signin-row a:hover{text-decoration:underline}
/* Success state */
.success-state{text-align:center;padding:48px 32px}
.success-icon{font-size:72px;margin-bottom:16px}
.success-title{color:var(--txt);font-size:24px;font-weight:700;margin:0 0 12px}
.success-body{color:var(--sub);font-size:15px;line-height:1.6;margin:0 0 24px}
.success-note{color:var(--sub);font-size:14px;margin:0 0 32px}
.success-btn{display:inline-block;padding:14px 36px;background:linear-gradient(135deg,#6366f1,#7c3aed);color:#fff;text-decoration:none;border-radius:12px;font-size:15px;font-weight:700}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
footer{text-align:center;padding:20px;font-size:13px;color:var(--muted)}
@media(max-width:540px){.two-col{grid-template-columns:1fr}.card{padding:28px 20px;border-radius:18px}.page{padding:72px 12px 32px}nav{padding:0 16px}}
</style>
</head>
<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<nav>
  <a href="/" class="nav-logo">
    <img src="/assets/svg/logo.png" alt="ProjectHive" onerror="this.style.display='none'">
    <span>ProjectHive</span>
  </a>
  <div class="nav-right">
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="theme-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <a href="/login" class="nav-link">Sign In</a>
  </div>
</nav>

<div class="page">
  <div class="card" id="main-card">
    <a href="/" class="logo-row">
      <img src="/assets/svg/logo.png" alt="ProjectHive" onerror="this.style.display='none'">
      <span class="brand">ProjectHive</span>
    </a>

    <h1 class="card-title">Create your account</h1>
    <p class="card-sub">Join thousands of students building together</p>

    <div class="alert" id="alert"></div>

    <form id="reg-form" onsubmit="handleRegister(event)">
      <div class="two-col">
        <div class="field">
          <label for="fname">First Name</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input id="fname" type="text" placeholder="John" required autocomplete="given-name">
          </div>
        </div>
        <div class="field">
          <label for="lname">Last Name</label>
          <div class="input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input id="lname" type="text" placeholder="Doe" required autocomplete="family-name">
          </div>
        </div>
      </div>

      <div class="field">
        <label for="email">University Email</label>
        <div class="input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <input id="email" type="email" placeholder="john@university.edu" required autocomplete="email">
        </div>
      </div>

      <div class="field">
        <label for="university">University / Institution</label>
        <div class="input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <input id="university" type="text" placeholder="e.g. BUET, DU, NSU…" required>
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input id="password" type="password" placeholder="Min. 8 characters" required oninput="checkStrength(this.value)" autocomplete="new-password">
          <button type="button" class="eye-btn" onclick="togglePw('password','eye1')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eye1"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="s-fill"></div></div>
      </div>

      <div class="field">
        <label for="confirm">Confirm Password</label>
        <div class="input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input id="confirm" type="password" placeholder="Repeat your password" required autocomplete="new-password">
          <button type="button" class="eye-btn" onclick="togglePw('confirm','eye2')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eye2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="terms-row">
        <input type="checkbox" id="terms" required>
        <label for="terms">I agree to the <a href="/terms">Terms of Service</a> and <a href="/privacy">Privacy Policy</a></label>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">
        <span id="btn-text">Create Account</span>
      </button>
    </form>

    <div class="signin-row">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</div>

<footer>&copy; 2026 ProjectHive &mdash; Built for students, by students 🐝</footer>

<script src="/assets/js/core/ph-toast.js"></script>
<script src="/assets/js/core/api.js"></script>
<script src="/assets/js/core/auth.js"></script>
<script>
if(typeof Auth!=='undefined'&&Auth.isAuthenticated()){window.location.href='/dashboard';}

function toggleTheme(){
  const dark=document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme',dark?'dark':'light');
  updateThemeIcon(dark);
}
function updateThemeIcon(dark){
  const i=document.getElementById('theme-icon');
  if(dark){i.innerHTML='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';}
  else{i.innerHTML='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';}
}
updateThemeIcon(document.documentElement.classList.contains('dark'));

function togglePw(id,iconId){
  const inp=document.getElementById(id);
  const open=inp.type==='password';
  inp.type=open?'text':'password';
  document.getElementById(iconId).innerHTML=open
    ?'<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
    :'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}

function checkStrength(pw){
  const fill=document.getElementById('s-fill');
  let score=0;
  if(pw.length>=8)score++;
  if(/[A-Z]/.test(pw))score++;
  if(/[0-9]/.test(pw))score++;
  if(/[^A-Za-z0-9]/.test(pw))score++;
  const colors=['#ef4444','#f59e0b','#10b981','#6366f1'];
  fill.style.width=(score*25)+'%';
  fill.style.background=colors[score-1]||'#e2e8f0';
}

function showAlert(msg,type='err'){
  const el=document.getElementById('alert');
  el.textContent=msg;el.className='alert '+type;el.style.display='block';
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function showSuccessState(email){
  const card=document.getElementById('main-card');
  card.innerHTML=`
    <div class="success-state">
      <div class="success-icon">📧</div>
      <h2 class="success-title">Check your email!</h2>
      <p class="success-body">
        We sent a verification link to<br>
        <strong style="color:#6366f1">${email}</strong>
      </p>
      <p class="success-note">
        Click the link in your email to activate your account.<br>
        <small style="opacity:.6">Check spam/junk if you don't see it within a minute.</small>
      </p>
      <a href="/login" class="success-btn">Go to Sign In →</a>
    </div>`;
}

async function handleRegister(e){
  e.preventDefault();
  const fn=document.getElementById('fname').value.trim();
  const ln=document.getElementById('lname').value.trim();
  const email=document.getElementById('email').value.trim();
  const uni=document.getElementById('university').value.trim();
  const pw=document.getElementById('password').value;
  const cpw=document.getElementById('confirm').value;

  if(pw!==cpw){showAlert('Passwords do not match.');return;}
  if(pw.length<8){showAlert('Password must be at least 8 characters.');return;}
  if(!document.getElementById('terms').checked){showAlert('Please accept the Terms of Service.');return;}

  const btn=document.getElementById('submit-btn');
  const txt=document.getElementById('btn-text');
  btn.disabled=true;
  txt.innerHTML='<span class="spinner"></span>';

  try{
    const BACKEND=(window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1')
      ?'/api':'https://projecthive-backend.onrender.com/api';

    const res=await fetch(`${BACKEND}/auth/register`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({firstName:fn,lastName:ln,email,university:uni,password:pw})
    });
    const data=await res.json();

    if(res.ok&&data.requiresVerification){
      showSuccessState(data.user?.email||email);
    }else if(res.ok&&data.accessToken){
      localStorage.setItem('access_token',data.accessToken);
      if(data.refreshToken)localStorage.setItem('refresh_token',data.refreshToken);
      if(data.user)localStorage.setItem('user_data',JSON.stringify(data.user));
      showAlert('Account created! Redirecting...','ok');
      setTimeout(()=>{window.location.href='/dashboard';},1500);
    }else{
      showAlert(data.message||data.error||'Registration failed. Please try again.');
      btn.disabled=false;txt.textContent='Create Account';
    }
  }catch(err){
    showAlert('Could not connect to server. Please try again.');
    btn.disabled=false;txt.textContent='Create Account';
  }
}
</script>
</body>
</html>
