<!DOCTYPE html>
<html class="light" lang="en"><head>
<script>(function(){const t=localStorage.getItem('theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark');}})()</script>
<link rel="icon" href="../../assets/svg/logo.png">
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password | ProjectHive</title>
<meta name="description" content="Reset your ProjectHive account password."/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../../assets/css/ph-system.css">
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: { extend: {
      colors: {
        "primary": "#1f108e", "secondary": "#712ae2",
        "on-primary": "#ffffff", "surface": "#f7f9fb",
        "background": "#f7f9fb", "on-surface": "#191c1e",
        "on-surface-variant": "#464553", "outline": "#777584",
        "outline-variant": "#c8c4d5", "primary-fixed-dim": "#c3c0ff",
        "tertiary-container": "#424151"
      },
      fontSize: {
        "headline-lg": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
        "label-md": ["14px", {"lineHeight": "16px", "fontWeight": "600"}],
        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}]
      }
    }}
  }
</script>
<style>
  body { font-family: 'Inter', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .accent-gradient { background: linear-gradient(135deg, #712ae2 0%, #1f108e 100%); }
  .glass-card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255,255,255,0.3);
  }
  .dark .glass-card {
    background: rgba(44,43,58,0.6);
    border: 1px solid rgba(255,255,255,0.1);
  }
</style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-4 relative overflow-hidden">

<!-- Background orbs -->
<div class="absolute top-[-150px] left-[-100px] w-[500px] h-[500px] rounded-full opacity-10" style="background:rgba(99,102,241,0.5);filter:blur(80px);pointer-events:none;"></div>
<div class="absolute bottom-[-100px] right-[-100px] w-[400px] h-[400px] rounded-full opacity-10" style="background:rgba(168,85,247,0.5);filter:blur(80px);pointer-events:none;"></div>

<!-- Theme toggle -->
<div class="absolute top-6 right-6 z-30">
  <button id="theme-btn" class="p-3 rounded-full bg-white/20 backdrop-blur-md hover:bg-white/40 transition-colors border border-white/30 text-on-surface" onclick="toggleTheme()">
    <span class="material-symbols-outlined block" id="theme-icon">dark_mode</span>
  </button>
</div>

<!-- Card -->
<div class="glass-card w-full max-w-md rounded-2xl p-10 shadow-2xl relative z-10">

  <!-- Logo -->
  <a href="login.html" class="flex items-center justify-center gap-3 mb-8 group">
    <img src="../../assets/svg/logo.png" alt="ProjectHive" class="w-10 h-10 rounded-xl object-contain" onerror="this.style.display='none'">
    <span class="text-xl font-extrabold" style="background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">ProjectHive</span>
  </a>

  <!-- Heading -->
  <div class="text-center mb-8">
    <div class="w-16 h-16 rounded-full accent-gradient flex items-center justify-center mx-auto mb-4">
      <span class="material-symbols-outlined text-white text-3xl">lock_reset</span>
    </div>
    <h1 class="text-headline-lg text-on-surface font-bold mb-2">Reset your password</h1>
    <p class="text-body-sm text-on-surface-variant">Enter the email you signed up with and we'll send you a reset link.</p>
  </div>

  <!-- Alert area -->
  <div id="msg-area" class="hidden mb-4 p-3 rounded-xl text-sm"></div>

  <!-- Form -->
  <form id="forgot-form" onsubmit="return false;" class="space-y-5">
    <div>
      <label class="block text-label-md text-on-surface-variant mb-1.5" for="email">Email address</label>
      <div class="relative">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">mail</span>
        <input id="email" type="email" required placeholder="name@university.edu"
          class="w-full pl-10 pr-4 py-3 bg-white/50 dark:bg-tertiary-container/30 border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-body-md"/>
      </div>
    </div>

    <button id="submit-btn" type="submit"
      class="w-full py-4 accent-gradient text-white font-bold rounded-xl shadow-lg hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2">
      <span class="material-symbols-outlined text-[18px]">send</span>
      Send Reset Link
    </button>
  </form>

  <!-- Back to login -->
  <div class="mt-6 text-center">
    <a href="login.html" class="text-label-sm text-primary dark:text-primary-fixed-dim hover:underline flex items-center justify-center gap-1">
      <span class="material-symbols-outlined text-[16px]">arrow_back</span>
      Back to Sign In
    </a>
  </div>
</div>

<footer class="absolute bottom-4 text-center w-full z-10">
  <p class="text-[11px] text-outline/60">&copy; 2024 ProjectHive Academic Solutions.</p>
</footer>

<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/auth.js"></script>
<script>
  // Redirect if already logged in
  if (typeof Auth !== 'undefined' && Auth.isAuthenticated()) {
    window.location.href = '../dashboard.html';
  }

  function toggleTheme() {
    const html = document.documentElement;
    const icon = document.getElementById('theme-icon');
    const dark = html.classList.toggle('dark');
    localStorage.setItem('theme', dark ? 'dark' : 'light');
    icon.textContent = dark ? 'light_mode' : 'dark_mode';
  }

  // Sync icon with current theme
  (function() {
    const dark = document.documentElement.classList.contains('dark');
    document.getElementById('theme-icon').textContent = dark ? 'light_mode' : 'dark_mode';
  })();

  function showMsg(text, type = 'ok') {
    const el = document.getElementById('msg-area');
    el.className = type === 'ok'
      ? 'mb-4 p-3 rounded-xl text-sm bg-green-50 border border-green-200 text-green-700'
      : 'mb-4 p-3 rounded-xl text-sm bg-red-50 border border-red-200 text-red-700';
    el.textContent = text;
    el.classList.remove('hidden');
  }

  document.getElementById('forgot-form').addEventListener('submit', async () => {
    const email = document.getElementById('email').value.trim();
    if (!email) { showMsg('Please enter your email address.', 'err'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px]">progress_activity</span> Sending…';

    try {
      const r = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await r.json().catch(() => ({}));
      if (r.ok) {
        showMsg('Reset link sent! Check your inbox (and spam folder).');
        document.getElementById('forgot-form').reset();
      } else {
        showMsg(data.message || 'Something went wrong. Please try again.', 'err');
      }
    } catch (e) {
      showMsg('Could not connect to server. Please try again later.', 'err');
    }

    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">send</span> Send Reset Link';
  });
</script>
</body></html>
