<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forgot Password — ProjectHive</title>
<meta name="description" content="Reset your ProjectHive account password.">
<link rel="icon" href="/favicon.png?v=2">
<script>(function(){const t=localStorage.getItem('theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark');};})()</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8fafc;--card:#fff;--txt:#0f172a;--sub:#475569;--muted:#94a3b8;--border:#e2e8f0;--primary:#6366f1;--primary2:#7c3aed;--primary3:#a855f7;--input-bg:#f8fafc;--shadow:0 4px 24px rgba(99,102,241,.08)}
.dark{--bg:#0f172a;--card:#1e293b;--txt:#f1f5f9;--sub:#94a3b8;--muted:#64748b;--border:#334155;--input-bg:#0f172a;--shadow:0 4px 24px rgba(0,0,0,.4)}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{min-height:100vh;background:var(--bg);color:var(--txt);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;transition:background .3s,color .3s}
.bg-orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.orb1{width:500px;height:500px;background:rgba(99,102,241,.12);top:-150px;left:-100px}
.orb2{width:400px;height:400px;background:rgba(168,85,247,.1);bottom:-100px;right:-80px}
.theme-btn{position:fixed;top:16px;right:16px;z-index:100;width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--sub)}
.theme-btn:hover{border-color:var(--primary);color:var(--primary)}
.card{position:relative;z-index:1;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:44px 40px;width:100%;max-width:440px;box-shadow:var(--shadow);animation:fadeIn .4s ease}
.dark .card{border-color:rgba(255,255,255,.06)}
.logo-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px;text-decoration:none}
.logo-row img{width:40px;height:40px;border-radius:10px;object-fit:contain}
.logo-row .brand{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--primary3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.icon-wrap{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--primary),var(--primary2));display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px}
h1{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px}
.card-sub{font-size:14px;color:var(--sub);text-align:center;line-height:1.6;margin-bottom:24px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--sub);margin-bottom:5px}
.input-wrap{position:relative}
.input-wrap>svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
.input-wrap input{width:100%;padding:11px 16px 11px 40px;border:1.5px solid var(--border);border-radius:12px;background:var(--input-bg);color:var(--txt);font-size:16px;font-family:'Inter',sans-serif;transition:all .2s;outline:none}
.input-wrap input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.input-wrap input::placeholder{color:var(--muted)}
.btn-submit{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,.4)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}
.alert{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none}
.alert.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#dc2626}
.alert.ok{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);color:#059669}
.dark .alert.err{color:#f87171}.dark .alert.ok{color:#34d399}
.back-link{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:20px;font-size:14px;color:var(--primary);text-decoration:none;font-weight:500}
.back-link:hover{text-decoration:underline}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
footer{position:fixed;bottom:16px;font-size:12px;color:var(--muted);z-index:1}
@media(max-width:540px){.card{padding:32px 20px}}
</style>
</head>
<body>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<button class="theme-btn" onclick="toggleTheme()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="theme-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>
<div class="card" id="main-card">
  <a href="/" class="logo-row">
    <img src="/favicon.png?v=2" alt="ProjectHive" onerror="this.style.display='none'">
    <span class="brand">ProjectHive</span>
  </a>
  <div class="icon-wrap">🔐</div>
  <h1>Reset your password</h1>
  <p class="card-sub">Enter your email and we'll send you a secure reset link.</p>
  <div class="alert" id="alert"></div>
  <form onsubmit="handleForgot(event)">
    <div class="field">
      <label for="email">Email address</label>
      <div class="input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        <input id="email" type="email" placeholder="name@university.edu" required autocomplete="email">
      </div>
    </div>
    <button type="submit" class="btn-submit" id="submit-btn">
      <span id="btn-text">Send Reset Link</span>
    </button>
  </form>
  <a href="/login" class="back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Sign In
  </a>
</div>
<footer>&copy; 2026 ProjectHive</footer>
<script>
const API_BASE=(location.hostname==='localhost'||location.hostname==='127.0.0.1')
  ? (location.port === '3000' ? 'http://localhost:5000/api' : '/api')
  : 'https://projecthive-backend.onrender.com/api';
function toggleTheme(){const dark=document.documentElement.classList.toggle('dark');localStorage.setItem('theme',dark?'dark':'light');updateIcon(dark);}
function updateIcon(dark){document.getElementById('theme-icon').innerHTML=dark?'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>':'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';}
updateIcon(document.documentElement.classList.contains('dark'));
function showAlert(msg,type='err'){const el=document.getElementById('alert');el.textContent=msg;el.className='alert '+type;el.style.display='block';}
async function handleForgot(e){
  e.preventDefault();
  const email=document.getElementById('email').value.trim();
  if(!email){showAlert('Please enter your email address.');return;}
  const btn=document.getElementById('submit-btn'),txt=document.getElementById('btn-text');
  btn.disabled=true;txt.innerHTML='<span class="spinner"></span>';
  try{
    const res=await fetch(`${API_BASE}/auth/forgot-password`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
    const data=await res.json();
    if(res.ok){
      document.getElementById('main-card').innerHTML=`
        <div style="text-align:center;padding:8px 0">
          <div style="font-size:64px;margin-bottom:16px">📧</div>
          <h2 style="font-size:22px;font-weight:700;margin-bottom:8px">Check your inbox!</h2>
          <p style="color:var(--sub);font-size:14px;line-height:1.7;margin-bottom:28px">
            If <strong style="color:var(--primary)">${email}</strong> is registered, we've sent a reset link.<br>
            <small style="opacity:.7">Check spam/junk if you don't see it.</small>
          </p>
          <a href="/login" style="display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:linear-gradient(135deg,#6366f1,#7c3aed);color:#fff;text-decoration:none;border-radius:12px;font-size:15px;font-weight:700">← Back to Sign In</a>
        </div>`;
    }else{showAlert(data.message||data.error||'Something went wrong. Please try again.');btn.disabled=false;txt.textContent='Send Reset Link';}
  }catch(err){showAlert('Could not connect to server. Please try again.');btn.disabled=false;txt.textContent='Send Reset Link';}
}
</script>
</body>
</html>
