<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to ProjectHive">
    <title>Login - ProjectHive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link rel="stylesheet" href="../../assets/css/custom.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' font-weight='bold' fill='%231f2937'></text></svg>">

    <script>
        function toggleTheme() {
            if (localStorage.theme === 'dark') {
                localStorage.theme = 'light';
                document.documentElement.classList.remove('dark');
            } else {
                localStorage.theme = 'dark';
                document.documentElement.classList.add('dark');
            }
        }
        function initializeTheme() {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            } else {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            }
        }
        initializeTheme();
    </script>
</head>
<body class="text-slate-900 dark:text-slate-100 transition-colors duration-300 relative min-h-screen flex items-center justify-center">

        </button>

    <!-- Global Full-Page Background -->

    <div class="w-full py-12 px-4 sm:px-6 lg:px-8 flex items-center justify-center relative z-10">

            <!-- Header -->
            <div class="text-center mb-8">
                <div class="inline-block"><img src="../../assets/svg/logo.svg" alt="ProjectHive Logo" class="w-16 h-16 mx-auto mb-4"><h1 class="text-2xl font-bold text-slate-900 dark:text-white transition-colors duration-300">ProjectHive</h1></div>

            </div>

            <!-- Login Form -->
            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
                <!-- Email -->

                    <label for="email" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
                        University Email
                    </label>

                        type="email"
                        id="email"
                        name="email"
                        required

                        placeholder="you@university.edu"
                    >
                </div>

                <!-- Password -->

                    <label for="password" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
                        Password
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition"

                    Logging in...
                </div>

                <!-- Submit Button -->
                <button
                    type="submit"
                    id="submit-btn"
                    class="w-full bg-indigo-600 text-white font-semibold py-2 rounded-lg hover:bg-indigo-700 transition disabled:opacity-50 disabled:cursor-not-allowed"

                    Login
                </button>
            </form>

            <!-- Divider -->
            <div class="my-6 flex items-center">
                <div class="flex-1 border-t border-slate-300"></div>
                <span class="px-3 text-slate-500 text-sm">or</span>
                <div class="flex-1 border-t border-slate-300"></div>
            </div>

            <!-- Sign Up Link -->
            <div class="text-center">
                <p class="text-slate-600">
                    Don&apos;t have an account?
                    <a href="../../pages/auth/register.html" class="text-indigo-600 font-semibold hover:text-indigo-700">
                        Sign up
                    </a>
                </p>
            </div>

            <!-- Forgot Password -->
            <div class="text-center mt-4">
                <a href="#" class="text-sm text-slate-500 hover:text-slate-700">
                    Forgot password?
                </a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../../assets/js/core/api.js"></script>
    <script src="../../assets/js/core/auth.js"></script>
    <script>
        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const form = document.getElementById('login-form');
            const submitBtn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-message');
            const successMsg = document.getElementById('success-message');
            const loadingIndicator = document.getElementById('loading-indicator');

            // Reset messages
            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');
            loadingIndicator.classList.remove('hidden');
            submitBtn.disabled = true;

            try {
                const result = await Auth.login(email, password);

                if (result.success) {
                    successMsg.textContent = 'Login successful! Redirecting...';
                    successMsg.classList.remove('hidden');
                    setTimeout(() => {
                        window.location.href = '../../pages/dashboard.html';
                    }, 1000);
                } else {
                    errorMsg.textContent = result.error || 'Login failed. Please try again.';
                    errorMsg.classList.remove('hidden');
                    setTimeout(() => errorMsg.classList.add('hidden'), 3000);
                    loadingIndicator.classList.add('hidden');
                    submitBtn.disabled = false;
                }
            } catch (error) {
                console.error('[v0] Login error:', error);
                errorMsg.textContent = 'An error occurred. Please try again.';
                errorMsg.classList.remove('hidden');
                setTimeout(() => errorMsg.classList.add('hidden'), 3000);
                loadingIndicator.classList.add('hidden');
                submitBtn.disabled = false;
            }
        }
    </script>

    
    <!-- Global Modal -->
    <div id="global-modal-backdrop" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[90] flex items-center justify-center p-4 transition-all duration-300 opacity-0">
        <div class="bg-white dark:bg-slate-800 text-slate-900 dark:text-white shadow-2xl p-8 rounded-3xl max-w-sm w-full text-center border border-slate-200 dark:border-slate-700 transform scale-90 transition-all duration-300" id="global-toast">
            <img src="../../assets/svg/logo.svg" alt="ProjectHive Logo" class="w-16 h-16 mx-auto mb-5 animate-pulse">
            <p id="global-toast-msg" class="text-lg font-semibold mb-8 text-slate-700 dark:text-slate-200 leading-relaxed"></p>
            <button onclick="hideModal()" class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl transition-all font-semibold shadow-lg shadow-indigo-200 dark:shadow-none hover:scale-[1.02] active:scale-95">Got it, thanks!</button>
        </div>
    </div>
    <script>
        function showToast(message) {
            const backdrop = document.getElementById('global-modal-backdrop');
            const msgEl = document.getElementById('global-toast-msg');
            const modal = document.getElementById('global-toast');
            if (backdrop && msgEl) {
                msgEl.innerHTML = message;
                backdrop.classList.remove('hidden');
                // Force reflow
                void backdrop.offsetWidth;
                backdrop.classList.remove('opacity-0');
                modal.classList.remove('scale-90');
                modal.classList.add('scale-100');
            }
        }
        function hideModal() {
            const backdrop = document.getElementById('global-modal-backdrop');
            const modal = document.getElementById('global-toast');
            if (backdrop) {
                backdrop.classList.add('opacity-0');
                modal.classList.remove('scale-100');
                modal.classList.add('scale-90');
                setTimeout(() => backdrop.classList.add('hidden'), 300);
            }
        }
    </script>
