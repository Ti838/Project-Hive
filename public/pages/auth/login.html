<body class="min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 flex flex-col transition-colors duration-300 overflow-x-hidden font-sans">

  <a href="/" class="flex items-center gap-2.5 no-underline shrink-0 min-w-0">

    </button>

<!-- Main -->
<div class="flex-1 flex items-center justify-center px-6 pt-20 pb-10 relative z-10 min-h-screen">
  <div class="relative bg-white dark:bg-slate-800 border border-slate-200 dark:border-white/[.06] rounded-3xl p-10 w-full max-w-[440px] shadow-lg dark:shadow-2xl">

    <a href="/" class="flex items-center justify-center gap-2.5 mb-7 no-underline">
      <img src="/favicon.png?v=2" alt="ProjectHive" class="w-11 h-11 rounded-xl object-contain" onerror="this.style.display='none'">
      <span class="text-[22px] font-extrabold gradient-text">ProjectHive</span>

    <h1 class="text-[22px] font-bold text-center mb-1">Welcome back</h1>
    <p class="text-sm text-slate-500 dark:text-slate-400 text-center mb-7">Sign in to your account to continue</p>

    <!-- Google OAuth Button -->
    <button id="google-btn" onclick="signInWithGoogle()"

      <span id="google-btn-text">Continue with Google</span>

    <!-- Divider -->
    <div class="flex items-center gap-3 mb-5">

    </div>

    <!-- Email not verified banner -->
    <div id="verify-banner" class="hidden bg-amber-500/[.08] border border-amber-500/20 rounded-xl px-4 py-3 text-[13px] text-amber-600 dark:text-amber-400 mb-4 text-center leading-relaxed">
      Your email is not verified. <a onclick="resendVerification()" class="text-indigo-500 font-semibold cursor-pointer underline">Resend verification email</a>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="mb-4">

        <div class="relative">

        </div>
      </div>

      <div class="mb-4">
        <div class="flex justify-between items-center mb-1.5">
          <label for="password" class="text-[13px] font-semibold text-slate-500 dark:text-slate-400">Password</label>
          <a href="/forgot-password" class="text-[13px] font-medium text-indigo-500 no-underline hover:underline">Forgot password?</a>
        </div>
        <div class="relative">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="absolute left-3.5 top-1/2 -translate-y-1/2 opacity-40 pointer-events-none z-10"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input id="password" type="password" placeholder="Enter your password" required autocomplete="current-password"
            class="w-full pl-10 pr-11 py-[11px] border-[1.5px] border-slate-200 dark:border-slate-600 rounded-xl bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 text-base font-sans outline-none focus:border-indigo-500 focus:ring-[3px] focus:ring-indigo-500/10 transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500">
          <button type="button" id="toggle-pw-btn" class="absolute right-1 top-1/2 -translate-y-1/2 bg-transparent border-none cursor-pointer text-slate-400 hover:text-indigo-500 transition-colors z-20 flex items-center justify-center" style="width:44px;height:44px;-webkit-tap-highlight-color:transparent;touch-action:manipulation">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" id="submit-btn"
        class="w-full mt-2 py-[13px] border-none rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 text-white text-[15px] font-bold cursor-pointer hover:-translate-y-0.5 hover:shadow-lg hover:shadow-indigo-500/40 active:translate-y-0 disabled:opacity-60 disabled:cursor-not-allowed disabled:transform-none transition-all flex items-center justify-center gap-2 tracking-wide">
        <span id="btn-text">Sign In</span>
      </button>
    </form>

    <div class="text-center mt-5 text-sm text-slate-500 dark:text-slate-400">
      Don't have an account? <a href="/register" class="text-indigo-500 font-semibold no-underline hover:underline">Sign up free</a>

  </div>

<script src="/assets/js/core/auth.js"></script>
<script type="module">
// Import Supabase client
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://iekfvgjxkmgduxdvkuxf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlla2Z2Z2p4a21nZHV4ZHZrdXhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMjI2MjEsImV4cCI6MjA5Njg5ODYyMX0.s73x7IQTDae7TPD0AoJmH9m6Ip0SKQPV5Ozr9v5nACg';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

if(typeof Auth!=='undefined'&&Auth.isAuthenticated()){window.location.href='/dashboard';}

let lastEmail = '';

const BACKEND_BASE=(window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1')
  ?(window.location.port==='3000'?'http://localhost:5000/api':'/api')
  :'https://projecthive-backend.onrender.com/api';

// Modern Google OAuth with Supabase SDK (frontend-initiated)
window.signInWithGoogle = async function(){
  const btn=document.getElementById('google-btn');
  const txt=document.getElementById('google-btn-text');
  btn.disabled=true;
  txt.textContent='Connecting to Google…';

  try{
    const redirectTo = window.location.origin + '/pages/auth/callback.html';

    const { data, error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo,
        queryParams: {
          access_type: 'offline',
          prompt: 'consent'
        }
      }
    });

    if (error) {
      console.error('Supabase OAuth error:', error);
      showAlert('Could not start Google sign-in: ' + error.message);
      btn.disabled=false;
      txt.textContent='Continue with Google';
    }
    // Browser will redirect automatically, no need to handle success here
  }catch(e){
    console.error('Google sign-in error:', e);
    showAlert('Could not reach authentication service. Please try again.');
    btn.disabled=false;
    txt.textContent='Continue with Google';
  }
};



const sunSvg='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
const moonSvg='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
const sysSvg='<rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>';

function toggleTheme(){
  // 3-state: system → dark → light → system
  const cur=localStorage.getItem('theme')||'system';
  let next;
  if(cur==='system') next='dark';
  else if(cur==='dark') next='light';
  else next='system';

  if(next==='system'){
    localStorage.removeItem('theme');
    if(matchMedia('(prefers-color-scheme:dark)').matches) document.documentElement.classList.add('dark');
    else document.documentElement.classList.remove('dark');
  } else if(next==='dark'){
    localStorage.setItem('theme','dark');
    document.documentElement.classList.add('dark');
  } else {
    localStorage.setItem('theme','light');
    document.documentElement.classList.remove('dark');
  }
  updateThemeIcon();
}
function updateThemeIcon(){
  const i=document.getElementById('theme-icon');
  if(!i)return;
  const mode=localStorage.getItem('theme')||'system';
  const isDark=document.documentElement.classList.contains('dark');
  if(mode==='system') i.innerHTML=sysSvg;
  else if(isDark) i.innerHTML=sunSvg;
  else i.innerHTML=moonSvg;
}
updateThemeIcon();

// Listen for OS theme changes in real-time (when in system mode)
try{
  matchMedia('(prefers-color-scheme:dark)').addEventListener('change',function(e){
    if(!localStorage.getItem('theme')){
      if(e.matches) document.documentElement.classList.add('dark');
      else document.documentElement.classList.remove('dark');
      updateThemeIcon();
    }
  });
}catch(_){}

function togglePw(){
  const inp=document.getElementById('password');
  const open=inp.type==='password';
  inp.type=open?'text':'password';
  document.getElementById('eye-icon').innerHTML=open
    ?'<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
    :'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}
// Wire password toggle via addEventListener (more reliable on mobile than inline onclick)
document.addEventListener('DOMContentLoaded', function(){
  const pwBtn=document.getElementById('toggle-pw-btn');
  if(pwBtn){
    let lastPwToggle=0;
    function handlePwToggle(e){
      if(e){e.preventDefault();e.stopPropagation();}
      const now=Date.now();
      if(now-lastPwToggle<300)return;
      lastPwToggle=now;
      togglePw();
    }
    pwBtn.addEventListener('click', handlePwToggle);
    pwBtn.addEventListener('touchend', handlePwToggle);
  }
});

function showAlert(msg,type='err'){
  const el=document.getElementById('alert');
  el.textContent=msg;
  el.className='rounded-[10px] text-[13px] mb-4 px-3.5 py-2.5 block ' + (
    type==='ok' ? 'bg-emerald-500/[.08] border border-emerald-500/20 text-emerald-600 dark:text-emerald-400' :
    type==='warn' ? 'bg-amber-500/[.08] border border-amber-500/20 text-amber-600 dark:text-amber-400' :
    'bg-red-500/[.08] border border-red-500/20 text-red-600 dark:text-red-400'
  );
}

async function resendVerification(){
  if(!lastEmail)return;
  try{
    const BACKEND=(window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1')
      ?(window.location.port==='3000'?'http://localhost:5000/api':'/api')
      :'https://projecthive-backend.onrender.com/api';
    const res=await fetch(`${BACKEND}/auth/resend-verification`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:lastEmail})
    });
    const data=await res.json();
    showAlert(data.message||'Verification email sent!','ok');
  }catch(e){
    showAlert('Failed to resend. Please try again.');
  }
}

async function handleLogin(e){
  console.log('🔐 handleLogin called');
  e.preventDefault();
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  console.log('📧 Email:', email, '| Password length:', password?.length);
  if(!email||!password){showAlert('Please fill in all fields.');return;}

  lastEmail=email;
  const btn=document.getElementById('submit-btn');
  const txt=document.getElementById('btn-text');
  btn.disabled=true;
  txt.innerHTML='<span class="spinner"></span>';

  try{
    const BACKEND=(window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1')
      ?(window.location.port==='3000'?'http://localhost:5000/api':'/api')
      :'https://projecthive-backend.onrender.com/api';
    console.log('🌐 Backend URL:', BACKEND);
    console.log('📡 Sending login request...');
    const res=await fetch(`${BACKEND}/auth/login`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password})
    });
    console.log('📡 Response status:', res.status);
    const data=await res.json();
    console.log('📦 Response data:', data);

    if(res.ok&&data.accessToken){
      console.log('✅ Login successful! Token:', data.accessToken.substring(0, 30) + '...');
      localStorage.setItem('access_token',data.accessToken);
      if(data.refreshToken)localStorage.setItem('refresh_token',data.refreshToken);
      if(data.user)localStorage.setItem('user_data',JSON.stringify(data.user));
      showAlert('Login successful! Redirecting…','ok');
      console.log('🔄 Redirecting to /dashboard in 900ms...');
      setTimeout(()=>{window.location.href='/dashboard';},900);
    }else if(data.requiresVerification){
      console.log('⚠️  Email verification required');
      lastEmail=email;
      document.getElementById('verify-banner').classList.remove('hidden');
      document.getElementById('verify-banner').classList.add('block');
      showAlert(data.error||'Please verify your email first.','warn');
      btn.disabled=false;txt.textContent='Sign In';
    }else{
      console.error('❌ Login failed:', data.message || data.error);
      showAlert(data.message||data.error||'Invalid email or password.');
      btn.disabled=false;txt.textContent='Sign In';
    }
  }catch(err){
    console.error('❌ Network error:', err);
    showAlert('Could not connect to server. Please try again.');
    btn.disabled=false;txt.textContent='Sign In';
  }
}
</script>
</body>
