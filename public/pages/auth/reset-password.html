<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset Password — ProjectHive</title>
<meta name="description" content="Create a new password for your ProjectHive account.">
<link rel="icon" href="/assets/svg/logo.png">
<script>(function(){const t=localStorage.getItem('theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark');};})()</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8fafc;--card:#fff;--txt:#0f172a;--sub:#475569;--muted:#94a3b8;--border:#e2e8f0;--primary:#6366f1;--primary2:#7c3aed;--primary3:#a855f7;--input-bg:#f8fafc;--shadow:0 4px 24px rgba(99,102,241,.08)}
.dark{--bg:#0f172a;--card:#1e293b;--txt:#f1f5f9;--sub:#94a3b8;--muted:#64748b;--border:#334155;--input-bg:#0f172a;--shadow:0 4px 24px rgba(0,0,0,.4)}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',system-ui,sans-serif}
body{min-height:100vh;background:var(--bg);color:var(--txt);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;transition:background .3s,color .3s}
.bg-orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.orb1{width:500px;height:500px;background:rgba(99,102,241,.12);top:-150px;left:-100px}
.orb2{width:400px;height:400px;background:rgba(168,85,247,.1);bottom:-100px;right:-80px}
.theme-btn{position:fixed;top:16px;right:16px;z-index:100;width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--sub)}
.theme-btn:hover{border-color:var(--primary);color:var(--primary)}
.card{position:relative;z-index:1;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:44px 40px;width:100%;max-width:440px;box-shadow:var(--shadow);animation:fadeIn .4s ease}
.dark .card{border-color:rgba(255,255,255,.06)}
.logo-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px;text-decoration:none}
.logo-row img{width:40px;height:40px;border-radius:10px;object-fit:contain}
.logo-row .brand{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--primary3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.icon-wrap{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--primary),var(--primary2));display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px}
h1{font-size:22px;font-weight:700;text-align:center;margin-bottom:6px}
.card-sub{font-size:14px;color:var(--sub);text-align:center;line-height:1.6;margin-bottom:24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--sub);margin-bottom:5px}
.input-wrap{position:relative}
.input-wrap>svg:first-of-type{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none;z-index:1}
.input-wrap input{width:100%;padding:11px 44px 11px 40px;border:1.5px solid var(--border);border-radius:12px;background:var(--input-bg);color:var(--txt);font-size:16px;font-family:'Inter',sans-serif;transition:all .2s;outline:none}
.input-wrap input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.input-wrap input::placeholder{color:var(--muted)}
.eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);padding:6px;z-index:2;display:flex;align-items:center}
.eye-btn:hover{color:var(--primary)}
.eye-btn svg{position:static!important;transform:none!important;opacity:1!important}
.strength-bar{height:3px;border-radius:4px;background:var(--border);margin-top:6px;overflow:hidden}
.strength-fill{height:100%;border-radius:4px;transition:width .3s,background .3s;width:0}
.btn-submit{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px}
.btn-submit:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,.4)}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}
.alert{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none}
.alert.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#dc2626}
.alert.ok{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);color:#059669}
.dark .alert.err{color:#f87171}.dark .alert.ok{color:#34d399}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
footer{position:fixed;bottom:16px;font-size:12px;color:var(--muted);z-index:1}
@media(max-width:480px){.card{padding:32px 20px}}
</style>
</head>
<body>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<button class="theme-btn" onclick="toggleTheme()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="theme-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
</button>
<div class="card" id="main-card">
  <a href="/" class="logo-row">
    <img src="/assets/svg/logo.png" alt="ProjectHive" onerror="this.style.display='none'">
    <span class="brand">ProjectHive</span>
  </a>
  <div class="icon-wrap">🔑</div>
  <h1>Create new password</h1>
  <p class="card-sub">Choose a strong password to secure your account.</p>
  <div class="alert" id="alert"></div>
  <form onsubmit="handleReset(event)" id="reset-form">
    <div class="field">
      <label for="password">New Password</label>
      <div class="input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input id="password" type="password" placeholder="Min. 8 characters" required oninput="checkStrength(this.value)" autocomplete="new-password">
        <button type="button" class="eye-btn" onclick="togglePw('password','eye1')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eye1"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="s-fill"></div></div>
    </div>
    <div class="field">
      <label for="confirm">Confirm Password</label>
      <div class="input-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input id="confirm" type="password" placeholder="Repeat your password" required autocomplete="new-password">
        <button type="button" class="eye-btn" onclick="togglePw('confirm','eye2')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eye2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <button type="submit" class="btn-submit" id="submit-btn"><span id="btn-text">Reset Password</span></button>
  </form>
</div>
<footer>&copy; 2026 ProjectHive</footer>
<script>
const API_BASE=(location.hostname==='localhost'||location.hostname==='127.0.0.1')?'/api':'https://projecthive-backend.onrender.com/api';
const token=new URLSearchParams(location.search).get('token');

// No token = invalid link
if(!token){
  document.getElementById('main-card').innerHTML=`
    <div style="text-align:center;padding:8px 0">
      <div style="font-size:64px;margin-bottom:16px">⚠️</div>
      <h2 style="font-size:22px;font-weight:700;margin-bottom:8px">Invalid Reset Link</h2>
      <p style="color:var(--sub);font-size:14px;line-height:1.7;margin-bottom:28px">
        This password reset link is invalid or has expired.<br>Please request a new one.
      </p>
      <a href="/forgot-password" style="display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:linear-gradient(135deg,#6366f1,#7c3aed);color:#fff;text-decoration:none;border-radius:12px;font-size:15px;font-weight:700">Request New Link</a>
    </div>`;
}

function toggleTheme(){const dark=document.documentElement.classList.toggle('dark');localStorage.setItem('theme',dark?'dark':'light');updateIcon(dark);}
function updateIcon(dark){document.getElementById('theme-icon').innerHTML=dark?'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>':'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';}
updateIcon(document.documentElement.classList.contains('dark'));

function togglePw(id,iconId){const inp=document.getElementById(id);const open=inp.type==='password';inp.type=open?'text':'password';document.getElementById(iconId).innerHTML=open?'<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>':'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';}

function checkStrength(pw){const fill=document.getElementById('s-fill');let s=0;if(pw.length>=8)s++;if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;const c=['#ef4444','#f59e0b','#10b981','#6366f1'];fill.style.width=(s*25)+'%';fill.style.background=c[s-1]||'#e2e8f0';}

function showAlert(msg,type='err'){const el=document.getElementById('alert');el.textContent=msg;el.className='alert '+type;el.style.display='block';}

async function handleReset(e){
  e.preventDefault();
  const pw=document.getElementById('password').value;
  const cpw=document.getElementById('confirm').value;
  if(pw!==cpw){showAlert('Passwords do not match.');return;}
  if(pw.length<8){showAlert('Password must be at least 8 characters.');return;}
  const btn=document.getElementById('submit-btn'),txt=document.getElementById('btn-text');
  btn.disabled=true;txt.innerHTML='<span class="spinner"></span>';
  try{
    const res=await fetch(`${API_BASE}/auth/reset-password`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,password:pw})});
    const data=await res.json();
    if(res.ok){
      document.getElementById('main-card').innerHTML=`
        <div style="text-align:center;padding:8px 0">
          <div style="font-size:64px;margin-bottom:16px">✅</div>
          <h2 style="font-size:22px;font-weight:700;margin-bottom:8px">Password Reset!</h2>
          <p style="color:var(--sub);font-size:14px;line-height:1.7;margin-bottom:28px">
            Your password has been updated successfully.<br>You can now sign in with your new password.
          </p>
          <a href="/login" style="display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:linear-gradient(135deg,#6366f1,#7c3aed);color:#fff;text-decoration:none;border-radius:12px;font-size:15px;font-weight:700">Sign In →</a>
        </div>`;
    }else{showAlert(data.message||data.error||'Reset failed. The link may have expired.');btn.disabled=false;txt.textContent='Reset Password';}
  }catch(err){showAlert('Could not connect to server. Please try again.');btn.disabled=false;txt.textContent='Reset Password';}
}
</script>
</body>
</html>
